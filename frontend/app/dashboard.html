<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Dashboard</title><link rel="stylesheet" href="../css/app.css"/>
<style>
/* ── KPI Summary ── */
.dk-kpi{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.dk-k{background:var(--surface);border-radius:12px;padding:14px 16px;border:1px solid var(--border);position:relative;overflow:hidden}
.dk-k:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.dk-k-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.dk-k-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.dk-k-value{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:4px;line-height:1}
.dk-k-sub{font-size:10px;color:var(--text3);margin-top:4px}
/* ── Grid ── */
.dk-g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dk-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.dk-g32{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px}
.dk-card{background:var(--surface);border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
.dk-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dk-card-title{font-size:13px;font-weight:700;color:var(--text)}
.dk-card-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(1,118,211,.06);color:var(--sf-blue)}
/* ── Pipeline bars ── */
.dk-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dk-bar-label{width:100px;font-size:11px;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dk-bar-track{flex:1;height:22px;background:var(--surface3);border-radius:5px;overflow:hidden}
.dk-bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;min-width:20px;transition:width .8s ease}
.dk-bar-val{width:70px;font-size:11px;font-weight:600;color:var(--text);text-align:right}
/* ── Donut chart ── */
.dk-donut-wrap{display:flex;align-items:center;gap:20px}
.dk-donut-legend{flex:1}
.dk-legend-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px}
.dk-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dk-legend-name{flex:1;color:var(--text2)}
.dk-legend-val{font-weight:700;color:var(--text)}
/* ── Table ── */
.dk-tbl{width:100%;border-collapse:separate;border-spacing:0}
.dk-tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)}
.dk-tbl td{padding:10px;border-bottom:1px solid var(--border);font-size:12px}
.dk-tbl tr:hover td{background:rgba(1,118,211,.02)}
.dk-tbl-name{font-weight:600}
.dk-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
/* ── Agent bars ── */
.dk-agent-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.dk-agent-row:last-child{border-bottom:none}
.dk-agent-name{width:120px;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dk-agent-bar{flex:1;height:16px;background:var(--surface3);border-radius:4px;overflow:hidden}
.dk-agent-fill{height:100%;border-radius:4px;transition:width .8s ease}
.dk-agent-val{width:80px;font-size:11px;font-weight:700;text-align:right;color:var(--sf-blue)}
/* ── Empty ── */
.dk-empty{text-align:center;padding:24px;color:var(--text3);font-size:12px}
/* ── Kanban ── */
.kk-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.kk-col{min-width:180px;flex-shrink:0;background:var(--surface2);border-radius:10px;padding:10px}
.kk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kk-title{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.kk-cnt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;background:var(--surface3);color:var(--text3)}
.kk-total{font-size:11px;font-weight:700;color:var(--sf-blue);margin-bottom:8px}
.kk-card{background:var(--surface);border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid var(--border)}
.kk-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.kk-name{font-size:12px;font-weight:600}.kk-company{font-size:10px;color:var(--text3);margin-top:1px}
.kk-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:11px}
.kk-amt{font-weight:700;color:var(--sf-blue)}.kk-date{color:var(--text3)}
/* ── Quick Actions ── */
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:18px}
.qa-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);text-decoration:none}
.qa-btn:hover{border-color:var(--sf-blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.qa-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-icon svg{width:14px;height:14px}
@media(max-width:1024px){.dk-kpi{grid-template-columns:repeat(3,1fr)}.dk-g2,.dk-g3,.dk-g32{grid-template-columns:1fr}.qa-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.dk-kpi{grid-template-columns:repeat(2,1fr)}.qa-grid{grid-template-columns:1fr 1fr}}
</style>
</head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title" data-i18n="dash_title">Dashboard</div><div class="page-subtitle">Sales CRM Overview — Real-time data</div></div></div>

  <div class="qa-grid" id="qa"></div>
  <!-- KPI Summary -->
  <div class="dk-kpi" id="kpis"></div>

  <!-- Row 1: Won Amount vs Won Deals (2 Line Chart) + Sales Pipeline by Stage (Bar Chart) -->
  <div class="dk-g2">
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Won Amount vs Won Deals</span></div><div id="won-chart"></div></div>
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Sales Pipeline by Stage</span><span class="dk-card-badge" id="pipe-badge"></span></div><div id="pipeline"></div></div>
  </div>

  <!-- Row 2: Pipeline Summary (numbers per stage) -->
  <div class="dk-card" style="margin-bottom:14px"><div class="dk-card-hd"><span class="dk-card-title">Pipeline Summary</span><a href="leads.html" style="font-size:11px;color:var(--sf-blue);text-decoration:none">View Kanban →</a></div><div id="kanban"></div></div>

  <!-- Row 3: Top Open Deals + Deal Stages Breakdown (Pie Chart) -->
  <div class="dk-g2">
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Top Open Deals</span></div><div id="top-open"></div></div>
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Deal Register Breakdown</span></div><div id="stage-breakdown"></div></div>
  </div>

  <!-- Row 3: Agents Comparison + Pipeline by Agents -->
  <div class="dk-g2">
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Sales Rep Comparison</span></div><div id="agents-compare"></div></div>
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Pipeline by Sales Rep</span></div><div id="pipe-agents"></div></div>
  </div>

  <!-- Row 4: Customers & Revenue + Tasks Overview -->
  <div class="dk-g32">
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Customers & Revenue</span><a href="accounts.html" style="font-size:11px;color:var(--sf-blue)">View All</a></div><div id="customers"></div></div>
    <div class="dk-card"><div class="dk-card-hd"><span class="dk-card-title">Tasks Overview</span><a href="tasks.html" style="font-size:11px;color:var(--sf-blue)">View All</a></div><div id="tasks-ov"></div></div>
  </div>
</div>
<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('dashboard');
if(!requireAuth()) throw 'auth';

var SV=function(k){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+({
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  dollar:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/>',
  ticket:'<path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 002 2 2 2 0 010 4 2 2 0 00-2 2v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 00-2-2 2 2 0 010-4 2 2 0 002-2V7a2 2 0 00-2-2H5z"/>',
  lead:'<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>',
  doc:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  phone:'<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>',
  note:'<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>',
}[k]||'')+'</svg>'};

var allLeadsRaw=[];
var userMap={}; // userId -> display name
var stageColors={New:'#64748B',Contacted:'#0176D3',Qualified:'#0B827C',Proposal:'#D97706',Negotiation:'#DC2626',Won:'#2E844A',Lost:'#9CA3AF'};

async function loadDashboard(){
  // Load users first for name mapping
  try{
    var users=await apiFetch('/users');
    if(users&&users.length){users.forEach(function(u){userMap[u.id]=((u.first_name||'')+' '+(u.last_name||'')).trim()||u.email||u.id.substring(0,8)})}
  }catch(e){}
  await Promise.all([loadLeads(),loadAccounts(),loadPipelineStages(),loadTasks(),loadQuotations(),loadProducts()]);
  // Also load raw leads for detailed analysis
  var res=await apiFetch('/leads?limit=500').catch(function(){return null});
  allLeadsRaw=(res&&res.data)||res||[];
  allLeadsRaw=allLeadsRaw.map(function(l){
    var m=(typeof l.metadata==='string'?JSON.parse(l.metadata):l.metadata)||{};
    return {id:l.id,name:l.name,company:l.company_name||'',status:l.status||'New',source:l.source||'Unknown',
      value:m.estimatedValue||0,project:m.projectName||'',priority:m.priority||'Medium',
      assignedTo:l.assigned_to||'',createdAt:l.created_at||''};
  });
  renderAll();
}
loadDashboard();
setInterval(loadDashboard,30000);

function renderQA(){
  var items=[{l:'New Lead',c:'#0176D3',bg:'rgba(1,118,211,.06)',i:'lead',href:'leads.html'},{l:'Add Customer',c:'#2E844A',bg:'rgba(46,132,74,.06)',i:'users',href:'accounts.html'},{l:'Quotation',c:'#D97706',bg:'rgba(221,122,1,.06)',i:'doc',href:'quotations.html'},{l:'Log Call',c:'#7F56D9',bg:'rgba(127,86,217,.06)',i:'phone',href:'tasks.html'},{l:'Calendar',c:'#0B827C',bg:'rgba(11,130,124,.06)',i:'target',href:'calendar.html'},{l:'Products',c:'#C23934',bg:'rgba(194,57,52,.06)',i:'note',href:'products.html'}];
  document.getElementById('qa').innerHTML=items.map(function(q){return '<a href="'+q.href+'" class="qa-btn"><div class="qa-icon" style="background:'+q.bg+';color:'+q.c+'">'+SV(q.i)+'</div><span style="color:'+q.c+'">'+esc(q.l)+'</span></a>'}).join('');
}

/* ── KPI Summary (6 cards) ── */
function renderKPIs(){
  var total=allLeadsRaw.length;
  var open=allLeadsRaw.filter(function(l){return l.status!=='Won'&&l.status!=='Lost'});
  var won=allLeadsRaw.filter(function(l){return l.status==='Won'});
  var lost=allLeadsRaw.filter(function(l){return l.status==='Lost'});
  var totalVal=allLeadsRaw.reduce(function(s,l){return s+l.value},0);
  var wonVal=won.reduce(function(s,l){return s+l.value},0);
  var openVal=open.reduce(function(s,l){return s+l.value},0);
  var winRate=total>0?Math.round(won.length/total*100):0;
  var items=[
    {l:'Total Deals',v:String(total),c:'#0176D3',sub:fmt(totalVal)+' total value'},
    {l:'Open Deals',v:String(open.length),c:'#D97706',sub:fmt(openVal)+' in pipeline'},
    {l:'Won Deals',v:String(won.length),c:'#2E844A',sub:fmt(wonVal)+' revenue'},
    {l:'Lost Deals',v:String(lost.length),c:'#DC2626',sub:lost.reduce(function(s,l){return s+l.value},0)>0?fmt(lost.reduce(function(s,l){return s+l.value},0))+' lost':'No lost deals'},
    {l:'Win Rate',v:winRate+'%',c:'#7F56D9',sub:won.length+' of '+total+' deals'},
    {l:'Customers',v:String(ACCOUNTS.length),c:'#0B827C',sub:'Active accounts'},
  ];
  document.getElementById('kpis').innerHTML=items.map(function(i){
    return '<div class="dk-k"><div class="dk-k-stripe" style="background:'+i.c+'"></div><div class="dk-k-label">'+esc(i.l)+'</div><div class="dk-k-value" style="color:'+i.c+'">'+i.v+'</div><div class="dk-k-sub">'+esc(i.sub)+'</div></div>';
  }).join('');
}

/* ── Sales Pipeline by Stage (Bar Chart) ── */
function renderPipeline(){
  var stageMap={};
  var leadToStage={New:'New Lead',Contacted:'Qualification',Qualified:'Needs Analysis',Proposal:'Proposal',Negotiation:'Negotiation',Won:'Closed Won',Lost:'Closed Lost'};
  STAGES.forEach(function(s){stageMap[s.name]={name:s.name,color:s.color||'#0176D3',count:0,value:0}});
  for(var st in LEADS_DATA){
    var sn=leadToStage[st]||st;
    if(!stageMap[sn])stageMap[sn]={name:sn,color:stageColors[st]||'#0176D3',count:0,value:0};
    LEADS_DATA[st].forEach(function(l){stageMap[sn].count++;stageMap[sn].value+=l.value||0});
  }
  var stages=Object.values(stageMap).filter(function(s){return s.count>0});
  var order=['New Lead','Qualification','Needs Analysis','Proposal','Negotiation','Closed Won','Closed Lost'];
  stages.sort(function(a,b){var ai=order.indexOf(a.name);var bi=order.indexOf(b.name);if(ai<0)ai=99;if(bi<0)bi=99;return ai-bi});
  if(stages.length===0){document.getElementById('pipeline').innerHTML='<div class="dk-empty">No pipeline data</div>';return}
  var maxVal=Math.max.apply(null,stages.map(function(s){return s.value}).concat([1]));
  var totalVal=stages.reduce(function(s,st){return s+st.value},0);
  document.getElementById('pipe-badge').textContent=fmt(totalVal)+' total';

  // SVG Bar Chart
  var W=440,H=180,padL=50,padR=10,padT=15,padB=40;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  var n=stages.length,barW=Math.min(chartW/n*0.6,40),gap=(chartW-barW*n)/(n+1);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;font-family:inherit">';
  // Grid
  for(var g=0;g<=4;g++){var gy=padT+chartH*(1-g/4);svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,2"/>';svg+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="8" fill="var(--text3)">'+fmt(maxVal*g/4)+'</text>';}
  // Bars
  stages.forEach(function(s,i){
    var x=padL+gap+(barW+gap)*i;
    var h=s.value>0?(s.value/maxVal)*chartH:2;
    var y=padT+chartH-h;
    svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" rx="3" fill="'+s.color+'" opacity="0.85"/>';
    svg+='<text x="'+(x+barW/2)+'" y="'+(y-4)+'" text-anchor="middle" font-size="8" font-weight="600" fill="'+s.color+'">'+s.count+'</text>';
    svg+='<text x="'+(x+barW/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="8" fill="var(--text2)">'+esc(s.name.replace('Closed ','').replace('New ',''))+'</text>';
  });
  svg+='</svg>';
  document.getElementById('pipeline').innerHTML=svg;
}

/* ── Won Amount vs Won Deals (2 Line Chart — overlapping, dual axis) ── */
function renderWonChart(){
  var won=allLeadsRaw.filter(function(l){return l.status==='Won'});
  var months={};
  won.forEach(function(l){
    var d=l.createdAt?l.createdAt.substring(0,7):'unknown';
    if(!months[d])months[d]={month:d,amount:0,count:0};
    months[d].amount+=l.value;months[d].count++;
  });
  var data=Object.values(months).sort(function(a,b){return a.month.localeCompare(b.month)});
  if(data.length===0){document.getElementById('won-chart').innerHTML='<div class="dk-empty">No won deals yet</div>';return}
  if(data.length===1) data=[{month:'',amount:0,count:0},data[0]];

  var maxAmt=Math.max.apply(null,data.map(function(d){return d.amount}).concat([1]));
  var maxCnt=Math.max.apply(null,data.map(function(d){return d.count}).concat([1]));
  var monthNames={'01':'ม.ค.','02':'ก.พ.','03':'มี.ค.','04':'เม.ย.','05':'พ.ค.','06':'มิ.ย.','07':'ก.ค.','08':'ส.ค.','09':'ก.ย.','10':'ต.ค.','11':'พ.ย.','12':'ธ.ค.'};

  // Use canvas-style div with interactive tooltip
  var W=480,H=220,padL=50,padR=35,padT=40,padB=35;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  var n=data.length,stepX=n>1?chartW/(n-1):chartW/2;

  var amtPts=data.map(function(d,i){return{x:padL+i*stepX,y:padT+chartH-(d.amount/maxAmt)*chartH}});
  var cntPts=data.map(function(d,i){return{x:padL+i*stepX,y:padT+chartH-(d.count/maxCnt)*chartH}});

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;font-family:inherit" id="won-svg">';

  // Subtle grid (only horizontal, very light)
  for(var g=1;g<=4;g++){var gy=padT+chartH*(1-g/4);svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="0.3" opacity="0.5"/>';}

  // Left axis labels (amount)
  for(var g=0;g<=4;g++){var gy=padT+chartH*(1-g/4);svg+='<text x="'+(padL-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="8" fill="var(--text3)" opacity="0.7">'+fmt(maxAmt*g/4)+'</text>';}
  // Right axis labels (count)
  for(var g=0;g<=4;g++){var gy=padT+chartH*(1-g/4);svg+='<text x="'+(W-padR+6)+'" y="'+(gy+3)+'" font-size="8" fill="#D97706" opacity="0.7">'+Math.round(maxCnt*g/4)+'</text>';}

  // Amount area gradient
  svg+='<defs><linearGradient id="amtGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2E844A" stop-opacity="0.15"/><stop offset="100%" stop-color="#2E844A" stop-opacity="0.01"/></linearGradient>';
  svg+='<linearGradient id="cntGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D97706" stop-opacity="0.1"/><stop offset="100%" stop-color="#D97706" stop-opacity="0.01"/></linearGradient></defs>';

  // Amount area fill
  svg+='<path d="M'+amtPts[0].x+','+(padT+chartH);
  amtPts.forEach(function(p){svg+=' L'+p.x+','+p.y});
  svg+=' L'+amtPts[amtPts.length-1].x+','+(padT+chartH)+' Z" fill="url(#amtGrad)"/>';

  // Amount line (smooth, rounded)
  svg+='<path d="M'+amtPts.map(function(p){return p.x+','+p.y}).join(' L')+'" fill="none" stroke="#2E844A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';

  // Count area fill
  svg+='<path d="M'+cntPts[0].x+','+(padT+chartH);
  cntPts.forEach(function(p){svg+=' L'+p.x+','+p.y});
  svg+=' L'+cntPts[cntPts.length-1].x+','+(padT+chartH)+' Z" fill="url(#cntGrad)"/>';

  // Count line (dashed)
  svg+='<path d="M'+cntPts.map(function(p){return p.x+','+p.y}).join(' L')+'" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round"/>';

  // Small dots (visible on hover via CSS)
  amtPts.forEach(function(p){svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="#2E844A" stroke="#fff" stroke-width="2" class="won-dot"/>';});
  cntPts.forEach(function(p){svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#D97706" stroke="#fff" stroke-width="1.5" class="won-dot"/>';});

  // Invisible hover zones (wider hit area for tooltip)
  data.forEach(function(d,i){
    var x=padL+i*stepX;
    var mm=d.month?d.month.split('-')[1]:'';
    var yr=d.month?d.month.split('-')[0]:'';
    var label=monthNames[mm]||mm;
    if(yr&&yr!=='2025') label+=yr.slice(2);
    svg+='<rect x="'+(x-stepX/2)+'" y="'+padT+'" width="'+stepX+'" height="'+chartH+'" fill="transparent" class="won-hover" data-idx="'+i+'" data-month="'+esc(label)+'" data-amount="'+fmt(d.amount)+'" data-count="'+d.count+'"/>';
  });

  // X-axis labels
  data.forEach(function(d,i){
    var x=padL+i*stepX;
    var mm=d.month?d.month.split('-')[1]:'';
    var yr=d.month?d.month.split('-')[0]:'';
    var label=monthNames[mm]||mm;
    // Show year suffix for 2026
    if(yr==='2026') label+="'69";
    // Skip some labels if too many
    if(n>12 && i%2!==0 && i!==n-1) return;
    svg+='<text x="'+x+'" y="'+(H-8)+'" text-anchor="middle" font-size="8" fill="var(--text3)">'+esc(label)+'</text>';
  });

  // Legend (top right, minimal)
  svg+='<circle cx="'+(W-padR-100)+'" cy="16" r="4" fill="#2E844A"/>';
  svg+='<text x="'+(W-padR-93)+'" y="19" font-size="9" fill="var(--text2)">Won Amount</text>';
  svg+='<circle cx="'+(W-padR-30)+'" cy="16" r="3.5" fill="#D97706"/>';
  svg+='<text x="'+(W-padR-23)+'" y="19" font-size="9" fill="var(--text2)">Deals</text>';

  svg+='</svg>';

  // Tooltip div
  var tooltip='<div id="won-tooltip" style="position:absolute;display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:11px;pointer-events:none;z-index:10;white-space:nowrap"><div id="won-tt-month" style="font-weight:700;margin-bottom:4px"></div><div style="color:#2E844A">Amount: <span id="won-tt-amt"></span></div><div style="color:#D97706">Deals: <span id="won-tt-cnt"></span></div></div>';

  document.getElementById('won-chart').innerHTML='<div style="position:relative">'+svg+tooltip+'</div>';

  // Hover events
  document.querySelectorAll('.won-hover').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      var tt=document.getElementById('won-tooltip');
      document.getElementById('won-tt-month').textContent=el.dataset.month;
      document.getElementById('won-tt-amt').textContent=el.dataset.amount;
      document.getElementById('won-tt-cnt').textContent=el.dataset.count;
      tt.style.display='block';
      var rect=el.closest('svg').getBoundingClientRect();
      var x=parseFloat(el.getAttribute('x'))+parseFloat(el.getAttribute('width'))/2;
      var pct=x/480*100;
      tt.style.left=pct+'%';tt.style.top='10px';tt.style.transform='translateX(-50%)';
    });
    el.addEventListener('mouseleave',function(){document.getElementById('won-tooltip').style.display='none';});
  });
}

/* ── Top Open Deals ── */
function renderTopOpen(){
  var open=allLeadsRaw.filter(function(l){return l.status!=='Won'&&l.status!=='Lost'}).sort(function(a,b){return b.value-a.value}).slice(0,8);
  if(open.length===0){document.getElementById('top-open').innerHTML='<div class="dk-empty">No open deals</div>';return}
  document.getElementById('top-open').innerHTML='<table class="dk-tbl"><thead><tr><th>Deal / Company</th><th>Stage</th><th>Value</th><th>Priority</th></tr></thead><tbody>'+open.map(function(l){
    var sc=stageColors[l.status]||'#94A3B8';var pc=l.priority==='High'?'#DC2626':l.priority==='Low'?'#94A3B8':'#D97706';
    return '<tr><td><div class="dk-tbl-name">'+esc(l.project||l.name)+'</div><div style="font-size:10px;color:var(--text3)">'+esc(l.company)+'</div></td><td><span class="dk-badge" style="background:'+sc+'18;color:'+sc+'">'+esc(l.status)+'</span></td><td style="font-weight:700;color:var(--sf-blue)">'+fmt(l.value)+'</td><td style="font-size:11px;font-weight:600;color:'+pc+'">'+esc(l.priority)+'</td></tr>';
  }).join('')+'</tbody></table>';
}

/* ── Deal Register Breakdown (Pie Chart) ── */
function renderStageBreakdown(){
  var counts={};var total=allLeadsRaw.length||1;
  allLeadsRaw.forEach(function(l){counts[l.status]=(counts[l.status]||0)+1});
  var slices=[];
  STAGES_ORDER.forEach(function(s){var c=counts[s]||0;if(c>0)slices.push({name:s,count:c,color:stageColors[s]||'#94A3B8'})});
  if(slices.length===0){document.getElementById('stage-breakdown').innerHTML='<div class="dk-empty">No data</div>';return}

  // SVG Pie Chart
  var size=140,cx=size/2,cy=size/2,r=55;
  var svg='<svg viewBox="0 0 '+size+' '+size+'" style="width:'+size+'px;height:'+size+'px">';
  var startAngle=-Math.PI/2;
  slices.forEach(function(s){
    var angle=(s.count/total)*2*Math.PI;
    var endAngle=startAngle+angle;
    var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    var large=angle>Math.PI?1:0;
    svg+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z" fill="'+s.color+'" stroke="#fff" stroke-width="1.5"/>';
    startAngle=endAngle;
  });
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="28" fill="var(--surface)"/>';
  svg+='<text x="'+cx+'" y="'+(cy+1)+'" text-anchor="middle" font-size="16" font-weight="800" fill="var(--text)">'+total+'</text>';
  svg+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="8" fill="var(--text3)">Total</text>';
  svg+='</svg>';

  // Legend
  var legend=slices.map(function(s){
    var pct=Math.round(s.count/total*100);
    return '<div class="dk-legend-row"><div class="dk-legend-dot" style="background:'+s.color+'"></div><div class="dk-legend-name">'+esc(s.name)+'</div><div class="dk-legend-val">'+s.count+' ('+pct+'%)</div></div>';
  }).join('');

  document.getElementById('stage-breakdown').innerHTML='<div class="dk-donut-wrap">'+svg+'<div class="dk-donut-legend">'+legend+'</div></div>';
}

/* ── Sales Rep Comparison ── */
function renderAgentsCompare(){
  var agents={};
  allLeadsRaw.forEach(function(l){
    var a=l.assignedTo||'Unassigned';
    if(!agents[a])agents[a]={id:a,total:0,won:0,lost:0,open:0,value:0,wonVal:0};
    agents[a].total++;agents[a].value+=l.value;
    if(l.status==='Won'){agents[a].won++;agents[a].wonVal+=l.value}
    else if(l.status==='Lost')agents[a].lost++;
    else agents[a].open++;
  });
  var arr=Object.values(agents).sort(function(a,b){return b.wonVal-a.wonVal});
  if(arr.length===0){document.getElementById('agents-compare').innerHTML='<div class="dk-empty">No data</div>';return}
  document.getElementById('agents-compare').innerHTML='<table class="dk-tbl"><thead><tr><th>Sales Rep</th><th>Total</th><th>Won</th><th>Lost</th><th>Open</th><th>Won Amount</th><th>Win Rate</th></tr></thead><tbody>'+arr.map(function(a){
    var wr=a.total>0?Math.round(a.won/a.total*100):0;
    return '<tr><td class="dk-tbl-name">'+esc(userMap[a.id]||a.id.substring(0,8))+'</td><td>'+a.total+'</td><td style="color:#2E844A;font-weight:600">'+a.won+'</td><td style="color:#DC2626">'+a.lost+'</td><td>'+a.open+'</td><td style="font-weight:700;color:var(--sf-blue)">'+fmt(a.wonVal)+'</td><td><span class="dk-badge" style="background:'+(wr>=50?'rgba(46,132,74,.1);color:#2E844A':'rgba(194,57,52,.1);color:#DC2626')+'">'+wr+'%</span></td></tr>';
  }).join('')+'</tbody></table>';
}

/* ── Pipeline by Sales Rep ── */
function renderPipeAgents(){
  var agents={};
  allLeadsRaw.filter(function(l){return l.status!=='Won'&&l.status!=='Lost'}).forEach(function(l){
    var a=l.assignedTo||'Unassigned';
    if(!agents[a])agents[a]={id:a,value:0,count:0};
    agents[a].value+=l.value;agents[a].count++;
  });
  var arr=Object.values(agents).sort(function(a,b){return b.value-a.value});
  var maxVal=arr.length>0?arr[0].value:1;
  if(arr.length===0){document.getElementById('pipe-agents').innerHTML='<div class="dk-empty">No open pipeline</div>';return}
  document.getElementById('pipe-agents').innerHTML=arr.map(function(a){
    var pct=maxVal>0?(a.value/maxVal)*100:0;
    return '<div class="dk-agent-row"><div class="dk-agent-name">'+esc(userMap[a.id]||a.id.substring(0,8))+'</div><div class="dk-agent-bar"><div class="dk-agent-fill" style="width:'+Math.max(pct,8)+'%;background:#0176D3"></div></div><div class="dk-agent-val">'+fmt(a.value)+' ('+a.count+')</div></div>';
  }).join('');
}

/* ── Customers & Revenue ── */
function renderCustomers(){
  var bc={active:'rgba(46,132,74,.08);color:#2E844A',Active:'rgba(46,132,74,.08);color:#2E844A',inactive:'rgba(194,57,52,.08);color:#C23934',prospect:'rgba(1,118,211,.08);color:#0176D3',churned:'rgba(194,57,52,.08);color:#C23934'};
  if(ACCOUNTS.length===0){document.getElementById('customers').innerHTML='<div class="dk-empty">No customers</div>';return}
  document.getElementById('customers').innerHTML='<table class="dk-tbl"><thead><tr><th>Company</th><th>Status</th><th>Revenue</th><th>Tier</th></tr></thead><tbody>'+ACCOUNTS.slice(0,8).map(function(a){
    var name=a.company_name||'';var status=a.account_status||'active';var rev=parseFloat(a.total_revenue||0);var tier=a.account_tier||'standard';
    return '<tr><td><div class="dk-tbl-name">'+esc(name)+'</div><div style="font-size:10px;color:var(--text3)">'+esc(a.phone||a.email||'')+'</div></td><td><span class="dk-badge" style="background:'+(bc[status]||bc.active)+'">'+esc(status)+'</span></td><td style="font-weight:700;color:var(--sf-blue)">'+fmt(rev)+'</td><td style="font-size:11px;color:var(--text3)">'+esc(tier)+'</td></tr>';
  }).join('')+'</tbody></table>';
}

/* ── Tasks Overview ── */
function renderTasks(){
  if(TASKS.length===0){document.getElementById('tasks-ov').innerHTML='<div class="dk-empty">No tasks</div>';return}
  var byStatus={};TASKS.forEach(function(t){var s=t.status||'Open';byStatus[s]=(byStatus[s]||0)+1});
  var colors={Open:'#94A3B8','In Progress':'#0176D3',Completed:'#2E844A',Overdue:'#DC2626'};
  var total=TASKS.length;
  var html='';
  ['Open','In Progress','Completed','Overdue'].forEach(function(s){
    var c=byStatus[s]||0;if(c===0)return;
    var pct=Math.round(c/total*100);
    html+='<div class="dk-legend-row"><div class="dk-legend-dot" style="background:'+(colors[s]||'#94A3B8')+'"></div><div class="dk-legend-name">'+esc(s)+'</div><div class="dk-legend-val">'+c+' ('+pct+'%)</div></div>';
  });
  document.getElementById('tasks-ov').innerHTML=html;
}

/* ── Pipeline Summary (numbers per stage) ── */
function renderKanban(){
  var stageData=[];
  var leadToStage={New:'New Lead',Contacted:'Qualification',Qualified:'Needs Analysis',Proposal:'Proposal',Negotiation:'Negotiation',Won:'Closed Won',Lost:'Closed Lost'};
  STAGES.forEach(function(s){
    var count=0,value=0;
    for(var status in leadToStage){
      if(leadToStage[status]===s.name){
        (LEADS_DATA[status]||[]).forEach(function(l){count++;value+=l.value||0});
      }
    }
    stageData.push({name:s.name,color:s.color||'#0176D3',count:count,value:value});
  });
  if(stageData.length===0){document.getElementById('kanban').innerHTML='<div class="dk-empty">No pipeline stages</div>';return}
  document.getElementById('kanban').innerHTML='<div style="display:flex;gap:10px;flex-wrap:wrap">'+stageData.map(function(s){
    return '<div style="flex:1;min-width:120px;background:var(--surface2);border-radius:10px;padding:12px 14px;text-align:center;border-left:3px solid '+s.color+'">'+
      '<div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px">'+esc(s.name)+'</div>'+
      '<div style="font-size:22px;font-weight:800;color:'+s.color+'">'+s.count+'</div>'+
      '<div style="font-size:10px;color:var(--text2);margin-top:2px">'+fmt(s.value)+'</div>'+
    '</div>';
  }).join('')+'</div>';
}

function renderAll(){renderQA();renderKPIs();renderWonChart();renderPipeline();renderKanban();renderTopOpen();renderStageBreakdown();renderAgentsCompare();renderPipeAgents();renderCustomers();renderTasks();initAnalyticsAgent()}
</script>

x-width:88%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55}.aa-msg.bot{background:var(--surface2);align-self:flex-start;border-bottom-left-radius:4px}.aa-msg.usr{background:#7F56D9;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}.aa-quick{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 8px}.aa-qbtn{padding:4px 10px;border-radius:18px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:500;color:#7F56D9;cursor:pointer;font-family:inherit}.aa-qbtn:hover{background:rgba(127,86,217,.06);border-color:#7F56D9}.aa-input-wrap{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}.aa-input{flex:1;padding:9px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-family:inherit;outline:none}.aa-input:focus{border-color:#7F56D9}.aa-send{width:34px;height:34px;border-radius:50%;border:none;background:#7F56D9;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.aa-send:hover{background:#6842C2}@media(max-width:480px){.aa-panel{width:calc(100vw - 24px);left:12px;bottom:156px}.aa-fab{bottom:80px;right:16px;width:48px;height:48px}}';

function toggleAA(){aaOpen=!aaOpen;document.getElementById('aa-panel').classList.toggle('open',aaOpen)}

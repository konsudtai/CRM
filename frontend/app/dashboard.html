<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — SalesFAST 7 Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ─── TOKENS ─── */
:root{
  --sf-blue:#0176D3; --sf-dark:#014486; --sf-light:#1B96FF;
  --blue:#0176D3; --blue-d:#014486; --blue-l:#1B96FF;
  --green:#2E844A; --green-d:#236B3E; --green-l:#4BCA81;
  --teal:#0B827C; --teal-l:#1ECAD3;
  --orange:#D97706; --red:#DC2626; --purple:#7C3AED;
  --nav-h:52px; --tab-h:40px; --total-nav:92px;
  --nav-grad:linear-gradient(135deg,#032D60 0%,#014486 55%,#0176D3 100%);
}
[data-theme="light"]{
  --bg:#F3F6FA; --surface:#fff; --surface2:#F5F7FB; --surface3:#E8EDF5;
  --text:#0A1628; --text2:#3B5068; --text3:#8A9DB5;
  --border:#D4DCE8; --border2:#B8C8DC;
  --topbar-bg:#fff; --topbar-border:#D4DCE8;
  --tab-bg:#E3EAF5; --tab-active-bg:#fff; --tab-text:#3B5068; --tab-active-text:#0176D3;
  --shadow:0 1px 4px rgba(1,118,211,0.06),0 4px 16px rgba(1,118,211,0.04);
  --shadow-md:0 4px 20px rgba(1,118,211,0.12),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 8px 40px rgba(1,118,211,0.15);
  --row-hover:rgba(1,118,211,0.04); --kanban-col:#F3F6FA;
  --nav-text:rgba(255,255,255,0.78); --nav-active:rgba(255,255,255,0.18);
  --nav-hover:rgba(255,255,255,0.1); --nav-text-active:#fff;
  --dropdown-bg:#fff;
}
[data-theme="dark"]{
  --bg:#050A14; --surface:#0A1628; --surface2:#0F1D30; --surface3:#152640;
  --text:rgba(255,255,255,0.92); --text2:rgba(255,255,255,0.46); --text3:rgba(255,255,255,0.22);
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --topbar-bg:#0A1628; --topbar-border:rgba(255,255,255,0.07);
  --tab-bg:#0A1628; --tab-active-bg:#0F1D30; --tab-text:rgba(255,255,255,0.42); --tab-active-text:#1B96FF;
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  --shadow-md:0 4px 20px rgba(0,0,0,0.45);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.55);
  --row-hover:rgba(27,150,255,0.05); --kanban-col:rgba(255,255,255,0.03);
  --nav-text:rgba(255,255,255,0.7); --nav-active:rgba(255,255,255,0.15);
  --nav-hover:rgba(255,255,255,0.08); --nav-text-active:#fff;
  --dropdown-bg:#0F1D30;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(1,118,211,0.18);border-radius:3px}

/* ─── NAVBAR ─── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);
  background:var(--nav-grad);
  display:flex;align-items:center;
  box-shadow:0 2px 16px rgba(3,45,96,0.35),0 1px 0 rgba(255,255,255,0.06);
}
.nav-left{display:flex;align-items:center;height:100%;flex-shrink:0}
.app-launcher{width:50px;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:rgba(255,255,255,0.65);transition:all 0.15s;flex-shrink:0}
.app-launcher:hover{background:var(--nav-hover);color:#fff}
.brand-area{display:flex;align-items:center;gap:11px;padding:0 16px 0 6px;height:100%;border-right:1px solid rgba(255,255,255,0.1);cursor:pointer;text-decoration:none}
.brand-name{font-size:17px;font-weight:900;color:#fff;letter-spacing:-0.6px;line-height:1}
.brand-tag{font-size:9px;font-weight:500;color:rgba(255,255,255,0.42);letter-spacing:1.2px;text-transform:uppercase;margin-top:-1px}
.nav-items{display:flex;align-items:center;height:100%;flex:1;overflow:hidden}
.nav-item-wrap{position:relative;height:100%;display:flex;align-items:center}
.nav-item{display:flex;align-items:center;gap:5px;height:100%;padding:0 14px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--nav-text);font-size:13px;font-weight:500;transition:all 0.14s;white-space:nowrap;position:relative}
.nav-item:hover{background:var(--nav-hover);color:var(--nav-text-active)}
.nav-item.active{background:var(--nav-active);color:var(--nav-text-active);font-weight:600}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--sf-light);border-radius:2px 2px 0 0}
.nav-caret{font-size:9px;opacity:0.55;transition:transform 0.15s;display:flex;align-items:center}
.nav-item-wrap:hover .nav-caret{transform:rotate(180deg)}

/* MEGA DROP */
.mega-drop{
  position:absolute;top:100%;left:0;min-width:520px;
  background:var(--dropdown-bg);border-radius:12px;
  box-shadow:var(--shadow-lg);border:1px solid var(--border);
  padding:16px;z-index:300;
  opacity:0;visibility:hidden;transform:translateY(-6px);
  transition:opacity 0.18s,transform 0.18s,visibility 0.18s;
  pointer-events:none;
}
.nav-item-wrap:hover .mega-drop{opacity:1;visibility:visible;transform:translateY(4px);pointer-events:all}
.mega-hd{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.mega-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.mega-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background 0.12s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.mega-item:hover{background:var(--surface3)}
.mega-icon{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mega-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}
.mega-desc{font-size:11px;color:var(--text3);line-height:1.3}
.mega-divider{height:1px;background:var(--border);margin:10px 0}
.mega-recents{display:flex;flex-wrap:wrap;gap:4px}
.mega-rec{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;background:var(--surface3);border:none;font-family:inherit;transition:all 0.12s}
.mega-rec:hover{background:var(--sf-blue);color:#fff}

/* NAV RIGHT */
.nav-right{display:flex;align-items:center;gap:4px;padding:0 12px;flex-shrink:0}
.search-wrap{display:flex;align-items:center;gap:7px;padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:8px;cursor:text;min-width:200px;transition:all 0.18s}
.search-wrap:focus-within{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.38)}
.search-wrap input{border:none;background:none;color:#fff;font-size:13px;outline:none;width:100%;font-family:inherit}
.search-wrap input::placeholder{color:rgba(255,255,255,0.38)}
.util-btn{width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);transition:all 0.14s;position:relative}
.util-btn:hover{background:rgba(255,255,255,0.16);color:#fff}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:#F87171;border-radius:50%;border:2px solid transparent}
.user-pill{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;border-radius:9px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.16);cursor:pointer;transition:all 0.15s;font-family:inherit}
.user-pill:hover{background:rgba(255,255,255,0.18)}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--sf-light),var(--sf-blue));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#fff}
.user-role{font-size:9px;color:rgba(255,255,255,0.42)}

/* TABSTRIP */
.tabstrip{position:fixed;top:var(--nav-h);left:0;right:0;z-index:190;height:var(--tab-h);background:var(--tab-bg);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 18px;gap:2px;overflow-x:auto}
.tabstrip::-webkit-scrollbar{display:none}
.ws-tab{display:flex;align-items:center;gap:7px;padding:0 14px;height:32px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;transition:all 0.15s;font-family:inherit;font-size:12px;font-weight:500;color:var(--tab-text);background:transparent;white-space:nowrap;flex-shrink:0}
.ws-tab:hover{background:var(--surface3);color:var(--text)}
.ws-tab.active{background:var(--tab-active-bg);color:var(--tab-active-text);font-weight:600;border-color:var(--border)}
.ws-tab-close{width:14px;height:14px;border-radius:50%;border:none;background:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:11px;padding:0;line-height:1;transition:background 0.12s}
.ws-tab-close:hover{background:var(--surface3);color:var(--text)}
.tab-add{width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px;transition:all 0.12s;align-self:center;margin-left:4px}
.tab-add:hover{background:var(--surface3);color:var(--text)}

/* APP LAUNCHER MODAL */
.al-modal{position:fixed;top:var(--nav-h);left:0;z-index:400;width:340px;background:var(--dropdown-bg);border-radius:0 12px 12px 0;box-shadow:var(--shadow-lg);border:1px solid var(--border);padding:20px;opacity:0;visibility:hidden;transform:translateX(-16px);transition:all 0.2s}
.al-modal.open{opacity:1;visibility:visible;transform:translateX(0)}
.al-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.al-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.al-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 8px;border-radius:10px;cursor:pointer;transition:background 0.13s;border:none;background:none;font-family:inherit}
.al-item:hover{background:var(--surface3)}
.al-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.al-label{font-size:11px;font-weight:600;color:var(--text);text-align:center}

/* MAIN */
.main{padding-top:var(--total-nav);min-height:100vh}
.page{padding:22px 26px 60px;max-width:1380px}
.page-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:21px;font-weight:800;letter-spacing:-0.4px;color:var(--text)}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* BUTTONS */
.btn-primary{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;background:var(--blue);box-shadow:0 2px 8px rgba(1,118,211,0.3);transition:all 0.15s;font-family:inherit}
.btn-primary:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 4px 16px rgba(1,118,211,0.45)}
.btn-ghost{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);background:var(--surface);transition:all 0.14s;font-family:inherit}
.btn-ghost:hover{border-color:var(--sf-blue);color:var(--sf-blue)}

/* CARDS */
.card{background:var(--surface);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:18px}
.kpi-card{background:var(--surface);border-radius:12px;padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:default;transition:transform 0.18s,box-shadow 0.18s;overflow:hidden;position:relative}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0}
.kpi-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;margin-top:6px}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px}
.kpi-value{font-size:24px;font-weight:800;letter-spacing:-0.8px;color:var(--text);margin-top:4px;line-height:1}
.kpi-foot{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.kpi-trend{font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px}
.kpi-trend.up{color:#2E844A;background:rgba(1,118,211,0.1)}
.kpi-trend.down{color:#DC2626;background:rgba(220,38,38,0.1)}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-prog{margin-top:8px;height:3px;background:var(--surface3);border-radius:2px}
.kpi-bar{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.13s;font-family:inherit}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.on{border-color:var(--blue);background:rgba(1,118,211,0.07);color:var(--blue);font-weight:600}
.pill.on-g{border-color:var(--sf-blue);background:rgba(1,118,211,0.07);color:var(--sf-blue);font-weight:600}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;padding:0 12px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 12px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background 0.1s}
tbody tr:hover{background:var(--row-hover)}
.tlink{color:var(--blue);font-weight:600;text-decoration:none}
.tlink:hover{text-decoration:underline}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(1,118,211,0.08);color:var(--teal);margin:1px 2px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-new{background:rgba(1,118,211,0.09);color:#0176D3}
.b-contacted{background:rgba(1,118,211,0.09);color:#0B827C}
.b-qualified{background:rgba(1,118,211,0.1);color:#2E844A}
.b-proposal{background:rgba(217,119,6,0.09);color:#D97706}
.b-negotiation{background:rgba(220,38,38,0.09);color:#DC2626}
.b-won,.b-active,.b-approved,.b-completed,.b-resolved{background:rgba(1,118,211,0.1);color:#2E844A}
.b-lost,.b-inactive,.b-rejected{background:rgba(107,114,128,0.08);color:var(--text2)}
.b-renewal{background:rgba(124,58,237,0.1);color:#7C3AED}
.b-atrisk,.b-critical{background:rgba(220,38,38,0.1);color:#DC2626}
.b-high{background:rgba(220,38,38,0.1);color:#DC2626}
.b-medium{background:rgba(217,119,6,0.09);color:#D97706}
.b-low{background:rgba(1,118,211,0.1);color:#2E844A}
.b-draft{background:rgba(107,114,128,0.08);color:var(--text2)}
.b-sent{background:rgba(1,118,211,0.09);color:#0176D3}
.b-accepted{background:rgba(1,118,211,0.12);color:#2E844A}
.b-inprogress{background:rgba(1,118,211,0.09);color:#0B827C}
.b-open{background:rgba(217,119,6,0.09);color:#D97706}
.b-assigned{background:rgba(1,118,211,0.08);color:#2E844A}
.b-waiting{background:rgba(124,58,237,0.09);color:#7C3AED}

/* KANBAN */
.kanban-wrap{display:flex;gap:11px;overflow-x:auto;padding-bottom:14px}
.kanban-col{flex-shrink:0;width:220px;background:var(--kanban-col);border-radius:10px;padding:10px;border:1px solid var(--border)}
.kk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.kk-title{font-size:12px;font-weight:700;color:var(--text)}
.kk-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--surface3);color:var(--text2)}
.kk-total{font-size:11px;color:var(--text3);padding:0 2px;margin-bottom:8px}
.kk-card{background:var(--surface);border-radius:8px;padding:11px 12px;margin-bottom:7px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(1,118,211,0.05);cursor:grab;transition:transform 0.16s,box-shadow 0.16s}
.kk-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(1,118,211,0.1)}
.kk-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.kk-company{font-size:11px;color:var(--text2);margin-top:2px}
.kk-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.kk-amount{font-size:12px;font-weight:700;color:var(--blue)}
.kk-date{font-size:10px;color:var(--text3)}
.kk-owner{display:flex;align-items:center;gap:5px;margin-top:6px}
.mini-av{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kk-add{width:100%;padding:7px;border-radius:7px;border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:background 0.13s;font-family:inherit;margin-top:4px}
.kk-add:hover{background:var(--surface);color:var(--text2)}

/* TIMELINE */
.tl{list-style:none}
.tl-item{display:flex;gap:11px;padding-bottom:14px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:14px;top:29px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tl-body{flex:1;padding-top:3px}
.tl-title{font-size:13px;font-weight:500;color:var(--text)}
.tl-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* QA GRID */
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:18px}
.qa-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;transition:all 0.15s}
.qa-btn:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow)}
.qa-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}

/* STAT ROW */
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-bar-wrap{width:120px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.stat-bar{height:100%;border-radius:3px;transition:width 1s ease}
.stat-val{font-size:12px;font-weight:700;color:var(--text);width:70px;text-align:right}

/* SLA */
.sla{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.sla-ok{background:rgba(1,118,211,0.1);color:#2E844A}
.sla-breach{background:rgba(220,38,38,0.1);color:#DC2626}

/* SECTION */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:700;color:var(--text)}
.sec-more{font-size:12px;font-weight:500;color:var(--blue);cursor:pointer;border:none;background:none;font-family:inherit}
.sec-more:hover{text-decoration:underline}

/* ANIMATIONS */

.fu{animation:fadeUp 0.32s cubic-bezier(.25,.46,.45,.94) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}

/* ─── ANIMATED NUMBER ─── */
function AN({ value, fmt, sfx='' }) {
  const [n,setN]=useState(0);
  useEffect(()=>{
    let raf,start;
    const run=ts=>{if(!start)start=ts;const p=Math.min((ts-start)/900,1),e=1-Math.pow(1-p,3);setN(Math.round(e*value));if(p<1)raf=requestAnimationFrame(run);};
    raf=requestAnimationFrame(run);
    return()=>cancelAnimationFrame(raf);
  },[value]);
  return <span>{fmt?fmt(n):n.toLocaleString()}{sfx}</span>;
}

/* ─── REV CHART ─── */
function RevChart({ data }) {
  const W=420,H=100,P=16,max=Math.max(...data);
  const pts=data.map((v,i)=>[P+(i/(data.length-1))*(W-P*2),H-P-(v/max)*(H-P*2)]);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area=`${line} L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:100}}>
      <defs>
        <linearGradient id="rg2p" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0B827C" stopOpacity="0.2"/>
          <stop offset="100%" stopColor="#2E844A" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#rg2p)"/>
      <path d={line} fill="none" stroke="url(#rg2p_stroke)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <defs>
        <linearGradient id="rg2p_stroke" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#0176D3"/>
          <stop offset="100%" stopColor="#2E844A"/>
        </linearGradient>
      </defs>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={i===data.length-1?4:2.5} fill={i===data.length-1?'#2E844A':'#0176D3'} opacity={i===data.length-1?1:0.4}/>)}
      {data.map((_,i)=>{const x=P+(i/(data.length-1))*(W-P*2);return <text key={i} x={x} y={H-1} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="Inter">{MONTHS[i]}</text>;})}
    </svg>
  );
}

  const cls = n>=75?{bg:'rgba(1,118,211,0.1)',c:'#2E844A'}:n>=50?{bg:'rgba(217,119,6,0.09)',c:'#D97706'}:{bg:'rgba(107,114,128,0.08)',c:'var(--text2)'};
  return <span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20,background:cls.bg,color:cls.c}}>{n}</span>;
}

          </tr>

      </table></div>
    </div>
  );
}

function ReportsPage() {
  const sr=Object.entries(OPPS).map(([k,v])=>({name:k,total:v.reduce((s,o)=>s+o.amount,0),color:OC[k]}));
  const maxT=Math.max(...sr.map(s=>s.total));
  return (
    <div className="page">
      <div className="page-hd fu"><div><div className="page-title">รายงาน</div><div className="page-sub">ไตรมาส 2/2026</div></div><div style={{display:'flex',gap:8}}><button className="btn-ghost">ส่งออก CSV</button><button className="btn-primary">บันทึกรายงาน</button></div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div className="card fu d1" style={{padding:'18px 20px'}}><div className="sec-hd"><div className="sec-title">Pipeline ตามขั้นตอน</div></div>
          {sr.map(s=><div key={s.name} className="stat-row"><div style={{display:'flex',alignItems:'center',gap:5,flex:1}}><div style={{width:7,height:7,borderRadius:'50%',background:s.color}}/><span style={{fontSize:12,color:'var(--text)'}}>{s.name}</span></div><div className="stat-bar-wrap"><div className="stat-bar" style={{width:`${maxT>0?(s.total/maxT)*100:0}%`,background:s.color}}/></div><span className="stat-val">{fmtB(s.total)}</span></div>)}
        </div>
        <div className="card fu d2" style={{padding:'18px 20px'}}><div className="sec-hd"><div className="sec-title">รายได้รายเดือน</div></div><RevChart data={MONTHLY}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="card fu d3" style={{padding:'18px 20px'}}><div className="sec-hd"><div className="sec-title">แหล่งที่มาของลีด</div></div>
          {[{n:'Website',c:3,col:'#0176D3'},{n:'Referral',c:3,col:'#2E844A'},{n:'Facebook',c:1,col:'#0B827C'},{n:'Event',c:1,col:'#D97706'}].map(s=>(
            <div key={s.n} className="stat-row"><span style={{flex:1,fontSize:12,color:'var(--text)'}}>{s.n}</span><div className="stat-bar-wrap"><div className="stat-bar" style={{width:`${(s.c/6)*100}%`,background:s.col}}/></div><span className="stat-val">{s.c} ลีด</span></div>
          ))}
        </div>
        <div className="card fu d4" style={{padding:'18px 20px'}}><div className="sec-hd"><div className="sec-title">ลูกค้าตามรายได้</div></div>
          {[...CUSTOMERS].sort((a,b)=>b.revenue-a.revenue).map(c=>(
            <div key={c.id} className="stat-row"><span style={{flex:1,fontSize:12,fontWeight:500,color:'var(--text)'}}>{c.name}</span><div className="stat-bar-wrap"><div className="stat-bar" style={{width:`${(c.revenue/6100000)*100}%`,background:'linear-gradient(90deg,#0176D3,#2E844A)'}}/></div><span className="stat-val">{fmtB(c.revenue)}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

const PAGE_LABELS={dashboard:'แดชบอร์ด',leads:'ลีด',customers:'ลูกค้า',opportunities:'โอกาสการขาย',quotations:'ใบเสนอราคา',tickets:'ทิคเก็ต',tasks:'งาน',reports:'รายงาน'};

/* ─── APP ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"theme":"light"}/*EDITMODE-END*/;

function App() {
  const [theme,setTheme]=useState(()=>localStorage.getItem('salesfast7-theme')||'light');
  const [page,setPage]=useState(()=>localStorage.getItem('salesfast7-page')||'dashboard');
  const [tabs,setTabs]=useState([()=>localStorage.getItem('salesfast7-page')||'dashboard'].map(f=>typeof f==='function'?f():f));
  const [launcherOpen,setLauncherOpen]=useState(false);
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const launcherRef=useRef(null);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('salesfast7-theme',theme);},[theme]);
  useEffect(()=>{ localStorage.setItem('salesfast7-page',page); },[page]);
  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);};
    window.addEventListener('message',h);window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);
  useEffect(()=>{
    const h=e=>{ if(launcherRef.current&&!launcherRef.current.contains(e.target)) setLauncherOpen(false); };
    document.addEventListener('mousedown',h);return ()=>document.removeEventListener('mousedown',h);
  },[]);

  const goto=useCallback(p=>{setPage(p);setTabs(prev=>prev.includes(p)?prev:[...prev.slice(-4),p]);},[]);
  const closeTab=useCallback((p,e)=>{e.stopPropagation();const next=tabs.filter(t=>t!==p);setTabs(next.length?next:['dashboard']);if(page===p)setPage(next[next.length-1]||'dashboard');},[tabs,page]);
  const activeMenu=NAV_MENUS.find(m=>m.key===page||m.items?.some(i=>i.page===page))?.key;

  return (
    <>
      {/* NAVBAR */}
      <nav className="navbar">
        <div className="nav-left">
          <div ref={launcherRef} style={{height:'100%',position:'relative'}}>
            <button className="app-launcher" onClick={()=>setLauncherOpen(o=>!o)} title="App Launcher"><IGrid/></button>
            <div className={`al-modal${launcherOpen?' open':''}`}>
              <div className="al-title">App Launcher</div>
              <div className="al-grid">
                {AL_APPS.map(a=>(
                  <button key={a.l} className="al-item">
                    <div className="al-icon" style={{background:a.bg,color:a.c}}>{a.icon}</div>
                    <div className="al-label">{a.l}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>
          <a href="../landing.html" className="brand-area">
            <LogoSF7 size={34}/>
            <div><div className="brand-name">SalesFAST <span style={{color:'#4BCA81'}}>7</span></div><div className="brand-tag">CRM PLATFORM</div></div>
          </a>
          <div className="nav-items">
            {NAV_MENUS.map(menu=>(
              <div key={menu.key} className="nav-item-wrap">
                <button className={`nav-item${activeMenu===menu.key?' active':''}`} onClick={()=>goto(menu.items[0].page)}>
                  <span dangerouslySetInnerHTML={{__html:menu.label}}/>
                  <span className="nav-caret"><IChevD/></span>
                </button>
                <div className="mega-drop" style={{minWidth:menu.items.length>=5?580:380}}>
                  <div className="mega-hd"><span dangerouslySetInnerHTML={{__html:menu.label}}/></div>
                  <div className="mega-grid" style={{gridTemplateColumns:`repeat(${menu.items.length>=4?3:2},1fr)`}}>
                    {menu.items.map(item=>(
                      <button key={item.name} className="mega-item" onClick={()=>goto(item.page)}>
                        <div className="mega-icon" style={{background:item.iconBg,color:item.iconC}}>{item.icon}</div>
                        <div><div className="mega-name">{item.name}</div><div className="mega-desc">{item.desc}</div></div>
                      </button>
                    ))}
                  </div>
                  {menu.recent?.length>0&&<>
                    <div className="mega-divider"/>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',letterSpacing:'0.8px',textTransform:'uppercase',marginBottom:8}}>เปิดล่าสุด</div>
                    <div className="mega-recents">{menu.recent.map(r=><button key={r} className="mega-rec"><span style={{fontSize:9,opacity:0.6}}>↺</span>{r}</button>)}</div>
                  </>}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="nav-right">
          <div className="search-wrap"><ISearch/><input placeholder="ค้นหาทุกอย่าง... (Ctrl+K)"/></div>
          <button className="util-btn" style={{position:'relative'}} title="การแจ้งเตือน"><IBell/><div className="notif-dot"/></button>
          <button className="util-btn" title="ช่วยเหลือ"><IHelp/></button>
          <button className="util-btn" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?<IMoon/>:<ISun/>}</button>
          <button className="util-btn" title="Setup"><IGear/></button>
          <button className="user-pill">
            <div className="avatar">สจ</div>
            <div style={{textAlign:'left'}}><div className="user-name">สมชาย ใจดี</div><div className="user-role">Sales Manager</div></div>
            <span style={{color:'rgba(255,255,255,0.4)',marginLeft:2,display:'flex'}}><IChevD/></span>
          </button>
        </div>
      </nav>

      {/* TAB STRIP */}
      <div className="tabstrip">
        {tabs.map(t=>(
          <button key={t} className={`ws-tab${page===t?' active':''}`} onClick={()=>goto(t)}>
            <span>{PAGE_LABELS[t]||t}</span>
            {tabs.length>1&&<button className="ws-tab-close" onClick={e=>closeTab(t,e)}>×</button>}
          </button>
        ))}
        <button className="tab-add" title="เปิดแท็บใหม่" onClick={()=>goto('dashboard')}>+</button>
      </div>

      {/* MAIN */}
      <div className="main">
        {page==='dashboard'     &&<Dashboard/>}
        {page==='leads'         &&<LeadsPage/>}
        {page==='customers'     &&<CustomersPage/>}
        {page==='opportunities' &&<OpportunitiesPage/>}
        {page==='quotations'    &&<QuotationsPage/>}
        {page==='tickets'       &&<TicketsPage/>}
        {page==='tasks'         &&<TasksPage/>}
        {page==='reports'       &&<ReportsPage/>}
      </div>

      {/* TWEAKS */}
      {tweaksOpen&&(
        <div style={{position:'fixed',bottom:20,right:20,zIndex:500,background:'var(--surface)',borderRadius:14,padding:20,width:250,boxShadow:'var(--shadow-lg)',border:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>Tweaks</span>
            <button onClick={()=>{setTweaksOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*')}} style={{border:'none',background:'none',cursor:'pointer',color:'var(--text2)',fontSize:18,lineHeight:1}}>×</button>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:8}}>Theme</div>
            <div style={{display:'flex',gap:6}}>
              {[['light','Light'],['dark','Dark']].map(([v,l])=>(
                <button key={v} onClick={()=>setTheme(v)} style={{flex:1,padding:'7px',borderRadius:8,border:`1.5px solid ${theme===v?'var(--blue)':'var(--border)'}`,background:theme===v?'rgba(1,118,211,0.06)':'none',cursor:'pointer',fontSize:12,color:theme===v?'var(--blue)':'var(--text2)',fontFamily:'inherit',fontWeight:theme===v?600:400}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>SalesFAST 7 v2.0 · Blue · Green · White</div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

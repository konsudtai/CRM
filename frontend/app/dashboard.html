<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Dashboard</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
/* Quick Actions */
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:18px}
.qa-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2)}
.qa-btn:hover{border-color:var(--sf-blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.qa-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-icon svg{width:14px;height:14px}
/* KPI */
.kpi5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kc{background:var(--surface);border-radius:12px;padding:16px 18px;border:1px solid var(--border);position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s}
.kc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
.kc-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.kc-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;margin-top:4px}
.kc-icon svg{width:15px;height:15px}
.kc-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.kc-value{font-size:22px;font-weight:800;letter-spacing:-.7px;margin-top:2px;line-height:1}
.kc-foot{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.kc-trend{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.kc-trend.up{color:#2E844A;background:rgba(46,132,74,.08)}.kc-trend.down{color:#C23934;background:rgba(194,57,52,.08)}
.kc-sub{font-size:10px;color:var(--text3)}
.kc-bar{height:2px;background:var(--surface3);border-radius:1px;overflow:hidden;margin-top:7px}
.kc-fill{height:100%;border-radius:1px;transition:width 1.3s ease}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px}
.cd{background:var(--surface);border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
.cd-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cd-title{font-size:13px;font-weight:700;color:var(--text)}
.cd-more{font-size:11px;font-weight:500;color:var(--sf-blue);cursor:pointer;background:none;border:none;font-family:inherit}
.cd-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:rgba(1,118,211,.06);color:var(--sf-blue)}
/* Pipeline bars */
.pb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pb-label{width:90px;font-size:11px;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pb-track{flex:1;height:20px;background:var(--surface3);border-radius:5px;overflow:hidden}
.pb-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width 1.2s ease;min-width:40px}
.pb-cnt{width:18px;font-size:10px;color:var(--text3);text-align:right}
/* Revenue chart */
.rev-chart{width:100%;height:100px}
/* Kanban mini */
.kk-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.kk-col{min-width:180px;flex-shrink:0;background:var(--surface2);border-radius:10px;padding:10px}
.kk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kk-title{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.kk-cnt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;background:var(--surface3);color:var(--text3)}
.kk-total{font-size:10px;color:var(--text3);margin-bottom:8px}
.kk-card{background:var(--surface);border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid var(--border);cursor:grab;transition:transform .15s,box-shadow .15s}
.kk-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.kk-name{font-size:12px;font-weight:600}.kk-company{font-size:10px;color:var(--text3);margin-top:1px}
.kk-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:11px}
.kk-amt{font-weight:700;color:var(--sf-blue)}.kk-date{color:var(--text3)}
/* Customer table */
.ct-name{font-size:13px;font-weight:600}.ct-contact{font-size:11px;color:var(--text2)}
/* Activity timeline */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}.tl-item:last-child{border-bottom:none}
.tl-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:800}
.tl-body{flex:1}.tl-title{font-size:12px;font-weight:500}.tl-meta{font-size:10px;color:var(--text3);margin-top:1px}
@media(max-width:1024px){.qa-grid{grid-template-columns:repeat(3,1fr)}.kpi5{grid-template-columns:repeat(3,1fr)}.g2,.g32{grid-template-columns:1fr}}
@media(max-width:640px){.qa-grid{grid-template-columns:1fr 1fr}.kpi5{grid-template-columns:1fr 1fr}.kk-col{min-width:160px}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim">
  <div class="page-header">
    <div><div class="page-title" data-i18n="dash_title">Dashboard</div><div class="page-subtitle" data-i18n="dash_sub">Sales overview — Updated today</div></div>
    <div style="display:flex;gap:8px"><div class="filter-bar" id="pb"><button class="filter-btn active" onclick="setP('month',this)" data-i18n="dash_month">Month</button><button class="filter-btn" onclick="setP('quarter',this)" data-i18n="dash_quarter">Quarter</button><button class="filter-btn" onclick="setP('year',this)" data-i18n="dash_year">Year</button></div></div>
  </div>
  <div class="qa-grid" id="qa"></div>
  <div class="kpi5" id="kpis"></div>
  <div class="g2"><div class="cd"><div class="cd-hd"><span class="cd-title" data-i18n="pipe_by_stage">Pipeline by Stage</span><span class="cd-badge" id="pipe-total"></span></div><div id="pipeline"></div></div><div class="cd"><div class="cd-hd"><span class="cd-title">Monthly Revenue</span><span class="cd-badge">2026</span></div><svg class="rev-chart" id="rev-chart" viewBox="0 0 420 100"></svg><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:var(--text3)">Jan</span><span style="font-size:10px;font-weight:700;color:var(--sf-blue)" id="ytd-label"></span><span style="font-size:10px;color:var(--text3)">Dec</span></div></div></div>
  <div class="cd" style="margin-bottom:14px"><div class="cd-hd"><span class="cd-title">Opportunity Pipeline</span><span class="cd-more">View Kanban</span></div><div class="kk-wrap" id="kanban"></div></div>
  <div class="g32"><div class="cd"><div class="cd-hd"><span class="cd-title">Customers & Revenue</span><span class="cd-more">View All</span></div><div class="table-wrap"><table><thead><tr><th>Company</th><th>Status</th><th>Revenue</th><th>Last Contact</th></tr></thead><tbody id="cust-table"></tbody></table></div></div><div class="cd"><div class="cd-hd"><span class="cd-title">Recent Activity</span></div><div id="timeline"></div></div></div>

</div>
<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('dashboard');
let P='month';
const MD=[2.1,2.8,3.2,2.9,3.8,4.1,3.5,4.6,5.2,4.8,5.9,4.3];
const ML=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const OC={'New Lead':'#64748B','Qualification':'#0176D3','Needs Analysis':'#0B827C','Proposal':'#DD7A01','Negotiation':'#C23934','Closed Won':'#2E844A','Closed Lost':'#9CA3AF'};
const OPPS_K={'New Lead':[{n:'CRM — Pornchai',c:'Pornchai Materials',a:320000,d:'30 Jun',o:'Manee'}],'Qualification':[{n:'Cloud POS — Thai Foods',c:'Thai Foods Group',a:680000,d:'15 May',o:'Wilai'},{n:'AI Platform — EL',c:'Eastern Logistics',a:950000,d:'20 May',o:'Arun'}],'Needs Analysis':[{n:'CRM+Support — Sukjai',c:'Sukjai Hospital',a:1200000,d:'31 May',o:'Arun'}],'Proposal':[{n:'CRM — ProClinic',c:'ProClinic Group',a:850000,d:'30 May',o:'Somchai'},{n:'ERP+CRM — Unique',c:'Unique Mfg',a:1800000,d:'10 Jun',o:'Somchai'}],'Negotiation':[{n:'Enterprise CRM — Srisomboon',c:'Srisomboon Group',a:2500000,d:'05 May',o:'Wilai'}],'Closed Won':[{n:'CRM — Petdee',c:'Petdee Intl',a:1800000,d:'25 Apr',o:'Somchai'}]};
const CUSTS=[{n:'Srisomboon Group',c:'Khun Nattaya',s:'Active',r:6100000,l:'25 Apr'},{n:'Petdee International',c:'Khun Tanit',s:'Active',r:5400000,l:'22 Apr'},{n:'ProClinic Group',c:'Khun Nicha',s:'Active',r:4200000,l:'25 Apr'},{n:'Eastern Logistics',c:'Khun Apinya',s:'Renewal',r:3600000,l:'23 Apr'},{n:'Thai Foods Group',c:'Khun Somkit',s:'Active',r:2800000,l:'24 Apr'}];
const ACTS=[{bg:'rgba(1,118,211,.08)',c:'#0176D3',lbl:'CL',title:'Call follow-up — ProClinic Group',who:'Somchai',when:'Today 10:30'},{bg:'rgba(11,130,124,.08)',c:'#0B827C',lbl:'EM',title:'Sent revised quotation — Unique Mfg',who:'Somchai',when:'Today 09:15'},{bg:'rgba(46,132,74,.08)',c:'#2E844A',lbl:'MT',title:'Meeting — Eastern Logistics',who:'Arun',when:'Yesterday 14:00'},{bg:'rgba(221,122,1,.08)',c:'#DD7A01',lbl:'NT',title:'Negotiation notes — Srisomboon',who:'Wilai',when:'Yesterday 11:30'},{bg:'rgba(194,57,52,.08)',c:'#C23934',lbl:'TK',title:'Urgent ticket — Eastern Logistics',who:'Support',when:'Yesterday 09:00'}];
const SV=k=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${{
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  dollar:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  ticket:'<path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 002 2 2 2 0 010 4 2 2 0 00-2 2v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 00-2-2 2 2 0 010-4 2 2 0 002-2V7a2 2 0 00-2-2H5z"/>',
  chart:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  lead:'<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  doc:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  phone:'<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>',
  note:'<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>',
}[k]}</svg>`;

function setP(p,b){P=p;document.querySelectorAll('#pb .filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAll()}

function renderQA(){
  const items=[{l:'New Lead',c:'#0176D3',bg:'rgba(1,118,211,.06)',i:'lead',href:'leads.html'},{l:'Add Customer',c:'#2E844A',bg:'rgba(46,132,74,.06)',i:'users',href:'accounts.html'},{l:'Quotation',c:'#DD7A01',bg:'rgba(221,122,1,.06)',i:'doc',href:'quotations.html'},{l:'Log Call',c:'#7F56D9',bg:'rgba(127,86,217,.06)',i:'phone',href:'tasks.html'},{l:'Calendar',c:'#0B827C',bg:'rgba(11,130,124,.06)',i:'target',href:'calendar.html'},{l:'Products',c:'#C23934',bg:'rgba(194,57,52,.06)',i:'note',href:'products.html'}];
  document.getElementById('qa').innerHTML=items.map(q=>`<a href="${q.href}" class="qa-btn" style="text-decoration:none"><div class="qa-icon" style="background:${q.bg};color:${q.c}">${SV(q.i)}</div><span style="color:${q.c}">${q.l}</span></a>`).join('');
}

function renderKPIs(){
  const k=MOCK_KPI[P],pct=Math.min((k.closed/k.target)*100,100);
  const totalPipe=Object.values(OPPS_K).flat().reduce((s,o)=>s+o.a,0);
  const items=[
    {l:'Pipeline Value',v:fmt(totalPipe),c:'#0176D3',bg:'rgba(1,118,211,.06)',i:'target',tr:'+18%',d:'up',sub:'All stages',bar:72},
    {l:'Closed Won',v:fmt(k.closed),c:'#2E844A',bg:'rgba(46,132,74,.06)',i:'dollar',tr:'+24%',d:'up',sub:'vs last period',bar:pct},
    {l:'Active Customers',v:'6',c:'#0B827C',bg:'rgba(11,130,124,.06)',i:'users',tr:'+3',d:'up',sub:'of 8 accounts',bar:75},
    {l:'Open Tickets',v:'3',c:'#C23934',bg:'rgba(194,57,52,.06)',i:'ticket',tr:'1 breach',d:'down',sub:'Needs attention',bar:30},
    {l:'Conversion',v:k.conv+'%',c:'#DD7A01',bg:'rgba(221,122,1,.06)',i:'chart',tr:'+2.4pt',d:'up',sub:'Benchmark 22%',bar:k.conv},
  ];
  document.getElementById('kpis').innerHTML=items.map(i=>`<div class="kc"><div class="kc-stripe" style="background:${i.c}"></div><div class="kc-icon" style="background:${i.bg};color:${i.c}">${SV(i.i)}</div><div class="kc-label">${i.l}</div><div class="kc-value">${i.v}</div><div class="kc-foot"><span class="kc-trend ${i.d}">${i.d==='up'?'&#9650;':'&#9660;'} ${i.tr}</span><span class="kc-sub">${i.sub}</span></div><div class="kc-bar"><div class="kc-fill" style="width:${i.bar}%;background:${i.c}"></div></div></div>`).join('');
}

function renderPipeline(){
  const stages=Object.entries(OPPS_K).map(([k,v])=>({name:k,total:v.reduce((s,o)=>s+o.a,0),count:v.length,color:OC[k]}));
  const max=Math.max(...stages.map(s=>s.total));
  const total=stages.reduce((s,x)=>s+x.total,0);
  document.getElementById('pipe-total').textContent=fmt(total);
  document.getElementById('pipeline').innerHTML=stages.map(s=>`<div class="pb-row"><div class="pb-label">${s.name}</div><div class="pb-track">${s.total>0?`<div class="pb-fill" style="width:${(s.total/max)*100}%;background:${s.color}">${fmt(s.total)}</div>`:''}</div><div class="pb-cnt">${s.count}</div></div>`).join('');
}

function renderRevChart(){
  const W=420,H=100,P=16,max=Math.max(...MD);
  const pts=MD.map((v,i)=>[P+(i/(MD.length-1))*(W-P*2),H-P-(v/max)*(H-P*2)]);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area=`${line} L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z`;
  const ytd=MD.slice(0,new Date().getMonth()+1).reduce((s,v)=>+(s+v).toFixed(1),0);
  document.getElementById('ytd-label').textContent='YTD '+String.fromCharCode(3647)+ytd+'M';
  document.getElementById('rev-chart').innerHTML=`<defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0176D3" stop-opacity=".18"/><stop offset="100%" stop-color="#0176D3" stop-opacity="0"/></linearGradient><linearGradient id="rs" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0176D3"/><stop offset="100%" stop-color="#2E844A"/></linearGradient></defs><path d="${area}" fill="url(#rg)"/><path d="${line}" fill="none" stroke="url(#rs)" stroke-width="2" stroke-linecap="round"/>${pts.map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="${i===MD.length-1?3.5:2}" fill="${i===MD.length-1?'#2E844A':'#0176D3'}" opacity="${i===MD.length-1?1:.35}"/>`).join('')}${MD.map((_,i)=>{const x=P+(i/(MD.length-1))*(W-P*2);return`<text x="${x}" y="${H-1}" text-anchor="middle" font-size="7" fill="var(--text3)" font-family="Inter">${ML[i]}</text>`}).join('')}`;
}

function renderKanban(){
  document.getElementById('kanban').innerHTML=Object.entries(OPPS_K).slice(0,6).map(([stage,opps])=>`<div class="kk-col"><div class="kk-head"><div class="kk-title"><span style="width:6px;height:6px;border-radius:50%;background:${OC[stage]}"></span>${stage}</div><span class="kk-cnt">${opps.length}</span></div><div class="kk-total">${fmt(opps.reduce((s,o)=>s+o.a,0))}</div>${opps.map(o=>`<div class="kk-card"><div class="kk-name">${o.n}</div><div class="kk-company">${o.c}</div><div class="kk-foot"><span class="kk-amt">${fmt(o.a)}</span><span class="kk-date">${o.d}</span></div></div>`).join('')}${opps.length===0?'<div style="text-align:center;padding:12px;color:var(--text3);font-size:11px">Empty</div>':''}</div>`).join('');
}

function renderCustomers(){
  const bc={'Active':'rgba(46,132,74,.08);color:#2E844A','Renewal':'rgba(127,86,217,.08);color:#7F56D9','At Risk':'rgba(194,57,52,.08);color:#C23934'};
  document.getElementById('cust-table').innerHTML=CUSTS.map(c=>`<tr><td><div class="ct-name">${c.n}</div><div class="ct-contact">${c.c}</div></td><td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:${bc[c.s]||bc.Active}">${c.s}</span></td><td style="font-weight:700;color:var(--sf-blue)">${fmt(c.r)}</td><td style="font-size:11px;color:var(--text3)">${c.l}</td></tr>`).join('');
}

function renderTimeline(){
  document.getElementById('timeline').innerHTML=ACTS.map(a=>`<div class="tl-item"><div class="tl-icon" style="background:${a.bg};color:${a.c}">${a.lbl}</div><div class="tl-body"><div class="tl-title">${a.title}</div><div class="tl-meta">${a.who} / ${a.when}</div></div></div>`).join('');
}

function renderAll(){renderQA();renderKPIs();renderPipeline();renderRevChart();renderKanban();renderCustomers();renderTimeline();initAnalyticsAgent()}
renderAll();

// ── Analytics Agent (floating widget — Dashboard only) ──
function initAnalyticsAgent(){
  var s=document.createElement('style');
  s.textContent=`
.aa-fab{position:fixed;bottom:96px;right:24px;z-index:900;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7F56D9,#0B827C);box-shadow:0 4px 20px rgba(127,86,217,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border:3px solid #fff;padding:0}
.aa-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(127,86,217,.5)}
.aa-fab:active{transform:scale(.95)}
.aa-fab svg{width:24px;height:24px;color:#fff}
.aa-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#DD7A01;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.aa-panel{position:fixed;bottom:168px;right:24px;z-index:901;width:400px;max-height:520px;background:var(--surface,#fff);border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.18);border:1px solid var(--border,#D4DAE3);display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(12px) scale(.95);transition:all .2s;overflow:hidden}
.aa-panel.open{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.aa-header{background:linear-gradient(135deg,#7F56D9,#0B827C);padding:14px 16px;display:flex;align-items:center;gap:10px}
.aa-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.aa-avatar svg{width:18px;height:18px;color:#fff}
.aa-hname{font-size:14px;font-weight:700;color:#fff}
.aa-hstatus{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}
.aa-hstatus span{width:6px;height:6px;border-radius:50%;background:#4BCA81}
.aa-close{width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;margin-left:auto}
.aa-close:hover{background:rgba(255,255,255,.2);color:#fff}
.aa-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:180px;max-height:320px}
.aa-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.55}
.aa-msg.bot{background:var(--surface2,#F7F9FB);color:var(--text,#16171A);align-self:flex-start;border-bottom-left-radius:4px}
.aa-msg.usr{background:#7F56D9;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.aa-quick{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 8px}
.aa-qbtn{padding:4px 10px;border-radius:18px;border:1px solid var(--border,#D4DAE3);background:var(--surface,#fff);font-size:11px;font-weight:500;color:#7F56D9;cursor:pointer;font-family:inherit;transition:all .15s}
.aa-qbtn:hover{background:rgba(127,86,217,.06);border-color:#7F56D9}
.aa-input-wrap{padding:10px 14px;border-top:1px solid var(--border,#D4DAE3);display:flex;gap:8px}
.aa-input{flex:1;padding:9px 14px;border-radius:24px;border:1.5px solid var(--border,#D4DAE3);background:var(--surface2,#F7F9FB);font-size:13px;font-family:inherit;color:var(--text,#16171A);outline:none}
.aa-input:focus{border-color:#7F56D9}
.aa-input::placeholder{color:var(--text3,#8E9BAE)}
.aa-send{width:34px;height:34px;border-radius:50%;border:none;background:#7F56D9;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aa-send:hover{background:#6842C2}
@media(max-width:480px){.aa-panel{width:calc(100vw - 24px);left:12px;bottom:156px}.aa-fab{bottom:80px;right:16px;width:48px;height:48px}}`;

var aaOpen=false;
function toggleAA(){aaOpen=!aaOpen;document.getElementById('aa-panel').classList.toggle('open',aaOpen)}
function addAA(type,text){var m=document.getElementById('aa-msgs'),d=document.createElement('div');d.className='aa-msg '+type;d.innerHTML=text;m.appendChild(d);m.scrollTop=m.scrollHeight}
function askAA(){
  var inp=document.getElementById('aa-input'),q=inp.value.trim();if(!q)return;inp.value='';
  addAA('usr',esc(q));
  var ty=document.createElement('div');ty.id='aa-ty';ty.style.cssText='padding:8px;align-self:flex-start;display:flex;gap:4px';
  ty.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:var(--text3);animation:co-dot .6s ease infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--text3);animation:co-dot .6s ease infinite;animation-delay:.1s"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--text3);animation:co-dot .6s ease infinite;animation-delay:.2s"></span>';
  document.getElementById('aa-msgs').appendChild(ty);
  setTimeout(function(){var e=document.getElementById('aa-ty');if(e)e.remove();addAA('bot',getAAReply(q))},1500);
}

}

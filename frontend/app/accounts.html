<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Accounts</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.form-grid,.form-grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>

<div class="page anim">
  <div class="page-header">
    <div>
      <div class="page-title" data-i18n="acc_title">Accounts</div>
      <div class="page-subtitle"><span data-i18n="acc_sub">Manage all customer accounts</span> — <span id="count">0</span> <span data-i18n="acc_records">records</span></div>
    </div>
    <button class="btn btn-primary" onclick="openCreate()" data-i18n="acc_new">+ New Account</button>
  </div>

  <!-- List View -->
  <div class="card" id="list-view">
    <input class="search-input" id="search" data-i18n-placeholder="acc_search" placeholder="Search company name, tax ID, industry..." style="margin-bottom:16px" oninput="clearTimeout(window._searchTimer);window._searchTimer=setTimeout(renderTable,300)"/>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="acc_company">Company</th>
          <th data-i18n="acc_taxid">Tax ID</th>
          <th data-i18n="acc_industry">Industry</th>
          <th data-i18n="acc_phone">Phone</th>
          <th data-i18n="acc_status">Status</th>
          <th data-i18n="acc_tier">Tier</th>
          <th data-i18n="acc_revenue">Revenue</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Create Form -->
  <div id="form-view" style="display:none">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="closeForm()" style="padding:6px 12px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="btn_back">Back</span>
      </button>
      <div class="page-title" data-i18n="acc_form_title">New Account</div>
    </div>
    <form onsubmit="saveAccount(event)">
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_company">Company Information</div>
        <div class="form-grid">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_name_th">Company Name (TH)</label><input class="sf7-form-input" id="f-name" required/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_name_en">Company Name (EN)</label><input class="sf7-form-input" id="f-name-en"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_type">Company Type</label><select class="sf7-form-input" id="f-type"><option value="">--</option><option>บจก.</option><option>หจก.</option><option>บมจ.</option><option>ร้านค้า</option><option>บุคคลธรรมดา</option></select></div>
        </div>
        <div class="form-grid-2" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_industry">Industry</label><input class="sf7-form-input" id="f-industry"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_desc">Business Description</label><input class="sf7-form-input" id="f-desc"/></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_tax">Tax & Registration</div>
        <div class="form-grid">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_tax_label">Tax ID (13 digits)</label><input class="sf7-form-input" id="f-tax" maxlength="13"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_branch">Branch Code</label><input class="sf7-form-input" id="f-branch" value="00000"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_branch_name">Branch Name</label><input class="sf7-form-input" id="f-branch-name"/></div>
        </div>
        <div class="form-grid" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_capital">Registered Capital (THB)</label><input class="sf7-form-input" id="f-capital" type="number"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_reg_date">Registration Date</label><input class="sf7-form-input" id="f-reg-date" type="date"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_reg_no">Registration No.</label><input class="sf7-form-input" id="f-reg-no"/></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_contact">Contact Information</div>
        <div class="form-grid">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_phone">Phone</label><input class="sf7-form-input" id="f-phone"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_phone2">Phone 2</label><input class="sf7-form-input" id="f-phone2"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_fax">Fax</label><input class="sf7-form-input" id="f-fax"/></div>
        </div>
        <div class="form-grid" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_email">Email</label><input class="sf7-form-input" id="f-email" type="email"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_website">Website</label><input class="sf7-form-input" id="f-website"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_line">LINE OA ID</label><input class="sf7-form-input" id="f-line"/></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_address">Registered Address</div>
        <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_addr">Address</label><textarea class="sf7-form-input" id="f-addr" rows="2"></textarea></div>
        <div class="form-grid" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_subdistrict">Sub-district</label><input class="sf7-form-input" id="f-sub"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_district">District</label><input class="sf7-form-input" id="f-dist"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_province">Province</label><input class="sf7-form-input" id="f-prov"/></div>
        </div>
        <div class="form-grid" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_zip">Postal Code</label><input class="sf7-form-input" id="f-zip" maxlength="5"/></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_sales">Sales Information</div>
        <div class="form-grid">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_source">Account Source</label><select class="sf7-form-input" id="f-source"><option value="">--</option><option>Website</option><option>Referral</option><option>Event</option><option>Cold Call</option><option>LINE</option><option>Facebook</option></select></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_tier">Account Tier</label><select class="sf7-form-input" id="f-tier"><option value="standard">Standard</option><option value="silver">Silver</option><option value="gold">Gold</option><option value="platinum">Platinum</option></select></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_credit_term">Credit Term (days)</label><input class="sf7-form-input" id="f-credit" type="number" value="30"/></div>
        </div>
        <div class="form-grid-2" style="margin-top:12px">
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_credit_limit">Credit Limit (THB)</label><input class="sf7-form-input" id="f-limit" type="number"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label" data-i18n="acc_payment">Payment Method</label><select class="sf7-form-input" id="f-payment"><option value="">--</option><option>Transfer</option><option>Cheque</option><option>Cash</option><option>Credit</option></select></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)" data-i18n="acc_form_notes">Internal Notes</div>
        <div class="sf7-form-group"><textarea class="sf7-form-input" id="f-notes" rows="3"></textarea></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button type="button" class="btn btn-secondary" onclick="closeForm()" data-i18n="btn_cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" data-i18n="btn_save">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('accounts');

async function renderTable() {
  var q = (document.getElementById('search').value || '').toLowerCase();
  try {
    var res = await apiFetch('/accounts?search=' + encodeURIComponent(q) + '&limit=100');
    var f = res.data || res || [];
  } catch(e) { var f = []; }
  document.getElementById('count').textContent = f.length;
  document.getElementById('tbody').innerHTML = f.map(function(a) {
    return '<tr>' +
      '<td><a href="account-detail.html?id=' + a.id + '" class="table-link">' + esc(a.company_name || a.name || '') + '</a></td>' +
      '<td style="color:var(--text2);font-size:12px;font-family:monospace">' + esc(a.tax_id || '-') + '</td>' +
      '<td style="color:var(--text2)">' + esc(a.industry || '-') + '</td>' +
      '<td style="color:var(--text2);font-size:12px">' + esc(a.phone || '-') + '</td>' +
      '<td><span class="status-badge" style="background:rgba(46,132,74,.1);color:#2E844A">' + esc(a.account_status || 'active') + '</span></td>' +
      '<td><span class="tag">' + esc(a.account_tier || 'standard') + '</span></td>' +
      '<td style="font-weight:600;color:var(--sf-blue)">' + fmt(a.total_revenue || 0) + '</td>' +
      '</tr>';
  }).join('') || '<tr><td colspan="7" class="empty-state">No accounts found — click "+ New Account" to add one</td></tr>';
}

function openCreate() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('form-view').style.display = 'block';
  document.querySelectorAll('#form-view input, #form-view textarea, #form-view select').forEach(function(el) {
    if (el.id === 'f-branch') el.value = '00000';
    else if (el.id === 'f-credit') el.value = '30';
    else if (el.id === 'f-tier') el.value = 'standard';
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  window.scrollTo(0, 0);
}

function closeForm() {
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

async function saveAccount(e) {
  e.preventDefault();
  var data = {
    companyName: document.getElementById('f-name').value,
    industry: document.getElementById('f-industry').value || null,
    taxId: document.getElementById('f-tax').value || null,
    phone: document.getElementById('f-phone').value || null,
    email: document.getElementById('f-email').value || null,
    accountTier: document.getElementById('f-tier').value || 'standard',
  };
  // Get optional fields if they exist
  var fields = {
    'f-name-en': 'companyNameEn', 'f-type': 'companyType', 'f-branch': 'branchCode',
    'f-branch-name': 'branchName', 'f-fax': 'fax', 'f-website': 'website',
    'f-address': 'address', 'f-subdistrict': 'subDistrict', 'f-district': 'district',
    'f-province': 'province', 'f-postal': 'postalCode', 'f-credit': 'creditTerm',
    'f-notes': 'internalNotes',
  };
  for (var fid in fields) {
    var el = document.getElementById(fid);
    if (el && el.value) data[fields[fid]] = el.value;
  }

  try {
    await apiFetch('/accounts', { method: 'POST', body: JSON.stringify(data) });
    closeForm();
    renderTable();
  } catch(err) {
    alert('Error saving account: ' + err.message);
  }
}

renderTable();
</script>
</body>
</html>

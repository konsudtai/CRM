<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — บัญชีลูกค้า</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title">บัญชีลูกค้า</div><div class="page-subtitle">จัดการบัญชีลูกค้าทั้งหมด — <span id="count"></span> รายการ</div></div><button class="btn btn-primary">+ สร้างบัญชี</button></div>
  <div class="card"><input class="search-input" id="search" placeholder="ค้นหาชื่อบริษัท, อุตสาหกรรม..." style="margin-bottom:20px" oninput="render()"/>
    <table><thead><tr><th>ชื่อบริษัท</th><th>อุตสาหกรรม</th><th>โทรศัพท์</th><th>รายได้</th><th>แท็ก</th></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>
<script src="../js/helpers.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('accounts');
function render(){const q=(document.getElementById('search').value||'').toLowerCase();const f=ACCOUNTS.filter(a=>a.name.toLowerCase().includes(q)||a.industry.toLowerCase().includes(q));document.getElementById('count').textContent=f.length;document.getElementById('tbody').innerHTML=f.map(a=>`<tr><td><a href="#" class="table-link">${a.name}</a></td><td style="color:var(--text2)">${a.industry}</td><td style="color:var(--text2);font-size:12px">${a.phone}</td><td style="font-weight:600;color:var(--sf-blue)">${fmt(a.revenue)}</td><td>${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</td></tr>`).join('')||'<tr><td colspan="5" class="empty-state">ไม่พบบัญชีลูกค้า</td></tr>';}
render();
</script></body></html>

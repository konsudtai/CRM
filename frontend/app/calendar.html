<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — ปฏิทิน</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <!-- Calendar View -->
  <div id="cal-view">
    <div class="page-header"><div><div class="page-title reveal" data-i18n="cal_title">ปฏิทิน</div><div class="page-subtitle reveal" data-i18n="cal_subtitle">ดูงาน นัดหมาย และการประชุม</div></div>
      <div class="page-actions"><a href="tasks.html" class="btn btn-secondary">รายการงาน</a><button class="btn btn-primary" onclick="openTaskForm()">+ สร้างงาน</button></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-secondary" style="padding:6px 12px" onclick="navMonth(-1)">&#8592;</button>
        <span id="month-label" style="font-size:14px;font-weight:600;min-width:180px;text-align:center"></span>
        <button class="btn btn-secondary" style="padding:6px 12px" onclick="navMonth(1)">&#8594;</button>
        <button class="btn btn-secondary" style="padding:6px 12px;color:var(--sf-blue)" onclick="goToday()">วันนี้</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden" id="cal"><div style="text-align:center;padding:40px;color:var(--text3)">Loading...</div></div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--text3);flex-wrap:wrap">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:4px"></span>High</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:4px"></span>Medium</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text3);margin-right:4px"></span>Low</span>
    </div>
  </div>

  <!-- Create Task Form -->
  <div id="task-form" style="display:none">
    <div class="page-header"><div><div class="page-title reveal">สร้างงานใหม่</div><div class="page-subtitle reveal">เพิ่มงานหรือนัดหมายลงปฏิทิน</div></div>
      <div class="page-actions"><button class="btn btn-secondary" onclick="closeTaskForm()">ยกเลิก</button><button class="btn btn-primary" onclick="saveTask()" id="btn-save-cal">บันทึก</button></div>
    </div>
    <div class="card" style="padding:32px;max-width:640px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(1,118,211,.08);display:flex;align-items:center;justify-content:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--sf-blue)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div><div style="font-size:15px;font-weight:700;color:var(--text)">รายละเอียดงาน</div><div style="font-size:11px;color:var(--text3)">กรอกข้อมูลงานที่ต้องทำ</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:18px">
        <div class="sf7-form-group"><label class="sf7-form-label">ชื่องาน *</label><input type="text" class="sf7-form-input" id="t-title" placeholder="เช่น ประชุมลูกค้า, โทรติดตาม, ส่ง Quotation"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="sf7-form-group"><label class="sf7-form-label">วันกำหนด *</label><input type="date" class="sf7-form-input" id="t-due"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label">ความสำคัญ</label>
            <select class="sf7-form-input" id="t-priority">
              <option value="High">สูง (High)</option><option value="Medium" selected>ปานกลาง (Medium)</option><option value="Low">ต่ำ (Low)</option>
            </select>
          </div>
        </div>
        <div class="sf7-form-group"><label class="sf7-form-label">ลูกค้า (Customer)</label>
          <select class="sf7-form-input" id="t-account"><option value="">-- ไม่ระบุ --</option></select>
        </div>
        <div class="sf7-form-group"><label class="sf7-form-label">รายละเอียด</label><textarea class="sf7-form-input" id="t-desc" rows="4" placeholder="รายละเอียดเพิ่มเติม เช่น หัวข้อที่ต้องคุย, เอกสารที่ต้องเตรียม..." style="resize:vertical"></textarea></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/motion.js"></script><script src="../js/helpers.js"></script><script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('calendar');
if(!requireAuth()) throw 'auth';

var THAI_DAYS=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
var THAI_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
var cur=new Date();

function navMonth(d){cur.setMonth(cur.getMonth()+d);renderCal()}
function goToday(){cur=new Date();renderCal()}

function getTasksForDate(y,m,d){
  return TASKS.filter(function(t){
    if(!t.due_date)return false;
    var dd=new Date(t.due_date);
    return dd.getFullYear()===y && dd.getMonth()===m && dd.getDate()===d;
  });
}

function renderCal(){
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('month-label').textContent=THAI_MONTHS[m]+' '+(y+543);
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  var cells='';
  for(var i=0;i<first;i++)cells+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=days;d++){
    var isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    var dayTasks=getTasksForDate(y,m,d);
    var dots='';
    if(dayTasks.length>0){
      dots='<div style="display:flex;gap:3px;margin-top:2px;flex-wrap:wrap">';
      dayTasks.forEach(function(t){
        var c=t.priority==='High'?'var(--red)':t.priority==='Medium'?'var(--orange)':'var(--text3)';
        var label=esc(t.title);
        if(label.length>12)label=label.substring(0,12)+'...';
        dots+='<div style="font-size:9px;padding:1px 4px;border-radius:3px;background:'+c+';color:#fff;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis" title="'+esc(t.title)+'">'+label+'</div>';
      });
      dots+='</div>';
    }
    cells+='<div class="cal-cell'+(isToday?' today':'')+'" onclick="openTaskForm('+y+','+(m+1)+','+d+')"><span class="cal-date">'+d+'</span>'+dots+'</div>';
  }
  document.getElementById('cal').innerHTML='<div class="cal-header">'+THAI_DAYS.map(function(d){return '<div class="cal-header-cell">'+d+'</div>'}).join('')+'</div><div class="cal-grid">'+cells+'</div>';
}

async function openTaskForm(y,m,d){
  document.getElementById('t-title').value='';
  document.getElementById('t-desc').value='';
  document.getElementById('t-priority').value='Medium';
  if(y&&m&&d){
    document.getElementById('t-due').value=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }else{
    document.getElementById('t-due').value=new Date().toISOString().slice(0,10);
  }
  // Populate accounts dropdown
  if(ACCOUNTS.length===0) await loadAccounts();
  document.getElementById('t-account').innerHTML='<option value="">-- ไม่ระบุ --</option>'+ACCOUNTS.map(function(a){
    return '<option value="'+a.id+'">'+esc(a.customer_code?a.customer_code+' — ':'')+esc(a.company_name)+'</option>';
  }).join('');
  document.getElementById('cal-view').style.display='none';
  document.getElementById('task-form').style.display='block';
  window.scrollTo(0,0);
}

function closeTaskForm(){
  document.getElementById('task-form').style.display='none';
  document.getElementById('cal-view').style.display='block';
}

async function saveTask(){
  var title=document.getElementById('t-title').value.trim();
  var due=document.getElementById('t-due').value;
  if(!title){alert('กรุณาใส่ชื่องาน');return}
  if(!due){alert('กรุณาเลือกวันกำหนด');return}

  var btn=document.getElementById('btn-save-cal');
  btn.disabled=true; btn.textContent='กำลังบันทึก...';

  try {
    var body={
      title:title,
      description:document.getElementById('t-desc').value.trim(),
      dueDate:due,
      priority:document.getElementById('t-priority').value,
      accountId:document.getElementById('t-account').value||null
    };
    await apiFetch('/tasks', { method:'POST', body:JSON.stringify(body) });
    closeTaskForm();
    await loadTasks();
    renderCal();
  } catch(err) {
    alert('Error: '+err.message);
  } finally {
    btn.disabled=false; btn.textContent='บันทึก';
  }
}

// Initial load
loadTasks().then(function(){renderCal()});
</script></body></html>

<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — ปฏิทิน</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title">ปฏิทิน</div><div class="page-subtitle">ดูงาน นัดหมาย และการประชุม</div></div>
    <div class="page-actions"><a href="tasks.html" class="btn btn-secondary">รายการงาน</a><button class="btn btn-primary">+ สร้างงาน</button></div></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-secondary" style="padding:6px 12px" onclick="navMonth(-1)">←</button>
      <span id="month-label" style="font-size:14px;font-weight:600;min-width:180px;text-align:center"></span>
      <button class="btn btn-secondary" style="padding:6px 12px" onclick="navMonth(1)">→</button>
      <button class="btn btn-secondary" style="padding:6px 12px;color:var(--sf-blue)" onclick="goToday()">วันนี้</button>
    </div>
    <div class="filter-bar"><button class="filter-btn">วัน</button><button class="filter-btn">สัปดาห์</button><button class="filter-btn active">เดือน</button></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden" id="cal"></div>
</div>
<script src="../js/helpers.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('calendar');
const THAI_DAYS=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
const THAI_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
let cur=new Date();
function navMonth(d){cur.setMonth(cur.getMonth()+d);render()}
function goToday(){cur=new Date();render()}
function render(){
  const y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('month-label').textContent=THAI_MONTHS[m]+' '+(y+543);
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  let cells='';for(let i=0;i<first;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();cells+=`<div class="cal-cell${isToday?' today':''}"><span class="cal-date">${d}</span></div>`}
  document.getElementById('cal').innerHTML=`<div class="cal-header">${THAI_DAYS.map(d=>`<div class="cal-header-cell">${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
}
render();
</script></body></html>

<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Quotation Detail</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.qt-detail-grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
.qt-info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.qt-info-row:last-child{border-bottom:none}
.qt-info-label{color:var(--text3);font-size:12px}
.qt-info-value{font-weight:500}
/* Status steps */
.wf-steps{display:flex;align-items:center;gap:0;margin:20px 0}
.wf-step{flex:1;text-align:center;position:relative}
.wf-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--border);background:var(--surface);color:var(--text3);transition:all .3s}
.wf-step.done .wf-dot{background:#2E844A;border-color:#2E844A;color:#fff}
.wf-step.active .wf-dot{background:var(--sf-blue);border-color:var(--sf-blue);color:#fff;box-shadow:0 0 0 4px rgba(1,118,211,.15)}
.wf-step.rejected .wf-dot{background:#C23934;border-color:#C23934;color:#fff}
.wf-label{font-size:10px;font-weight:600;color:var(--text3)}
.wf-step.done .wf-label{color:#2E844A}
.wf-step.active .wf-label{color:var(--sf-blue)}
.wf-step.rejected .wf-label{color:#C23934}
.wf-line{height:2px;flex:0 0 40px;background:var(--border);margin-bottom:20px}
.wf-line.done{background:#2E844A}
/* Approval log */
.ap-log{margin-top:16px}
.ap-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.ap-item:last-child{border-bottom:none}
.ap-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:#fff}
.ap-body{flex:1}.ap-action{font-weight:600}.ap-meta{font-size:11px;color:var(--text3);margin-top:1px}
/* A4 styles (same as quotations.html) */
.preview-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .2s}
.preview-overlay.open{opacity:1;visibility:visible}
.preview-container{background:#fff;width:210mm;max-width:95vw;max-height:90vh;overflow-y:auto;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.preview-toolbar{position:sticky;top:0;z-index:1;background:#fff;padding:12px 20px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.a4-page{width:210mm;max-width:100%;padding:20mm 18mm;font-family:'Inter',sans-serif;font-size:11px;color:#1a1a1a;line-height:1.5}
.a4-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0176D3}
.a4-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.a4-table th{background:#f0f4f8;padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;color:#555;border-bottom:1px solid #ddd;text-align:left}
.a4-table td{padding:8px 10px;border-bottom:1px solid #eee;font-size:11px}
.a4-table .right{text-align:right}
.a4-totals{display:flex;justify-content:flex-end}.a4-totals-box{width:240px}
.a4-totals-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.a4-totals-row.grand{border-top:2px solid #0176D3;padding-top:8px;margin-top:6px;font-size:14px;font-weight:700;color:#0176D3}
.a4-footer{margin-top:40px;padding-top:16px;border-top:1px solid #ddd;display:grid;grid-template-columns:1fr 1fr;gap:40px}
.a4-sig-line{border-top:1px solid #999;margin-top:40px;padding-top:6px;font-size:10px;color:#999}
@media print{.preview-toolbar{display:none}.preview-container{max-width:none;max-height:none;box-shadow:none}}
@media(max-width:768px){.qt-detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim" id="page-content"></div>

<!-- A4 Preview -->
<div class="preview-overlay" id="preview-overlay" onclick="if(event.target===this)document.getElementById('preview-overlay').classList.remove('open')">
  <div class="preview-container">
    <div class="preview-toolbar">
      <span style="font-size:13px;font-weight:600">Quotation Preview (A4)</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="window.print()" style="padding:6px 16px;font-size:12px">Print / Save PDF</button>
        <button class="btn btn-secondary" onclick="document.getElementById('preview-overlay').classList.remove('open')" style="padding:6px 12px;font-size:12px">Close</button>
      </div>
    </div>
    <div id="a4-content"></div>
  </div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('quotations');

var params = new URLSearchParams(window.location.search);
var qtId = parseInt(params.get('id') || '1', 10);
var qt = QUOTATIONS.find(function(q){ return q.id === qtId; });
var user = getUserProfile();
var isManager = user.role === 'Admin' || user.role === 'Sales Manager';

if (!qt) {
  document.getElementById('page-content').innerHTML = '<div class="empty-state">Quotation not found</div>';
} else {
  // Approval log (mock)
  if (!qt.approvalLog) {
    qt.approvalLog = [
      { action: 'Created', by: 'Sales Rep', date: qt.date, color: '#0176D3' }
    ];
    if (qt.status === 'pending_approval' || qt.status === 'sent' || qt.status === 'accepted') {
      qt.approvalLog.push({ action: 'Submitted for Approval', by: 'Sales Rep', date: qt.date, color: '#DD7A01' });
    }
    if (qt.status === 'sent' || qt.status === 'accepted') {
      qt.approvalLog.push({ action: 'Approved', by: 'Sales Manager', date: qt.date, color: '#2E844A' });
    }
    if (qt.status === 'accepted') {
      qt.approvalLog.push({ action: 'Accepted by Customer', by: 'Customer', date: qt.date, color: '#2E844A' });
    }
  }

  // Workflow step states
  var steps = [
    { label: 'Draft', state: 'done' },
    { label: 'Pending', state: qt.status === 'pending_approval' ? 'active' : (qt.status === 'draft' ? '' : 'done') },
    { label: 'Approved', state: qt.status === 'sent' || qt.status === 'accepted' ? 'done' : (qt.status === 'rejected' ? 'rejected' : '') },
    { label: 'Completed', state: qt.status === 'accepted' ? 'done' : '' },
  ];

  var stepsHtml = '';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var icon = s.state === 'done' ? '&#10003;' : s.state === 'rejected' ? '&#10007;' : (i + 1);
    stepsHtml += '<div class="wf-step ' + s.state + '"><div class="wf-dot">' + icon + '</div><div class="wf-label">' + s.label + '</div></div>';
    if (i < steps.length - 1) {
      stepsHtml += '<div class="wf-line ' + (s.state === 'done' ? 'done' : '') + '"></div>';
    }
  }

  // Status badge
  var statusColors = { draft: '#939393', pending_approval: '#DD7A01', sent: '#0176D3', accepted: '#2E844A', rejected: '#C23934' };
  var statusLabels = { draft: 'Draft', pending_approval: 'Pending Approval', sent: 'Approved', accepted: 'Accepted', rejected: 'Rejected' };
  var sc = statusColors[qt.status] || '#939393';
  var sl = statusLabels[qt.status] || qt.status;

  // Action buttons based on status + role
  var actionsHtml = '';
  if (qt.status === 'draft') {
    actionsHtml = '<button class="btn btn-primary" onclick="submitApproval()" style="width:100%">Submit for Approval</button>';
  } else if (qt.status === 'pending_approval' && isManager) {
    actionsHtml = '<button class="btn btn-primary" onclick="approveQt()" style="width:100%;margin-bottom:8px;background:#2E844A">Approve</button>';
    actionsHtml += '<button class="btn btn-secondary" onclick="rejectQt()" style="width:100%;color:#C23934;border-color:#C23934">Reject</button>';
  } else if (qt.status === 'pending_approval' && !isManager) {
    actionsHtml = '<div style="padding:12px;border-radius:8px;background:rgba(221,122,1,.06);border:1px solid rgba(221,122,1,.15);font-size:12px;color:#DD7A01;text-align:center">Waiting for Sales Manager approval</div>';
  } else if (qt.status === 'sent' || qt.status === 'accepted') {
    actionsHtml = '<button class="btn btn-primary" onclick="previewPDF()" style="width:100%"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Preview & Download PDF</button>';
  } else if (qt.status === 'rejected') {
    actionsHtml = '<button class="btn btn-secondary" onclick="resubmit()" style="width:100%">Edit & Resubmit</button>';
  }

  // Approval log HTML
  var logHtml = '';
  for (var j = 0; j < qt.approvalLog.length; j++) {
    var log = qt.approvalLog[j];
    logHtml += '<div class="ap-item"><div class="ap-icon" style="background:' + log.color + '">' + log.action[0] + '</div><div class="ap-body"><div class="ap-action">' + log.action + '</div><div class="ap-meta">' + log.by + ' / ' + log.date + '</div></div></div>';
  }

  document.getElementById('page-content').innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">' +
      '<a href="quotations.html" class="btn btn-secondary" style="padding:6px 12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</a>' +
    '</div>' +
    '<div class="page-header" style="margin-bottom:16px">' +
      '<div>' +
        '<div class="page-title" style="display:flex;align-items:center;gap:10px">' + qt.number +
          ' <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:' + sc + '18;color:' + sc + '">' + sl + '</span>' +
        '</div>' +
        '<div class="page-subtitle">' + qt.account + ' / ' + qt.date + '</div>' +
      '</div>' +
    '</div>' +

    // Workflow steps
    '<div class="card" style="margin-bottom:16px;padding:16px 20px">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px">Approval Workflow</div>' +
      '<div class="wf-steps">' + stepsHtml + '</div>' +
    '</div>' +

    '<div class="qt-detail-grid">' +
      // Left: details
      '<div>' +
        '<div class="card" style="margin-bottom:14px">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Quotation Details</div>' +
          '<div class="qt-info-row"><span class="qt-info-label">Number</span><span class="qt-info-value">' + qt.number + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label">Customer</span><span class="qt-info-value">' + qt.account + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label">Date</span><span class="qt-info-value">' + qt.date + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label">Subtotal</span><span class="qt-info-value">' + fmt(qt.subtotal) + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label">VAT 7%</span><span class="qt-info-value">' + fmt(qt.vat) + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label">WHT</span><span class="qt-info-value" style="color:var(--red)">-' + fmt(qt.wht) + '</span></div>' +
          '<div class="qt-info-row"><span class="qt-info-label" style="font-weight:600">Grand Total</span><span class="qt-info-value" style="font-weight:700;color:var(--sf-blue);font-size:16px">' + fmt(qt.grand) + '</span></div>' +
        '</div>' +
        // Approval log
        '<div class="card">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Approval History</div>' +
          '<div class="ap-log">' + logHtml + '</div>' +
        '</div>' +
      '</div>' +
      // Right: actions
      '<div>' +
        '<div class="card" style="position:sticky;top:70px">' +
          '<div style="font-size:13px;font-weight:700;margin-bottom:14px">Actions</div>' +
          actionsHtml +
        '</div>' +
      '</div>' +
    '</div>';
}

function submitApproval() {
  qt.status = 'pending_approval';
  qt.approvalLog.push({ action: 'Submitted for Approval', by: user.firstName + ' ' + user.lastName, date: 'Just now', color: '#DD7A01' });
  location.reload();
}

function approveQt() {
  qt.status = 'sent';
  qt.approvalLog.push({ action: 'Approved', by: user.firstName + ' ' + user.lastName + ' (Manager)', date: 'Just now', color: '#2E844A' });
  location.reload();
}

function rejectQt() {
  var reason = prompt('Rejection reason:');
  if (reason === null) return;
  qt.status = 'rejected';
  qt.approvalLog.push({ action: 'Rejected: ' + reason, by: user.firstName + ' ' + user.lastName + ' (Manager)', date: 'Just now', color: '#C23934' });
  location.reload();
}

function resubmit() {
  qt.status = 'draft';
  qt.approvalLog.push({ action: 'Resubmitted for review', by: user.firstName + ' ' + user.lastName, date: 'Just now', color: '#0176D3' });
  location.reload();
}

function previewPDF() {
  var cust = ACCOUNTS.find(function(a){ return a.name === qt.account; }) || {};
  var html = '<div class="a4-page">';
  html += '<div class="a4-header"><div><div style="font-size:18px;font-weight:800;color:#0176D3">SalesFAST 7</div></div>';
  html += '<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:#0176D3;margin-bottom:4px">QUOTATION</div>';
  html += '<div style="font-size:11px">' + qt.number + '</div><div style="font-size:11px">Date: ' + qt.date + '</div></div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
  html += '<div style="background:#f8f9fa;border-radius:6px;padding:12px"><div style="font-size:9px;font-weight:600;color:#999;text-transform:uppercase;margin-bottom:4px">Bill To</div>';
  html += '<div style="font-size:12px;font-weight:600">' + qt.account + '</div>';
  if (cust.taxId) html += '<div style="font-size:10px;color:#666">Tax ID: ' + cust.taxId + '</div>';
  html += '</div>';
  html += '<div style="background:#f8f9fa;border-radius:6px;padding:12px"><div style="font-size:9px;font-weight:600;color:#999;text-transform:uppercase;margin-bottom:4px">Summary</div>';
  html += '<div style="font-size:12px">Subtotal: ' + fmt(qt.subtotal) + '</div>';
  html += '<div style="font-size:12px">VAT 7%: ' + fmt(qt.vat) + '</div>';
  html += '<div style="font-size:12px">WHT: -' + fmt(qt.wht) + '</div>';
  html += '<div style="font-size:14px;font-weight:700;color:#0176D3;margin-top:4px">Total: ' + fmt(qt.grand) + '</div>';
  html += '</div></div>';
  html += '<div style="text-align:center;color:#2E844A;font-size:12px;font-weight:600;padding:8px;background:rgba(46,132,74,.06);border-radius:6px;margin-bottom:16px">APPROVED</div>';
  html += '<div class="a4-footer"><div><div style="font-size:10px;font-weight:600">Authorized Signature</div><div class="a4-sig-line">Name: _____________________ Date: __________</div></div>';
  html += '<div><div style="font-size:10px;font-weight:600">Accepted by Customer</div><div class="a4-sig-line">Name: _____________________ Date: __________</div></div></div>';
  html += '</div>';

  document.getElementById('a4-content').innerHTML = html;
  document.getElementById('preview-overlay').classList.add('open');
}
</script>
</body>
</html>

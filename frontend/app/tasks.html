<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Tasks</title>
<link rel="stylesheet" href="../css/app.css"/>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>

<div class="page anim">
  <div class="page-header">
    <div>
      <div class="page-title reveal" data-i18n="task_title">Tasks & Activities</div>
      <div class="page-subtitle reveal" data-i18n="task_sub">Manage tasks, appointments and call logs</div>
    </div>
    <div class="page-actions">
      <a href="calendar.html" class="btn btn-secondary" data-i18n="task_calendar">Calendar</a>
      <button class="btn btn-primary" onclick="openCreateTask()" data-i18n="task_new">+ New Task</button>
    </div>
  </div>

  <div class="filter-bar" style="margin-bottom:16px" id="task-filter">
    <button class="filter-btn active" data-v="all" onclick="filterTasks('all',this)">All</button>
    <button class="filter-btn" data-v="Open" onclick="filterTasks('Open',this)">Open</button>
    <button class="filter-btn" data-v="In Progress" onclick="filterTasks('In Progress',this)">In Progress</button>
    <button class="filter-btn" data-v="Completed" onclick="filterTasks('Completed',this)">Completed</button>
  </div>

  <div class="card" id="list-view">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Task</th>
          <th>Due Date</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Customer</th>
          <th style="width:120px">Actions</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Create Task Form -->
  <div id="task-form" style="display:none">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="closeForm()" style="padding:6px 12px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="btn_back">Back</span>
      </button>
      <div class="page-title reveal" id="task-form-title">New Task</div>
    </div>
    <form onsubmit="saveTask(event)">
      <input type="hidden" id="ft-id"/>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Task Details</div>
        <div class="sf7-form-group"><label class="sf7-form-label">Title *</label><input class="sf7-form-input" id="ft-title" required/></div>
        <div class="sf7-form-group"><label class="sf7-form-label">Description</label><textarea class="sf7-form-input" id="ft-desc" rows="3"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="sf7-form-group"><label class="sf7-form-label">Due Date</label><input class="sf7-form-input" id="ft-due" type="date"/></div>
          <div class="sf7-form-group"><label class="sf7-form-label">Priority</label>
            <select class="sf7-form-input" id="ft-priority"><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select></div>
          <div class="sf7-form-group"><label class="sf7-form-label">Status</label>
            <select class="sf7-form-input" id="ft-status"><option value="Open">Open</option><option value="In Progress">In Progress</option><option value="Completed">Completed</option></select></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Link to</div>
        <div style="display:grid;grid-template-columns:1fr;gap:12px">
          <div class="sf7-form-group"><label class="sf7-form-label">Customer</label><select class="sf7-form-input" id="ft-account"><option value="">-- None --</option></select></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button type="button" class="btn btn-secondary" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-save-task">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/motion.js"></script><script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('tasks');
if(!requireAuth()) throw 'auth';

var taskFilter = 'all';

function filterTasks(f, btn) {
  taskFilter = f;
  document.querySelectorAll('#task-filter .filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  var f = taskFilter === 'all' ? TASKS : TASKS.filter(function(t){return t.status === taskFilter});
  document.getElementById('tbody').innerHTML = f.map(function(t) {
    var dueStr = t.due_date ? new Date(t.due_date).toLocaleDateString('th-TH') : '-';
    var isOverdue = t.due_date && t.status !== 'Completed' && new Date(t.due_date) < new Date();
    var accName = t.account_name || '-';
    var accLink = t.account_id
      ? '<a href="account-detail.html?id=' + t.account_id + '" style="color:var(--sf-blue);text-decoration:none;font-weight:500">' + esc(accName) + '</a>'
      : esc(accName);

    return '<tr style="' + (isOverdue ? 'background:rgba(194,57,52,.04)' : '') + '">' +
      '<td style="font-weight:500;' + (isOverdue ? 'color:var(--red)' : '') + '">' + esc(t.title) + '</td>' +
      '<td style="' + (isOverdue ? 'font-weight:600;color:var(--red)' : 'color:var(--text2)') + '">' + dueStr + '</td>' +
      '<td><span class="status-badge" style="background:' + PRI_COLORS[t.priority] + '18;color:' + PRI_COLORS[t.priority] + '">' + t.priority + '</span></td>' +
      '<td><span class="status-badge" style="background:' + (TASK_COLORS[t.status]||'var(--text2)') + '18;color:' + (TASK_COLORS[t.status]||'var(--text2)') + '">' + t.status + '</span></td>' +
      '<td style="font-size:12px">' + accLink + '</td>' +
      '<td style="display:flex;gap:6px">' +
        '<button class="btn btn-secondary" style="padding:3px 10px;font-size:11px" onclick="editTask(\'' + t.id + '\')">Edit</button>' +
        (t.status !== 'Completed' ? '<button class="btn btn-secondary" style="padding:3px 10px;font-size:11px;color:var(--green);border-color:var(--green)" onclick="completeTask(\'' + t.id + '\')">✓</button>' : '') +
        '<button class="btn btn-secondary" style="padding:3px 10px;font-size:11px;color:var(--red);border-color:var(--red)" onclick="deleteTask(\'' + t.id + '\')">✕</button>' +
      '</td>' +
    '</tr>';
  }).join('') || '<tr><td colspan="6" class="empty-state">No tasks found</td></tr>';
}

async function populateAccountDropdown() {
  if (ACCOUNTS.length === 0) await loadAccounts();
  var opts = '<option value="">-- None --</option>' + ACCOUNTS.map(function(a) {
    return '<option value="' + a.id + '">' + esc(a.customer_code ? a.customer_code + ' — ' : '') + esc(a.company_name) + '</option>';
  }).join('');
  document.getElementById('ft-account').innerHTML = opts;
}

function openCreateTask() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('task-filter').style.display = 'none';
  document.getElementById('task-form').style.display = 'block';
  document.getElementById('task-form-title').textContent = 'New Task';
  document.getElementById('ft-id').value = '';
  document.getElementById('ft-title').value = '';
  document.getElementById('ft-desc').value = '';
  document.getElementById('ft-due').value = '';
  document.getElementById('ft-priority').value = 'Medium';
  document.getElementById('ft-status').value = 'Open';
  populateAccountDropdown();
  window.scrollTo(0, 0);
}

function editTask(id) {
  var t = TASKS.find(function(x){return x.id === id});
  if (!t) return;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('task-filter').style.display = 'none';
  document.getElementById('task-form').style.display = 'block';
  document.getElementById('task-form-title').textContent = 'Edit Task';
  document.getElementById('ft-id').value = t.id;
  document.getElementById('ft-title').value = t.title || '';
  document.getElementById('ft-desc').value = t.description || '';
  document.getElementById('ft-due').value = t.due_date ? t.due_date.slice(0, 10) : '';
  document.getElementById('ft-priority').value = t.priority || 'Medium';
  document.getElementById('ft-status').value = t.status || 'Open';
  populateAccountDropdown();
  if (t.account_id) document.getElementById('ft-account').value = t.account_id;
  window.scrollTo(0, 0);
}

function closeForm() {
  document.getElementById('task-form').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('task-filter').style.display = 'inline-flex';
}

async function saveTask(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-save-task');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    var id = document.getElementById('ft-id').value;
    var body = {
      title: document.getElementById('ft-title').value,
      description: document.getElementById('ft-desc').value,
      dueDate: document.getElementById('ft-due').value || null,
      priority: document.getElementById('ft-priority').value,
      status: document.getElementById('ft-status').value,
      accountId: document.getElementById('ft-account').value || null,
    };
    if (id) {
      await apiFetch('/tasks/' + id, { method: 'PATCH', body: JSON.stringify(body) });
    } else {
      await apiFetch('/tasks', { method: 'POST', body: JSON.stringify(body) });
    }
    closeForm();
    await reloadTasks();
  } catch(err) {
    alert('Error saving task: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

async function completeTask(id) {
  try {
    await apiFetch('/tasks/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'Completed' }) });
    await reloadTasks();
  } catch(err) { alert('Error: ' + err.message); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiFetch('/tasks/' + id, { method: 'DELETE' });
    await reloadTasks();
  } catch(err) { alert('Error: ' + err.message); }
}

async function reloadTasks() {
  await loadTasks();
  renderTable();
}

// Initial load
reloadTasks();
</script>
</body>
</html>

<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — สินค้า</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <!-- List View -->
  <div id="list-view">
    <div class="page-header"><div><div class="page-title" data-i18n="prod_title">แคตตาล็อกสินค้า</div><div class="page-subtitle" data-i18n="prod_subtitle">จัดการสินค้าและบริการ</div></div><button class="btn btn-primary" onclick="openCreate()">+ เพิ่มสินค้า</button></div>
    <input class="search-input" id="search" placeholder="ค้นหาสินค้า / SKU..." style="margin-bottom:20px;max-width:360px" oninput="debounceSearch()"/>
    <div class="card"><div class="table-wrap"><table><thead><tr><th>ชื่อสินค้า</th><th>SKU</th><th>ราคาต่อหน่วย</th><th>หน่วย</th><th>WHT %</th><th>สถานะ</th><th style="width:120px">จัดการ</th></tr></thead><tbody id="tbody"></tbody></table></div></div>
  </div>

  <!-- Create/Edit Form -->
  <div id="form-view" style="display:none">
    <div class="page-header"><div><div class="page-title" id="form-title">เพิ่มสินค้าใหม่</div><div class="page-subtitle">กรอกข้อมูลสินค้าหรือบริการ</div></div>
      <div class="page-actions"><button class="btn btn-secondary" onclick="closeForm()">ยกเลิก</button><button class="btn btn-primary" onclick="saveProduct()" id="btn-save-prod">บันทึก</button></div>
    </div>
    <div class="card" style="padding:24px;max-width:640px">
      <input type="hidden" id="p-id"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="grid-column:1/-1"><label class="field-label">ชื่อสินค้า / บริการ *</label><input type="text" class="field-input" id="p-name" placeholder="เช่น ระบบ ERP มาตรฐาน"/></div>
        <div><label class="field-label">SKU *</label><input type="text" class="field-input" id="p-sku" placeholder="เช่น ERP-STD-001"/></div>
        <div><label class="field-label">ราคาต่อหน่วย (บาท) *</label><input type="number" class="field-input" id="p-price" placeholder="0.00" min="0" step="0.01"/></div>
        <div><label class="field-label">หน่วยนับ</label>
          <select class="field-input" id="p-unit">
            <option value="ชุด">ชุด</option><option value="เครื่อง">เครื่อง</option><option value="ครั้ง">ครั้ง</option>
            <option value="ปี">ปี</option><option value="เดือน">เดือน</option><option value="ชิ้น">ชิ้น</option>
            <option value="กล่อง">กล่อง</option><option value="ตัว">ตัว</option><option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>
        <div><label class="field-label">WHT %</label>
          <select class="field-input" id="p-wht">
            <option value="0">0% — ไม่หัก ณ ที่จ่าย</option><option value="1">1%</option><option value="2">2%</option>
            <option value="3" selected>3% — บริการ</option><option value="5">5%</option>
          </select>
        </div>
        <div><label class="field-label">สถานะ</label>
          <select class="field-input" id="p-active"><option value="true">ใช้งาน</option><option value="false">ปิดใช้งาน</option></select>
        </div>
        <div style="grid-column:1/-1"><label class="field-label">รายละเอียด</label><textarea class="field-input" id="p-desc" rows="3" placeholder="รายละเอียดสินค้าหรือบริการ (ถ้ามี)"></textarea></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('products');
if(!requireAuth()) throw 'auth';

var searchTimer=null;
function debounceSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    var q=document.getElementById('search').value.trim();
    loadProducts(q).then(renderTable);
  }, 300);
}

function renderTable(){
  document.getElementById('tbody').innerHTML=PRODUCTS.map(function(p){
    return '<tr>'+
      '<td style="font-weight:500">'+esc(p.name)+'</td>'+
      '<td style="color:var(--text2)">'+esc(p.sku)+'</td>'+
      '<td style="font-weight:500;color:var(--sf-blue)">'+fmt(parseFloat(p.unit_price)||0)+'</td>'+
      '<td style="color:var(--text2)">'+esc(p.unit_of_measure||'ชุด')+'</td>'+
      '<td style="color:var(--text2)">'+(p.wht_rate||0)+'%</td>'+
      '<td><span class="status-badge" style="background:'+(p.is_active!==false?'rgba(48,209,88,.12)':'rgba(128,128,128,.1)')+';color:'+(p.is_active!==false?'#1a7d39':'var(--text2)')+'">'+
        (p.is_active!==false?'ใช้งาน':'ปิดใช้งาน')+'</span></td>'+
      '<td style="display:flex;gap:6px">'+
        '<button class="btn btn-secondary" style="padding:3px 10px;font-size:11px" onclick="editProduct(\''+p.id+'\')">แก้ไข</button>'+
        '<button class="btn btn-secondary" style="padding:3px 10px;font-size:11px;color:var(--red);border-color:var(--red)" onclick="deleteProduct(\''+p.id+'\')">ลบ</button>'+
      '</td>'+
    '</tr>';
  }).join('') || '<tr><td colspan="7" class="empty-state">ไม่พบสินค้า</td></tr>';
}

function openCreate(){
  document.getElementById('p-id').value='';
  document.getElementById('form-title').textContent='เพิ่มสินค้าใหม่';
  document.getElementById('p-name').value='';
  document.getElementById('p-sku').value='';
  document.getElementById('p-price').value='';
  document.getElementById('p-unit').value='ชุด';
  document.getElementById('p-wht').value='3';
  document.getElementById('p-active').value='true';
  document.getElementById('p-desc').value='';
  document.getElementById('list-view').style.display='none';
  document.getElementById('form-view').style.display='block';
  window.scrollTo(0,0);
}

function editProduct(id){
  var p=PRODUCTS.find(function(x){return x.id===id});
  if(!p)return;
  document.getElementById('p-id').value=id;
  document.getElementById('form-title').textContent='แก้ไขสินค้า';
  document.getElementById('p-name').value=p.name||'';
  document.getElementById('p-sku').value=p.sku||'';
  document.getElementById('p-price').value=p.unit_price||'';
  document.getElementById('p-unit').value=p.unit_of_measure||'ชุด';
  document.getElementById('p-wht').value=String(p.wht_rate||0);
  document.getElementById('p-active').value=String(p.is_active!==false);
  document.getElementById('p-desc').value=p.description||'';
  document.getElementById('list-view').style.display='none';
  document.getElementById('form-view').style.display='block';
  window.scrollTo(0,0);
}

function closeForm(){
  document.getElementById('form-view').style.display='none';
  document.getElementById('list-view').style.display='block';
}

async function saveProduct(){
  var name=document.getElementById('p-name').value.trim();
  var sku=document.getElementById('p-sku').value.trim();
  var price=parseFloat(document.getElementById('p-price').value);
  if(!name){alert('กรุณาใส่ชื่อสินค้า');return}
  if(!sku){alert('กรุณาใส่ SKU');return}
  if(!price||price<=0){alert('กรุณาใส่ราคา');return}

  var btn=document.getElementById('btn-save-prod');
  btn.disabled=true; btn.textContent='กำลังบันทึก...';

  var body={
    name:name, sku:sku, unitPrice:price,
    unitOfMeasure:document.getElementById('p-unit').value,
    whtRate:parseInt(document.getElementById('p-wht').value),
    isActive:document.getElementById('p-active').value==='true',
    description:document.getElementById('p-desc').value.trim()
  };

  try {
    var id=document.getElementById('p-id').value;
    if(id){
      await apiFetch('/products/'+id, { method:'PATCH', body:JSON.stringify(body) });
    } else {
      await apiFetch('/products', { method:'POST', body:JSON.stringify(body) });
    }
    closeForm();
    await loadProducts();
    renderTable();
  } catch(err) {
    alert('Error: '+err.message);
  } finally {
    btn.disabled=false; btn.textContent='บันทึก';
  }
}

async function deleteProduct(id){
  if(!confirm('ลบสินค้านี้?')) return;
  try {
    await apiFetch('/products/'+id, { method:'DELETE' });
    await loadProducts();
    renderTable();
  } catch(err) { alert('Error: '+err.message); }
}

// Initial load
loadProducts().then(renderTable);
</script></body></html>

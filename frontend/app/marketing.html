<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Marketing / Landing Page</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
/* ── Visual Editor Layout ── */
.ve-layout { display:grid; grid-template-columns:1fr 420px; gap:0; height:calc(100vh - 52px); overflow:hidden }
.ve-preview { position:relative; overflow-y:auto; background:#f0f9ff; border-right:1px solid var(--border) }
.ve-preview iframe { width:100%; height:100%; border:none; display:block }
.ve-panel { display:flex; flex-direction:column; overflow:hidden; background:var(--surface) }
.ve-panel-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0 }
.ve-panel-title { font-size:14px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px }
.ve-panel-body { flex:1; overflow-y:auto; padding:16px }
.ve-panel-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0 }

/* ── Section selector (left sidebar overlay) ── */
.ve-sections { position:absolute; top:0; left:0; bottom:0; width:200px; background:rgba(255,255,255,.95); backdrop-filter:blur(10px); border-right:1px solid var(--border); z-index:10; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:2px }
.ve-section-btn { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; background:none; border:none; font-family:inherit; font-size:12px; font-weight:500; color:var(--text2); text-align:left; cursor:pointer; transition:all .15s; width:100% }
.ve-section-btn:hover { background:rgba(1,118,211,.06); color:var(--text) }
.ve-section-btn.active { background:rgba(1,118,211,.1); color:var(--sf-blue); font-weight:600 }
.ve-section-btn svg { flex-shrink:0; opacity:.6 }

/* ── Top toolbar ── */
.ve-toolbar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); gap:8px }
.ve-toolbar-left { display:flex; align-items:center; gap:8px }
.ve-toolbar-right { display:flex; align-items:center; gap:6px }
.ve-saved-badge { padding:3px 8px; border-radius:16px; font-size:10px; font-weight:600 }
.ve-saved-badge.saved { background:rgba(46,132,74,.1); color:#2E844A }
.ve-saved-badge.unsaved { background:rgba(221,122,1,.1); color:#DD7A01 }

/* ── Form elements (reuse from marketing.js) ── */
.mk-form { display:flex; flex-direction:column; gap:14px }
.mk-form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px }
.mk-form-group { display:flex; flex-direction:column; gap:5px }
.mk-form-label { font-size:11px; font-weight:600; color:var(--text2) }
.mk-input, .mk-textarea, .mk-select { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:12px; color:var(--text); background:var(--input-bg,var(--surface2)); outline:none; transition:all .15s }
.mk-input:focus, .mk-textarea:focus, .mk-select:focus { border-color:var(--sf-blue); box-shadow:0 0 0 3px rgba(1,118,211,.1) }
.mk-textarea { resize:vertical; min-height:64px }

/* Item list */
.mk-list { display:flex; flex-direction:column; gap:8px }
.mk-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; transition:all .15s }
.mk-item:hover { border-color:var(--text3) }
.mk-item-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px }
.mk-item-title { font-size:11px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px }
.mk-item-num { width:20px; height:20px; border-radius:50%; background:var(--sf-blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0 }
.mk-item-actions { display:flex; gap:3px }
.mk-icon-btn { width:24px; height:24px; border-radius:5px; background:transparent; border:none; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s }
.mk-icon-btn:hover { background:var(--border); color:var(--text) }
.mk-icon-btn.mk-del:hover { background:rgba(194,57,52,.1); color:#C23934 }
.mk-icon-btn:disabled { opacity:.3; cursor:not-allowed }
.mk-add-btn { padding:10px; border-radius:8px; border:2px dashed var(--border); background:transparent; color:var(--sf-blue); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; width:100%; margin-top:8px }
.mk-add-btn:hover { border-color:var(--sf-blue); background:rgba(1,118,211,.04) }

/* Logo upload */
.mk-logo-box { display:flex; align-items:center; gap:16px }
.mk-logo-preview { width:80px; height:80px; border-radius:12px; background:var(--surface2); border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0 }
.mk-logo-preview img { max-width:100%; max-height:100%; object-fit:contain; padding:8px }

/* Responsive */
@media (max-width:900px) {
  .ve-layout { grid-template-columns:1fr; height:auto }
  .ve-preview { height:400px }
  .ve-sections { width:160px }
  .mk-form-row { grid-template-columns:1fr }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>

<!-- Toolbar -->
<div class="ve-toolbar">
  <div class="ve-toolbar-left">
    <span style="font-size:13px;font-weight:700;color:var(--text)">Landing Page</span>
    <span class="ve-saved-badge saved" id="saved-badge">บันทึกแล้ว</span>
  </div>
  <div class="ve-toolbar-right">
    <a href="../landing.html" target="_blank" class="btn btn-secondary" style="padding:5px 10px;font-size:11px;display:inline-flex;align-items:center;gap:4px">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open
    </a>
    <button class="btn btn-secondary" onclick="exportContent()" style="padding:5px 10px;font-size:11px">Export</button>
    <button class="btn btn-secondary" onclick="document.getElementById('mk-import-file').click()" style="padding:5px 10px;font-size:11px">Import</button>
    <input type="file" id="mk-import-file" accept=".json" style="display:none" onchange="importContent(event)"/>
    <button class="btn btn-primary" onclick="saveAll()" style="padding:5px 12px;font-size:11px">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      บันทึก
    </button>
  </div>
</div>

<!-- Visual Editor Layout -->
<div class="ve-layout">
  <!-- Left: Live Preview -->
  <div class="ve-preview">
    <!-- Section selector overlay -->
    <div class="ve-sections" id="ve-sections">
      <!-- Rendered by JS -->
    </div>
    <!-- Live iframe -->
    <iframe id="ve-iframe" src="../landing.html" style="margin-left:200px;width:calc(100% - 200px)"></iframe>
  </div>

  <!-- Right: Editor Panel -->
  <div class="ve-panel">
    <div class="ve-panel-header">
      <div class="ve-panel-title" id="panel-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
        Logo บริษัท
      </div>
    </div>
    <div class="ve-panel-body" id="panel-body">
      <!-- Rendered by marketing.js -->
    </div>
    <div class="ve-panel-footer">
      <span style="font-size:10px;color:var(--text3)" id="last-saved-text"></span>
      <button class="btn btn-secondary" onclick="resetAll()" style="padding:5px 10px;font-size:11px;color:#C23934">Reset All</button>
    </div>
  </div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/landing-data.js"></script>
<script src="../js/logo-manager.js"></script>
<script src="../js/marketing.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('marketing');
if (!requireAuth()) throw 'auth';
</script>
</body>
</html>

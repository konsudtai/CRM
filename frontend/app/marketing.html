<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Landing Page Builder</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
/* ── Page Builder Layout ── */
.pb-wrap { display:grid; grid-template-columns:260px 1fr 380px; height:calc(100vh - 52px); overflow:hidden }
.pb-sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden }
.pb-sidebar-head { padding:14px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; justify-content:space-between }
.pb-sidebar-body { flex:1; overflow-y:auto; padding:8px }

/* Component list (draggable) */
.pb-comp { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); margin-bottom:6px; cursor:grab; transition:all .15s; user-select:none; position:relative }
.pb-comp:hover { border-color:var(--sf-blue); background:rgba(1,118,211,.04) }
.pb-comp:active { cursor:grabbing; box-shadow:0 4px 12px rgba(0,0,0,.1) }
.pb-comp-icon { width:28px; height:28px; border-radius:6px; background:rgba(1,118,211,.08); color:var(--sf-blue); display:flex; align-items:center; justify-content:center; flex-shrink:0 }
.pb-comp-icon svg { width:14px; height:14px }
.pb-comp-info { flex:1; min-width:0 }
.pb-comp-name { font-size:12px; font-weight:600; color:var(--text) }
.pb-comp-desc { font-size:10px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.pb-comp-handle { color:var(--text3); opacity:.5 }
.pb-comp.active { border-color:var(--sf-blue); background:rgba(1,118,211,.08); box-shadow:0 0 0 2px rgba(1,118,211,.2) }
.pb-comp .pb-comp-actions { position:absolute; right:8px; top:50%; transform:translateY(-50%); display:flex; gap:2px; opacity:0; transition:opacity .15s }
.pb-comp:hover .pb-comp-actions { opacity:1 }
.pb-comp-btn { width:22px; height:22px; border-radius:4px; border:none; background:transparent; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s }
.pb-comp-btn:hover { background:var(--border); color:var(--text) }
.pb-comp-btn.del:hover { background:rgba(194,57,52,.1); color:#C23934 }

/* Add component button */
.pb-add-comp { padding:10px; border-radius:8px; border:2px dashed var(--border); background:transparent; color:var(--sf-blue); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; width:100%; margin-top:8px }
.pb-add-comp:hover { border-color:var(--sf-blue); background:rgba(1,118,211,.04) }

/* Preview area */
.pb-preview { position:relative; overflow:hidden; background:#f0f9ff }
.pb-preview iframe { width:100%; height:100%; border:none; display:block }
.pb-preview-toolbar { position:absolute; top:8px; left:50%; transform:translateX(-50%); display:flex; gap:4px; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); padding:4px; border-radius:8px; z-index:5 }
.pb-preview-btn { padding:4px 10px; border-radius:5px; border:none; background:transparent; color:rgba(255,255,255,.7); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .12s }
.pb-preview-btn:hover { color:#fff }
.pb-preview-btn.active { background:rgba(255,255,255,.15); color:#fff }

/* Editor panel */
.pb-editor { background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden }
.pb-editor-head { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0 }
.pb-editor-title { font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px }
.pb-editor-body { flex:1; overflow-y:auto; padding:16px }
.pb-editor-footer { padding:10px 16px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0 }

/* Status bar */
.pb-status { display:flex; align-items:center; gap:8px }
.pb-saved { padding:3px 8px; border-radius:12px; font-size:10px; font-weight:600 }
.pb-saved.ok { background:rgba(46,132,74,.1); color:#2E844A }
.pb-saved.dirty { background:rgba(221,122,1,.1); color:#DD7A01 }

/* Form elements */
.pb-form { display:flex; flex-direction:column; gap:12px }
.pb-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px }
.pb-form-group { display:flex; flex-direction:column; gap:4px }
.pb-form-label { font-size:11px; font-weight:600; color:var(--text2) }
.pb-input, .pb-textarea, .pb-select { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:7px; font-family:inherit; font-size:12px; color:var(--text); background:var(--input-bg,var(--surface2)); outline:none; transition:all .15s }
.pb-input:focus, .pb-textarea:focus, .pb-select:focus { border-color:var(--sf-blue); box-shadow:0 0 0 3px rgba(1,118,211,.08) }
.pb-textarea { resize:vertical; min-height:60px }

/* Item list in editor */
.pb-items { display:flex; flex-direction:column; gap:6px }
.pb-item { background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:10px; transition:all .12s }
.pb-item:hover { border-color:var(--text3) }
.pb-item-head { display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:8px }
.pb-item-title { font-size:11px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px }
.pb-item-num { width:18px; height:18px; border-radius:50%; background:var(--sf-blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700 }
.pb-item-btns { display:flex; gap:2px }
.pb-item-btn { width:22px; height:22px; border-radius:4px; border:none; background:transparent; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center }
.pb-item-btn:hover { background:var(--border); color:var(--text) }
.pb-item-btn.del:hover { background:rgba(194,57,52,.1); color:#C23934 }
.pb-item-btn:disabled { opacity:.3; cursor:not-allowed }

.pb-add-item { padding:8px; border-radius:7px; border:1.5px dashed var(--border); background:transparent; color:var(--sf-blue); font-family:inherit; font-size:11px; font-weight:600; cursor:pointer; width:100%; margin-top:6px; transition:all .12s }
.pb-add-item:hover { border-color:var(--sf-blue); background:rgba(1,118,211,.03) }

/* Empty state */
.pb-empty { padding:32px 16px; text-align:center; color:var(--text3); font-size:12px }

/* Responsive */
@media (max-width:1100px) { .pb-wrap { grid-template-columns:200px 1fr 320px } }
@media (max-width:900px) { .pb-wrap { grid-template-columns:1fr; height:auto } .pb-preview { height:300px } .pb-sidebar { max-height:200px } }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>

<!-- Page Builder -->
<div class="pb-wrap">
  <!-- Left: Component List -->
  <div class="pb-sidebar">
    <div class="pb-sidebar-head">
      <span>Sections</span>
      <div class="pb-status">
        <span class="pb-saved ok" id="pb-saved">Saved</span>
      </div>
    </div>
    <div class="pb-sidebar-body" id="pb-sections">
      <!-- Rendered by JS -->
    </div>
    <div style="padding:8px">
      <button class="pb-add-comp" id="pb-add-section">+ เพิ่ม Section</button>
    </div>
  </div>

  <!-- Center: Live Preview -->
  <div class="pb-preview">
    <div class="pb-preview-toolbar">
      <button class="pb-preview-btn active" onclick="setPreviewMode('desktop')">Desktop</button>
      <button class="pb-preview-btn" onclick="setPreviewMode('tablet')">Tablet</button>
      <button class="pb-preview-btn" onclick="setPreviewMode('mobile')">Mobile</button>
    </div>
    <iframe id="pb-iframe" src="../landing.html"></iframe>
  </div>

  <!-- Right: Editor Panel -->
  <div class="pb-editor">
    <div class="pb-editor-head">
      <div class="pb-editor-title" id="pb-editor-title">เลือก Section เพื่อแก้ไข</div>
      <div style="display:flex;gap:4px">
        <button class="btn btn-secondary" onclick="PB.exportJSON()" style="padding:4px 8px;font-size:10px">Export</button>
        <button class="btn btn-primary" onclick="PB.save()" style="padding:4px 10px;font-size:10px">Save</button>
      </div>
    </div>
    <div class="pb-editor-body" id="pb-editor-body">
      <div class="pb-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;display:block;opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        คลิกที่ Section ด้านซ้ายเพื่อแก้ไขเนื้อหา<br/><br/>
        <span style="font-size:11px;color:var(--text3)">แก้ไข → กด Save → Preview อัพเดตทันที</span>
      </div>
    </div>
    <div class="pb-editor-footer">
      <span style="font-size:10px;color:var(--text3)" id="pb-last-saved"></span>
      <button class="btn btn-secondary" onclick="PB.reset()" style="padding:4px 8px;font-size:10px;color:#C23934">Reset All</button>
    </div>
  </div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/landing-data.js"></script>
<script src="../js/logo-manager.js"></script>
<script src="../js/marketing.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('marketing');
if (!requireAuth()) throw 'auth';

// Preview mode (responsive)
function setPreviewMode(mode) {
  var iframe = document.getElementById('pb-iframe');
  document.querySelectorAll('.pb-preview-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  switch(mode) {
    case 'desktop': iframe.style.width = '100%'; iframe.style.margin = '0'; break;
    case 'tablet': iframe.style.width = '768px'; iframe.style.margin = '0 auto'; break;
    case 'mobile': iframe.style.width = '375px'; iframe.style.margin = '0 auto'; break;
  }
}
</script>
</body>
</html>

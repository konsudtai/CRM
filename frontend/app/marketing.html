<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Marketing</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.mk-tabs { display:flex; gap:2px; border-bottom:2px solid var(--border); margin-bottom:20px; flex-wrap:wrap }
.mk-tab-btn { padding:10px 20px; font-size:13px; font-weight:500; color:var(--text2); border:none; background:none; cursor:pointer; font-family:inherit; position:relative; transition:color .15s; display:flex; align-items:center; gap:6px }
.mk-tab-btn:hover { color:var(--text) }
.mk-tab-btn.active { color:var(--sf-blue); font-weight:600 }
.mk-tab-btn.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:var(--sf-blue) }
.mk-tab-content { display:none }
.mk-tab-content.active { display:block }

/* CMS layout */
.mk-cms { display:grid; grid-template-columns:220px 1fr; gap:20px; align-items:start }
.mk-cms-nav { position:sticky; top:72px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px; display:flex; flex-direction:column; gap:2px }
.mk-cms-nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; background:none; border:none; font-family:inherit; font-size:13px; font-weight:500; color:var(--text2); text-align:left; cursor:pointer; transition:all .15s; width:100% }
.mk-cms-nav-item:hover { background:var(--surface2); color:var(--text) }
.mk-cms-nav-item.active { background:rgba(1,118,211,.08); color:var(--sf-blue); font-weight:600 }
.mk-cms-nav-item svg { flex-shrink:0; opacity:.7 }
.mk-cms-nav-count { margin-left:auto; background:#DD7A01; color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px; min-width:18px; text-align:center }
.mk-cms-main { background:var(--surface); border:1px solid var(--border); border-radius:12px; min-height:500px }
.mk-panel { padding:24px }
.mk-panel-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border) }
.mk-panel-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:4px }
.mk-panel-desc { font-size:12px; color:var(--text2) }

/* Form elements */
.mk-form { display:flex; flex-direction:column; gap:14px }
.mk-form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px }
.mk-form-group { display:flex; flex-direction:column; gap:6px }
.mk-form-label { font-size:12px; font-weight:600; color:var(--text); }
.mk-input, .mk-textarea, .mk-select { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:13px; color:var(--text); background:var(--input-bg,var(--surface2)); outline:none; transition:all .15s }
.mk-input:focus, .mk-textarea:focus, .mk-select:focus { border-color:var(--sf-blue); box-shadow:0 0 0 3px rgba(1,118,211,.1) }
.mk-textarea { resize:vertical; min-height:72px }

/* Item list */
.mk-list { display:flex; flex-direction:column; gap:10px }
.mk-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; transition:all .15s }
.mk-item:hover { border-color:var(--text3); background:var(--surface) }
.mk-item-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px }
.mk-item-title { font-size:12px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px }
.mk-item-num { width:22px; height:22px; border-radius:50%; background:var(--sf-blue); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0 }
.mk-item-actions { display:flex; align-items:center; gap:4px }
.mk-icon-btn { width:28px; height:28px; border-radius:6px; background:transparent; border:none; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s }
.mk-icon-btn:hover { background:var(--border); color:var(--text) }
.mk-icon-btn.mk-del:hover { background:rgba(194,57,52,.1); color:#C23934 }
.mk-icon-btn:disabled { opacity:.4; cursor:not-allowed }

.mk-add-btn { padding:12px; border-radius:10px; border:2px dashed var(--border); background:transparent; color:var(--sf-blue); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; width:100%; margin-top:12px }
.mk-add-btn:hover { border-color:var(--sf-blue); background:rgba(1,118,211,.04) }

/* Top action bar */
.mk-top-actions { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px }
.mk-saved-badge { padding:4px 10px; border-radius:20px; background:rgba(46,132,74,.1); color:#2E844A; font-size:11px; font-weight:600 }
.mk-saved-badge.unsaved { background:rgba(221,122,1,.1); color:#DD7A01 }
.mk-top-btn-group { display:flex; gap:6px; flex-wrap:wrap }

/* Logo upload */
.mk-logo-box { display:grid; grid-template-columns:160px 1fr; gap:24px; align-items:center }
.mk-logo-preview { width:140px; height:140px; border-radius:16px; background:var(--surface2); border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative }
.mk-logo-preview img { max-width:100%; max-height:100%; object-fit:contain; padding:12px }
.mk-logo-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text3); font-size:11px; text-align:center; padding:16px }

/* Empty state */
.mk-empty { padding:48px 24px; text-align:center; color:var(--text3); font-size:13px }
.mk-empty-icon { width:48px; height:48px; margin:0 auto 12px; opacity:.5 }

/* Leads table */
.mk-leads-table { width:100%; border-collapse:separate; border-spacing:0 }
.mk-leads-table th { text-align:left; padding:10px; background:var(--surface2); font-size:10px; font-weight:700; letter-spacing:.3px; color:var(--text2); text-transform:uppercase; border-bottom:1px solid var(--border) }
.mk-leads-table td { padding:12px 10px; border-bottom:1px solid var(--border); font-size:12px; color:var(--text) }
.mk-leads-table tbody tr:hover { background:var(--surface2) }

/* Responsive */
@media (max-width:900px) {
  .mk-cms { grid-template-columns:1fr }
  .mk-cms-nav { position:static; flex-direction:row; overflow-x:auto; padding:6px }
  .mk-cms-nav-item { white-space:nowrap; flex-shrink:0 }
  .mk-logo-box { grid-template-columns:1fr; gap:16px; justify-items:center; text-align:center }
  .mk-form-row { grid-template-columns:1fr }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim">
  <div class="page-header">
    <div>
      <div class="page-title reveal">Marketing</div>
      <div class="page-subtitle reveal">จัดการ Landing Page และเนื้อหาทางการตลาด</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="../landing.html" target="_blank" class="btn btn-secondary" style="display:inline-flex;align-items:center;gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ดู Landing Page
      </a>
    </div>
  </div>

  <!-- Top action bar -->
  <div class="mk-top-actions">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="mk-saved-badge" id="saved-badge">บันทึกแล้ว</span>
      <span style="font-size:11px;color:var(--text3)" id="last-saved-text"></span>
    </div>
    <div class="mk-top-btn-group">
      <button class="btn btn-secondary" onclick="exportContent()" style="font-size:12px">Export JSON</button>
      <button class="btn btn-secondary" onclick="document.getElementById('mk-import-file').click()" style="font-size:12px">Import JSON</button>
      <input type="file" id="mk-import-file" accept=".json" style="display:none" onchange="importContent(event)"/>
      <button class="btn btn-secondary" onclick="resetAll()" style="color:#C23934;font-size:12px">Reset</button>
      <button class="btn btn-primary" onclick="saveAll()" style="font-size:12px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><polyline points="20 6 9 17 4 12"/></svg>
        บันทึก
      </button>
    </div>
  </div>

  <!-- CMS Layout: Sidebar + Main -->
  <div class="mk-cms">
    <nav class="mk-cms-nav">
      <button class="mk-cms-nav-item active" data-tab="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
        Logo บริษัท
      </button>
      <button class="mk-cms-nav-item" data-tab="company">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>
        ข้อมูลบริษัท
      </button>
      <button class="mk-cms-nav-item" data-tab="hero">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        Hero Section
      </button>
      <button class="mk-cms-nav-item" data-tab="stats">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="8"/><rect x="12" y="6" width="3" height="12"/><rect x="17" y="13" width="3" height="5"/></svg>
        สถิติ
      </button>
      <button class="mk-cms-nav-item" data-tab="categories">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        หมวดหมู่สินค้า
      </button>
      <button class="mk-cms-nav-item" data-tab="products">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        สินค้า
      </button>
      <button class="mk-cms-nav-item" data-tab="industries">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
        อุตสาหกรรม
      </button>
      <button class="mk-cms-nav-item" data-tab="features">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        จุดเด่น
      </button>
      <button class="mk-cms-nav-item" data-tab="testimonials">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Testimonials
      </button>
      <button class="mk-cms-nav-item" data-tab="clients">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        ลูกค้า
      </button>
      <button class="mk-cms-nav-item" data-tab="leads">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Leads จากฟอร์ม
        <span class="mk-cms-nav-count" id="leads-count">0</span>
      </button>
    </nav>

    <main class="mk-cms-main" id="mk-cms-main">
      <!-- Rendered by marketing.js -->
    </main>
  </div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/landing-data.js"></script>
<script src="../js/logo-manager.js"></script>
<script src="../js/marketing.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('marketing');
if (!requireAuth()) throw 'auth';
</script>
</body>
</html>

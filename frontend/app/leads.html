<script>
document.getElementById('nav').innerHTML=renderNav('leads');
if(!requireAuth()) throw 'auth';

// Close search results when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('#fl-customer-search') && !e.target.closest('#fl-customer-results')) {
    var r = document.getElementById('fl-customer-results');
    if (r) r.style.display = 'none';
  }
});

function renderKanban(){
  var html=STAGES_ORDER.map(function(stage,colIdx){
    var leads=LEADS_DATA[stage]||[];
    var cards='';
    if(leads.length===0){
      cards='<div class="kanban-empty">Drop here</div>';
    }else{
      cards=leads.map(function(l,idx){
        var priColor = l.priority==='High'?'var(--red)':l.priority==='Low'?'var(--text3)':'var(--orange)';
        var ownerName = l.ownerName || '';
        return '<div class="kanban-card" data-col="'+colIdx+'" data-idx="'+idx+'" data-id="'+l.id+'" onclick="openLeadDetail(\''+l.id+'\')" style="cursor:pointer">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
            '<div class="kanban-card-name">'+esc(l.projectName||l.name)+'</div>'+
            '<button onclick="event.stopPropagation();deleteLead(\''+l.id+'\')" style="border:none;background:none;color:var(--text3);cursor:pointer;padding:2px;font-size:14px;line-height:1" title="Delete">&times;</button>'+
          '</div>'+
          (l.company?'<div class="kanban-card-sub">'+esc(l.company)+'</div>':'')+
          '<div style="font-size:11px;color:var(--text2);margin-top:2px">'+esc(l.name)+'</div>'+
          '<div class="kanban-card-footer">'+
            '<span style="font-size:10px;color:var(--text3)">'+esc(l.source||'')+'</span>'+
            (l.priority?'<span style="font-size:9px;font-weight:600;color:'+priColor+'">'+esc(l.priority)+'</span>':'')+
          '</div>'+
          (l.value?'<div style="font-size:11px;font-weight:600;color:var(--sf-blue);margin-top:4px">'+fmt(l.value)+'</div>':'')+
          (ownerName?'<div style="font-size:10px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:4px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'+esc(ownerName)+'</div>':'<div style="font-size:10px;color:var(--orange);margin-top:4px">⚠️ ยังไม่ assign</div>')+
          (l.customerCode?'<div style="font-size:9px;color:var(--text3);font-family:monospace;margin-top:2px">'+esc(l.customerCode)+'</div>':'')+
        '</div>';
      }).join('');
    }
    return '<div class="kanban-col" data-col="'+colIdx+'">'+
      '<div class="kanban-col-header">'+
        '<div class="kanban-col-title">'+
          '<span style="width:7px;height:7px;border-radius:50%;background:'+STAGE_COLORS[stage]+'"></span>'+stage+
        '</div>'+
        '<span class="kanban-badge">'+leads.length+'</span>'+
      '</div>'+
      '<div style="font-size:11px;font-weight:700;color:var(--sf-blue);margin-bottom:8px;padding:0 4px">'+fmt(leads.reduce(function(s,l){return s+(l.value||0)},0))+'</div>'+
      cards+
    '</div>';
  }).join('');
  document.getElementById('kanban').innerHTML=html;
}

/* ══════════════════════════════════════════════════════════
   Mouse-based Drag & Drop
   ══════════════════════════════════════════════════════════ */
(function(){
  var isDragging=false, srcCol=-1, srcIdx=-1, ghost=null, startX=0, startY=0, THRESHOLD=5;
  document.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    var card=e.target.closest('.kanban-card[data-col]');
    if(!card)return;
    srcCol=parseInt(card.getAttribute('data-col'));
    srcIdx=parseInt(card.getAttribute('data-idx'));
    startX=e.clientX; startY=e.clientY;
    function onMove(ev){
      var dx=ev.clientX-startX, dy=ev.clientY-startY;
      if(!isDragging && Math.abs(dx)+Math.abs(dy)<THRESHOLD)return;
      if(!isDragging){ isDragging=true; card.classList.add('dragging'); ghost=card.cloneNode(true); ghost.classList.remove('dragging'); ghost.style.cssText='position:fixed;z-index:9999;pointer-events:none;opacity:0.85;width:'+card.offsetWidth+'px;box-shadow:0 8px 32px rgba(0,0,0,.18);transform:rotate(2deg);transition:none;'; document.body.appendChild(ghost); }
      ghost.style.left=(ev.clientX-card.offsetWidth/2)+'px'; ghost.style.top=(ev.clientY-20)+'px';
      highlightCol(ev.clientX,ev.clientY);
    }
    function onUp(ev){
      document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);
      if(!isDragging){srcCol=-1;srcIdx=-1;return}
      var targetCol=getColAt(ev.clientX,ev.clientY);
      card.classList.remove('dragging');
      if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost); ghost=null;
      document.querySelectorAll('.kanban-col').forEach(function(c){c.classList.remove('drag-over')});
      if(targetCol!==null && targetCol!==srcCol){
        var fromStage=STAGES_ORDER[srcCol], toStage=STAGES_ORDER[targetCol];
        var fromList=LEADS_DATA[fromStage]||[];
        if(srcIdx>=0 && srcIdx<fromList.length){
          var lead=fromList.splice(srcIdx,1)[0];
          if(!LEADS_DATA[toStage])LEADS_DATA[toStage]=[];
          LEADS_DATA[toStage].push(lead);
          renderKanban();
          apiFetch('/leads/'+lead.id, { method:'PATCH', body:JSON.stringify({status:toStage}) }).catch(function(err){console.error('Failed to update lead status:',err)});
        }
      }
      isDragging=false;srcCol=-1;srcIdx=-1;
    }
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
  function highlightCol(x,y){ document.querySelectorAll('.kanban-col[data-col]').forEach(function(c){ var r=c.getBoundingClientRect(); c.classList.toggle('drag-over', x>=r.left && x<=r.right && y>=r.top-30 && y<=r.bottom+30); }); }
  function getColAt(x,y){ var cols=document.querySelectorAll('.kanban-col[data-col]'); for(var i=0;i<cols.length;i++){ var r=cols[i].getBoundingClientRect(); if(x>=r.left && x<=r.right && y>=r.top-30 && y<=r.bottom+30) return parseInt(cols[i].getAttribute('data-col')); } return null; }
})();

async function openCreate(prefilAccountId){
  document.getElementById('kanban').style.display='none';
  document.getElementById('lead-form').style.display='block';
  // Reset all fields
  ['fl-name','fl-contact-phone','fl-contact-email','fl-contact-line','fl-project','fl-value','fl-close-date','fl-notes','fl-customer-search'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fl-priority').value='Medium';
  document.getElementById('fl-source').value='Website';
  document.getElementById('fl-customer-results').style.display='none';
  document.getElementById('fl-customer-selected').style.display='none';
  document.getElementById('fl-customer-selected').innerHTML='';
  selectedAccountId=null;
  selectedAccountData=null;

  // Load products for dropdown
  if(PRODUCTS.length===0) await loadProducts();
  document.getElementById('fl-product').innerHTML='<option value="">-- Select Product --</option>'+
    PRODUCTS.filter(function(p){return p.is_active!==false}).map(function(p){
      return '<option value="'+p.id+'" data-name="'+esc(p.name)+'" data-sku="'+esc(p.sku)+'" data-price="'+(p.unit_price||0)+'">'+esc(p.name)+' ('+esc(p.sku)+') — '+fmt(parseFloat(p.unit_price)||0)+'</option>';
    }).join('');

  // Auto-select source if coming from existing customer
  if(prefilAccountId){
    document.getElementById('fl-source').value='Existing Customer';
    await selectCustomer(prefilAccountId);
  }

  window.scrollTo(0,0);
}

function closeForm(){
  document.getElementById('lead-form').style.display='none';
  document.getElementById('kanban').style.display='flex';
}

async function saveLead(e){
  e.preventDefault();
  var btn=document.getElementById('btn-save-lead');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    var productSel = document.getElementById('fl-product');
    var productOpt = productSel.options[productSel.selectedIndex];
    var productInfo = productSel.value ? {
      productId: productSel.value,
      productName: productOpt.dataset.name || '',
      productSku: productOpt.dataset.sku || '',
      productPrice: parseFloat(productOpt.dataset.price) || 0
    } : null;

    var body = {
      name: document.getElementById('fl-name').value,
      companyName: selectedAccountData ? selectedAccountData.company_name : '',
      email: document.getElementById('fl-contact-email').value,
      phone: document.getElementById('fl-contact-phone').value,
      lineId: document.getElementById('fl-contact-line').value,
      source: document.getElementById('fl-source').value,
      metadata: {
        accountId: selectedAccountId || null,
        customerCode: selectedAccountData ? (selectedAccountData.customer_code || '') : '',
        projectName: document.getElementById('fl-project').value,
        estimatedValue: parseFloat(document.getElementById('fl-value').value) || 0,
        expectedCloseDate: document.getElementById('fl-close-date').value || null,
        priority: document.getElementById('fl-priority').value,
        notes: document.getElementById('fl-notes').value,
        product: productInfo,
        contactPhone: document.getElementById('fl-contact-phone').value,
        contactEmail: document.getElementById('fl-contact-email').value,
        contactLine: document.getElementById('fl-contact-line').value,
      }
    };
    await apiFetch('/leads', { method:'POST', body:JSON.stringify(body) });
    closeForm();
    await loadAndRender();
  } catch(err) {
    alert('Error saving lead: ' + err.message);
  } finally {
    btn.disabled=false; btn.textContent='Save Lead';
  }
}

async function deleteLead(id){
  if(!confirm('Delete this lead?')) return;
  try {
    await apiFetch('/leads/'+id, { method:'DELETE' });
    await loadAndRender();
  } catch(err) { alert('Error deleting lead: ' + err.message); }
}

async function loadAndRender(){
  var repId=document.getElementById('rep-filter').value;
  // Load users for owner name mapping
  if(Object.keys(usersMap).length===0) await loadUsersMap();

  if(repId){
    var res=await apiFetch('/leads?limit=100&assignedTo='+repId).catch(function(){return null});
    var leads=(res&&res.data)||res||[];
    LEADS_DATA={New:[],Contacted:[],Qualified:[],Proposal:[],Negotiation:[],Won:[],Lost:[]};
    leads.forEach(function(l){
      var s=l.status||'New';
      var meta=(typeof l.metadata==='string'?JSON.parse(l.metadata):l.metadata)||{};
      if(LEADS_DATA[s])LEADS_DATA[s].push({id:l.id,name:l.name,company:l.company_name,email:l.email,phone:l.phone,source:l.source,value:meta.estimatedValue||0,assignedTo:l.assigned_to,ownerName:usersMap[l.assigned_to]||'',aiScore:l.ai_score,projectName:meta.projectName||'',priority:meta.priority||'',accountId:meta.accountId||null,customerCode:meta.customerCode||'',notes:meta.notes||''});
    });
  } else {
    await loadLeads();
    // Enrich with owner names
    STAGES_ORDER.forEach(function(stage){
      (LEADS_DATA[stage]||[]).forEach(function(l){ l.ownerName=usersMap[l.assignedTo]||''; });
    });
  }
  renderKanban();
}

// Users map for owner names
var usersMap={};
async function loadUsersMap(){
  try{
    var res=await apiFetch('/users');
    (res||[]).forEach(function(u){ usersMap[u.id]=((u.first_name||'')+' '+(u.last_name||'')).trim(); });
  }catch(e){console.error('loadUsersMap:',e)}
}

// ── Sales Rep filter ──
var currentUser=getUserProfile();
var isManagerRole=currentUser.role==='Admin'||currentUser.role==='Sales Manager';

async function initRepFilter(){
  var sel=document.getElementById('rep-filter');
  if(!isManagerRole){
    // Sales Rep: lock to own leads only, hide dropdown
    sel.style.display='none';
    return;
  }
  // Admin/Manager: load all users for dropdown
  try{
    var res=await apiFetch('/users');
    var users=res||[];
    sel.innerHTML='<option value="">All Sales Reps</option>'+users.map(function(u){
      return '<option value="'+u.id+'">'+esc((u.first_name||'')+' '+(u.last_name||''))+'</option>';
    }).join('');
  }catch(e){console.error('loadUsers:',e)}
}

function onRepFilter(){loadAndRender()}

// Initial load
initRepFilter();
loadAndRender();

function openLeadDetail(id){
  // Find lead across all stages
  var lead=null;
  STAGES_ORDER.forEach(function(stage){
    (LEADS_DATA[stage]||[]).forEach(function(l){ if(l.id===id) lead=l; });
  });
  if(!lead) return;

  document.getElementById('ld-id').value=lead.id;
  document.getElementById('ld-name').value=lead.name||'';
  document.getElementById('ld-company').value=lead.company||'';
  document.getElementById('ld-email').value=lead.email||'';
  document.getElementById('ld-phone').value=lead.phone||'';
  document.getElementById('ld-status').value=lead.status||'New';
  document.getElementById('ld-priority').value=lead.priority||'Medium';
  document.getElementById('ld-source').value=lead.source||'Website';
  document.getElementById('ld-value').value=lead.value||0;
  document.getElementById('ld-project').value=lead.projectName||'';
  document.getElementById('ld-notes').value=lead.notes||'';

  // Populate assign dropdown
  var assignSel=document.getElementById('ld-assigned');
  assignSel.innerHTML='<option value="">-- ยังไม่ assign --</option>';
  Object.keys(usersMap).forEach(function(uid){
    assignSel.innerHTML+='<option value="'+uid+'"'+(lead.assignedTo===uid?' selected':'')+'>'+esc(usersMap[uid])+'</option>';
  });

  document.getElementById('lead-detail-modal').classList.add('open');
}

function closeLeadDetail(){ document.getElementById('lead-detail-modal').classList.remove('open'); }

async function saveLeadDetail(e){
  e.preventDefault();
  var btn=document.getElementById('ld-save-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try{
    var id=document.getElementById('ld-id').value;
    var body={
      name:document.getElementById('ld-name').value,
      companyName:document.getElementById('ld-company').value,
      email:document.getElementById('ld-email').value,
      phone:document.getElementById('ld-phone').value,
      status:document.getElementById('ld-status').value,
      source:document.getElementById('ld-source').value,
      assigned_to:document.getElementById('ld-assigned').value||null,
      metadata:{
        estimatedValue:parseFloat(document.getElementById('ld-value').value)||0,
        projectName:document.getElementById('ld-project').value,
        priority:document.getElementById('ld-priority').value,
        notes:document.getElementById('ld-notes').value
      }
    };
    await apiFetch('/leads/'+id,{method:'PATCH',body:JSON.stringify(body)});
    closeLeadDetail();
    await loadAndRender();
  }catch(err){alert('Error: '+err.message)}
  finally{btn.disabled=false;btn.textContent='Save Changes'}
}

document.getElementById('lead-detail-modal').addEventListener('click',function(e){if(e.target===this)closeLeadDetail()});
</script></body></html>

<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — ลีด</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title">ลีด</div><div class="page-subtitle">จัดการลีดและติดตามสถานะ</div></div>
    <div class="page-actions"><button class="btn btn-secondary">นำเข้า CSV</button><button class="btn btn-primary">+ สร้างลีด</button></div></div>
  <div class="kanban" id="kanban"></div>
</div>
<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('leads');
function sc(s){return s>=70?'ai-high':s>=40?'ai-mid':'ai-low'}
document.getElementById('kanban').innerHTML=STAGES_ORDER.map(stage=>{const leads=LEADS_DATA[stage]||[];return`<div class="kanban-col"><div class="kanban-col-header"><div class="kanban-col-title"><span style="width:7px;height:7px;border-radius:50%;background:${STAGE_COLORS[stage]}"></span>${stage}</div><span class="kanban-badge">${leads.length}</span></div>${leads.length===0?'<div class="empty-state" style="padding:20px;font-size:12px">ว่าง</div>':leads.map(l=>`<div class="kanban-card"><div class="kanban-card-name">${l.name}</div>${l.company?`<div class="kanban-card-sub">${l.company}</div>`:''}<div class="kanban-card-footer"><span style="font-size:10px;color:var(--text3)">${l.source}</span>${l.score?`<span class="ai-badge ${sc(l.score)}">${l.score}</span>`:''}</div>${l.assigned?`<div style="font-size:10px;color:var(--text3);margin-top:6px">${l.assigned}</div>`:''}</div>`).join('')}</div>`}).join('');
</script></body></html>

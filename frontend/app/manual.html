<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — User Manual</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.manual{max-width:900px;margin:0 auto}
.lang-toggle{display:flex;gap:4px;margin-bottom:24px}
.lang-btn{padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--text2);transition:all .15s}
.lang-btn.active{background:var(--sf-blue);color:#fff;border-color:var(--sf-blue)}
.chapter{margin-bottom:32px}
.ch-title{font-size:18px;font-weight:800;color:var(--sf-blue);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ch-num{width:28px;height:28px;border-radius:50%;background:var(--sf-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ch-body{padding-left:38px}
.ch-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.ch-steps{list-style:none;padding:0;counter-reset:step}
.ch-steps li{counter-increment:step;padding:8px 0 8px 32px;position:relative;font-size:13px;line-height:1.6;color:var(--text);border-bottom:1px solid var(--border)}
.ch-steps li:last-child{border-bottom:none}
.ch-steps li::before{content:counter(step);position:absolute;left:0;top:8px;width:22px;height:22px;border-radius:50%;background:rgba(1,118,211,.08);color:var(--sf-blue);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ch-tip{margin-top:8px;padding:10px 14px;border-radius:8px;background:rgba(1,118,211,.04);border:1px solid rgba(1,118,211,.1);font-size:12px;color:var(--text2)}
.ch-tip strong{color:var(--sf-blue)}
.screenshot{width:100%;border-radius:10px;border:1px solid var(--border);margin:12px 0;box-shadow:var(--shadow)}
.toc{margin-bottom:28px}
.toc a{display:block;padding:6px 0;font-size:13px;color:var(--sf-blue);text-decoration:none;border-bottom:1px solid var(--border)}
.toc a:hover{text-decoration:underline}
@media print{.sf7-nav,.lang-toggle,.page-header .btn,.toc{display:none!important}.page{padding:0!important;max-width:100%!important}.ch-title{break-before:page}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim manual">
  <div class="page-header">
    <div>
      <div class="page-title">User Manual / คู่มือการใช้งาน</div>
      <div class="page-subtitle">SalesFAST 7 CRM Platform</div>
    </div>
    <button class="btn btn-secondary" onclick="window.print()">Print / Save PDF</button>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setManualLang('th',this)">ภาษาไทย</button>
    <button class="lang-btn" onclick="setManualLang('en',this)">English</button>
  </div>

  <!-- Table of Contents -->
  <div class="card toc" style="margin-bottom:24px">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px" id="toc-title">สารบัญ</div>
    <div id="toc-links"></div>
  </div>

  <div id="manual-content"></div>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('manual');

var ML='th';
function setManualLang(l,btn){
  ML=l;
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  renderManual();
}

function renderManual(){
  var chs=CHAPTERS[ML];
  document.getElementById('toc-title').textContent=ML==='th'?'สารบัญ':'Table of Contents';
  document.getElementById('toc-links').innerHTML=chs.map(function(c,i){
    return '<a href="#ch-'+i+'">'+(i+1)+'. '+c.title+'</a>';
  }).join('');

  document.getElementById('manual-content').innerHTML=chs.map(function(c,i){
    var pageLink='';
    if(c.page){
      pageLink='<a href="'+c.page+'" target="_blank" style="font-size:12px;color:var(--sf-blue);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px">'+(ML==='th'?'เปิดหน้านี้':'Open this page')+' &rarr;</a>';
    }
    var screenshot='';
    if(c.page){
      screenshot='<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0;position:relative;height:280px;background:var(--surface2)">'
        +'<iframe src="'+c.page+'" style="width:200%;height:200%;transform:scale(0.5);transform-origin:top left;pointer-events:none;border:none"></iframe>'
        +'<div style="position:absolute;inset:0;cursor:pointer" onclick="window.open(\''+c.page+'\',\'_blank\')"></div>'
        +'</div>';
    }
    return '<div class="chapter" id="ch-'+i+'">'
      +'<div class="ch-title"><span class="ch-num">'+(i+1)+'</span>'+c.title+'</div>'
      +'<div class="ch-body">'
        +pageLink
        +'<div class="ch-desc">'+c.desc+'</div>'
        +screenshot
        +'<ol class="ch-steps">'+c.steps.map(function(s){return '<li>'+s+'</li>'}).join('')+'</ol>'
        +(c.tip?'<div class="ch-tip"><strong>'+(ML==='th'?'Tip:':'Tip:')+'</strong> '+c.tip+'</div>':'')
      +'</div>'
    +'</div>';
  }).join('');
}

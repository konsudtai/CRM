<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Customer Detail</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.info-label{font-size:12px;color:var(--text3);font-weight:500}
.info-value{font-size:13px;font-weight:500;text-align:right}
.stat-mini{padding:16px;text-align:center}
.stat-mini-val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.stat-mini-label{font-size:11px;color:var(--text3);margin-top:4px}
.contact-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;background:var(--surface2);margin-bottom:8px}
.contact-avatar{width:36px;height:36px;border-radius:50%;background:var(--sf-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;font-family:inherit;position:relative}
.tab-btn.active{color:var(--sf-blue);font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--sf-blue)}
.tab-content{display:none}.tab-content.active{display:block}
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim" id="page-content">
  <div style="padding:60px;text-align:center;color:var(--text3)">Loading...</div>
</div>

<script src="../js/motion.js"></script><script src="../js/helpers.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('accounts');
if(!requireAuth()) throw 'auth';

var accountId = new URLSearchParams(window.location.search).get('id');
var currentAccount = null; // store for edit form
if (!accountId) {
  document.getElementById('page-content').innerHTML = '<div class="empty-state">No account ID</div>';
} else {
  loadDetail();
}

async function loadDetail() {
  try {
    var a = await apiFetch('/accounts/' + accountId);
    if (!a || a.message) { document.getElementById('page-content').innerHTML = '<div class="empty-state">Account not found. <a href="accounts.html">Back</a></div>'; return; }
    currentAccount = a;

    var contacts = []; try { contacts = await apiFetch('/accounts/' + accountId + '/contacts') || []; } catch(e) {}
    var activities = []; try { activities = await apiFetch('/accounts/' + accountId + '/activities?limit=20') || []; } catch(e) {}
    if (!Array.isArray(contacts)) contacts = [];
    if (!Array.isArray(activities)) activities = [];

    var name = a.company_name || '';
    var status = a.account_status || 'active';
    var tier = a.account_tier || 'standard';
    var industry = a.industry || '-';
    var phone = a.phone || '-';
    var email = a.email || '-';
    var revenue = parseFloat(a.total_revenue || 0);
    var tags = a.tags || [];

    document.getElementById('page-content').innerHTML =
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">' +
        '<a href="accounts.html" class="btn btn-secondary" style="padding:6px 12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</a>' +
        '<div style="flex:1"></div>' +
        '<button class="btn btn-secondary" onclick="openEditForm()" style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>' +
        '<a href="leads.html?accountId=' + accountId + '&company=' + encodeURIComponent(name) + '&newLead=1" class="btn btn-primary" style="display:flex;align-items:center;gap:6px;text-decoration:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> New Lead</a>' +
        '<a href="quotations.html?accountId=' + accountId + '" class="btn btn-secondary" style="display:flex;align-items:center;gap:6px;text-decoration:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> New Quotation</a>' +
      '</div>' +
      '<div class="page-header" style="margin-bottom:16px"><div>' +
        '<div class="page-title">' + esc(name) + ' <span class="status-badge" style="background:rgba(46,132,74,.1);color:#2E844A;font-size:11px">' + esc(status) + '</span> <span class="tag">' + esc(tier) + '</span></div>' +
        '<div class="page-subtitle">' + esc(industry) + ' &middot; ' + esc(phone) + '</div>' +
      '</div></div>' +

      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">' +
        '<div class="card stat-mini"><div class="stat-mini-val" style="color:var(--sf-blue)">' + fmt(revenue) + '</div><div class="stat-mini-label">Revenue</div></div>' +
        '<div class="card stat-mini"><div class="stat-mini-val">' + contacts.length + '</div><div class="stat-mini-label">Contacts</div></div>' +
        '<div class="card stat-mini"><div class="stat-mini-val">' + esc(a.total_deals || '0') + '</div><div class="stat-mini-label">Deals</div></div>' +
        '<div class="card stat-mini"><div class="stat-mini-val">' + activities.length + '</div><div class="stat-mini-label">Activities</div></div>' +
      '</div>' +

      '<div class="tab-bar">' +
        '<button class="tab-btn active" onclick="showTab(\'info\',this)">Company Info</button>' +
        '<button class="tab-btn" onclick="showTab(\'contacts\',this)">Contacts (' + contacts.length + ')</button>' +
        '<button class="tab-btn" onclick="showTab(\'timeline\',this)">Timeline</button>' +
      '</div>' +

      '<div class="tab-content active" id="tab-info"><div class="detail-grid"><div>' +
        '<div class="card" style="margin-bottom:16px">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Company Information</div>' +
          infoRow('Customer Code', a.customer_code || '-') +
          infoRow('Company Name', name) +
          infoRow('Company Name (EN)', a.company_name_en || '-') +
          infoRow('Industry', industry) +
          infoRow('Tax ID', a.tax_id || '-') +
          infoRow('Branch', a.branch_code || '00000') +
          infoRow('Website', a.website || '-') +
          infoRow('Status', status) +
          infoRow('Tier', tier) +
          infoRow('Credit Term', (a.credit_term || 30) + ' days') +
          infoRow('Created By', a.created_by_name || '-') +
        '</div>' +
        '<div class="card">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Contact Information</div>' +
          (contacts.length > 0 ?
            '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">ผู้ติดต่อหลัก</div>' +
            infoRow('Name', contacts[0].first_name + ' ' + contacts[0].last_name) +
            infoRow('Position', contacts[0].title || '-') +
          '' : '') +
          infoRow('Phone', phone) +
          infoRow('Email', email) +
          infoRow('Address', [a.address, a.sub_district, a.district, a.province, a.postal_code].filter(Boolean).join(', ') || '-') +
        '</div>' +
      '</div><div>' +
        '<div class="card" style="margin-bottom:16px">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Tags</div>' +
          (tags.length ? tags.map(function(t){ return '<span class="tag">' + esc(t) + '</span> '; }).join('') : '<span style="color:var(--text3);font-size:12px">No tags</span>') +
        '</div>' +
        '<div class="card">' +
          '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Notes</div>' +
          '<div style="font-size:13px;color:var(--text2)">' + esc(a.internal_notes || 'No notes') + '</div>' +
        '</div>' +
      '</div></div></div>' +

      '<div class="tab-content" id="tab-contacts"><div class="card">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--sf-blue)">Contacts</div><button class="btn btn-primary" style="padding:6px 14px;font-size:12px" onclick="addContact()">+ Add</button></div>' +
        (contacts.length === 0 ? '<div class="empty-state">No contacts</div>' :
          contacts.map(function(c) {
            return '<div class="contact-card"><div class="contact-avatar">' + esc((c.first_name||'?')[0]) + '</div><div style="flex:1">' +
              '<div style="font-size:14px;font-weight:600">' + esc(c.first_name + ' ' + c.last_name) + '</div>' +
              '<div style="font-size:12px;color:var(--text2)">' + esc(c.title||'') + (c.department ? ' &middot; ' + esc(c.department) : '') + '</div>' +
              '<div style="font-size:12px;color:var(--text2);margin-top:4px">' + esc(c.phone||'') + (c.email ? ' &middot; ' + esc(c.email) : '') + '</div>' +
            '</div></div>';
          }).join('')) +
      '</div></div>' +

      '<div class="tab-content" id="tab-timeline"><div class="card">' +
        '<div class="timeline-item"><div class="timeline-dot" style="background:var(--sf-blue)"></div><div><div style="font-size:13px;font-weight:500">Account created</div><div style="font-size:12px;color:var(--text3)">' + (a.created_at ? a.created_at.slice(0,10) : '') + '</div></div></div>' +
        activities.map(function(act) {
          return '<div class="timeline-item"><div class="timeline-dot" style="background:var(--sf-blue)"></div><div><div style="font-size:13px;font-weight:500">' + esc(act.summary||'') + '</div><div style="font-size:12px;color:var(--text3)">' + (act.timestamp ? act.timestamp.slice(0,10) : '') + '</div></div></div>';
        }).join('') +
      '</div></div>';

  } catch(e) {
    console.error('loadDetail error:', e);
    document.getElementById('page-content').innerHTML = '<div class="empty-state" style="color:var(--red)">Error: ' + esc(e.message) + '<br><br><a href="accounts.html" class="btn btn-secondary">Back to Accounts</a></div>';
  }
}

function infoRow(label, value) {
  return '<div class="info-row"><span class="info-label">' + esc(label) + '</span><span class="info-value">' + esc(value) + '</span></div>';
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

function addContact() {
  var first = prompt('First name:');
  if (!first) return;
  var last = prompt('Last name:') || '';
  apiFetch('/accounts/' + accountId + '/contacts', {
    method: 'POST',
    body: JSON.stringify({ firstName: first, lastName: last })
  }).then(function() { location.reload(); }).catch(function(e) { alert('Error: ' + e.message); });
}

function createLeadFromAccount() {
  var contactName = prompt('Contact name for this lead:');
  if (!contactName) return;
  var source = prompt('Source (website, referral, line, cold_call):', 'referral') || 'referral';

  apiFetch('/leads', {
    method: 'POST',
    body: JSON.stringify({
      name: contactName,
      companyName: document.querySelector('.page-title') ? document.querySelector('.page-title').textContent.trim().split(' ')[0] : '',
      source: source,
      metadata: { accountId: accountId }
    })
  }).then(function(res) {
    if (res && res.id) {
      alert('Lead created: ' + contactName);
      window.location.href = 'leads.html';
    }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function createQuotationFromAccount() {
  window.location.href = 'quotations.html?accountId=' + accountId;
}

function openEditForm() {
  if (!currentAccount) return;
  var a = currentAccount;
  var contacts = a.contacts || [];
  var contactName = contacts.length > 0 ? (contacts[0].first_name||'') + ' ' + (contacts[0].last_name||'') : '';
  var contactTitle = contacts.length > 0 ? (contacts[0].title||'') : '';
  var html = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">' +
    '<button class="btn btn-secondary" style="padding:6px 12px" onclick="loadDetail()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Cancel</button>' +
    '<div class="page-title">Edit Customer</div></div>' +
    '<form onsubmit="saveEdit(event)">' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Company Information</div>' +
      '<div class="form-grid">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Company Name *</label><input class="sf7-form-input" id="e-name" value="' + esc(a.company_name||'') + '" required/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Company Name (EN)</label><input class="sf7-form-input" id="e-name-en" value="' + esc(a.company_name_en||'') + '"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Industry</label><input class="sf7-form-input" id="e-industry" value="' + esc(a.industry||'') + '"/></div>' +
      '</div>' +
      '<div class="form-grid" style="margin-top:12px">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Tax ID</label><input class="sf7-form-input" id="e-tax" value="' + esc(a.tax_id||'') + '" maxlength="13"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Website</label><input class="sf7-form-input" id="e-website" value="' + esc(a.website||'') + '"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Status</label><select class="sf7-form-input" id="e-status"><option value="active"' + (a.account_status==='active'?' selected':'') + '>Active</option><option value="inactive"' + (a.account_status==='inactive'?' selected':'') + '>Inactive</option><option value="prospect"' + (a.account_status==='prospect'?' selected':'') + '>Prospect</option></select></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Tier</label><select class="sf7-form-input" id="e-tier"><option value="standard"' + (a.account_tier==='standard'?' selected':'') + '>Standard</option><option value="silver"' + (a.account_tier==='silver'?' selected':'') + '>Silver</option><option value="gold"' + (a.account_tier==='gold'?' selected':'') + '>Gold</option><option value="platinum"' + (a.account_tier==='platinum'?' selected':'') + '>Platinum</option></select></div>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Contact Information</div>' +
      '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">ผู้ติดต่อหลัก (Primary Contact)</div>' +
      '<div class="form-grid">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Contact Name</label><input class="sf7-form-input" id="e-contact-name" value="' + esc(contactName) + '" placeholder="ชื่อผู้ติดต่อ"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Position / Title</label><input class="sf7-form-input" id="e-contact-title" value="' + esc(contactTitle) + '" placeholder="ตำแหน่ง"/></div>' +
      '</div>' +
      '<div class="form-grid" style="margin-top:12px">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Phone</label><input class="sf7-form-input" id="e-phone" value="' + esc(a.phone||'') + '"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Email</label><input class="sf7-form-input" id="e-email" type="email" value="' + esc(a.email||'') + '"/></div>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Address</div>' +
      '<div class="sf7-form-group"><label class="sf7-form-label">Address</label><textarea class="sf7-form-input" id="e-addr" rows="2">' + esc(a.address||'') + '</textarea></div>' +
      '<div class="form-grid" style="margin-top:12px">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Sub-district</label><input class="sf7-form-input" id="e-sub" value="' + esc(a.sub_district||'') + '"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">District</label><input class="sf7-form-input" id="e-dist" value="' + esc(a.district||'') + '"/></div>' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Province</label><input class="sf7-form-input" id="e-prov" value="' + esc(a.province||'') + '"/></div>' +
      '</div>' +
      '<div class="form-grid" style="margin-top:12px">' +
        '<div class="sf7-form-group"><label class="sf7-form-label">Postal Code</label><input class="sf7-form-input" id="e-zip" value="' + esc(a.postal_code||'') + '" maxlength="5"/></div>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Notes</div>' +
      '<div class="sf7-form-group"><textarea class="sf7-form-input" id="e-notes" rows="3">' + esc(a.internal_notes||'') + '</textarea></div>' +
    '</div>' +
    '<div style="display:flex;gap:10px;justify-content:flex-end">' +
      '<button type="button" class="btn btn-secondary" onclick="loadDetail()">Cancel</button>' +
      '<button type="submit" class="btn btn-primary">Save Changes</button>' +
    '</div></form>';
  document.getElementById('page-content').innerHTML = html;
}

async function saveEdit(e) {
  e.preventDefault();
  var data = {
    companyName: document.getElementById('e-name').value,
    companyNameEn: document.getElementById('e-name-en').value || null,
    industry: document.getElementById('e-industry').value || null,
    taxId: document.getElementById('e-tax').value || null,
    accountStatus: document.getElementById('e-status').value,
    accountTier: document.getElementById('e-tier').value,
    phone: document.getElementById('e-phone').value || null,
    email: document.getElementById('e-email').value || null,
    website: document.getElementById('e-website').value || null,
    address: document.getElementById('e-addr').value || null,
    subDistrict: document.getElementById('e-sub').value || null,
    district: document.getElementById('e-dist').value || null,
    province: document.getElementById('e-prov').value || null,
    postalCode: document.getElementById('e-zip').value || null,
    internalNotes: document.getElementById('e-notes').value || null,
  };
  try {
    await apiFetch('/accounts/' + accountId, { method: 'PATCH', body: JSON.stringify(data) });

    // Update or create primary contact
    var contactNameVal = (document.getElementById('e-contact-name') || {}).value || '';
    var contactTitleVal = (document.getElementById('e-contact-title') || {}).value || '';
    if (contactNameVal) {
      var parts = contactNameVal.trim().split(' ');
      var firstName = parts[0] || '';
      var lastName = parts.slice(1).join(' ') || '';
      var contacts = (currentAccount && currentAccount.contacts) || [];
      if (contacts.length > 0) {
        // Update existing contact (use contacts endpoint — for now just log)
        // TODO: add PATCH /contacts/:id endpoint
      } else {
        // Create new contact
        await apiFetch('/accounts/' + accountId + '/contacts', {
          method: 'POST',
          body: JSON.stringify({ firstName: firstName, lastName: lastName, title: contactTitleVal, phone: data.phone, email: data.email })
        }).catch(function(e) { console.error('Contact update:', e); });
      }
    }

    loadDetail();
  } catch(err) {
    alert('Error: ' + err.message);
  }
}
</script>
</body>
</html>

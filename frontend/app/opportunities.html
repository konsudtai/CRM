<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — โอกาสขาย</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title">โอกาสการขาย</div><div class="page-subtitle">จัดการดีลและไปป์ไลน์</div></div><button class="btn btn-primary">+ สร้างโอกาส</button></div>
  <div class="kanban" id="kanban"></div>
  <div class="card" style="margin-top:24px"><div class="section-title">รายการดีลทั้งหมด</div>
    <div class="table-wrap"><table><thead><tr><th>ชื่อดีล</th><th>ลูกค้า</th><th>ขั้นตอน</th><th>มูลค่า</th><th>AI %</th><th>Close Date</th><th>ผู้รับผิดชอบ</th></tr></thead>
      <tbody id="opp-table"></tbody></table></div>
  </div>
</div>
<script src="../js/helpers.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('opportunities');
const oppStages=['Qualified','Proposal','Negotiation','Won'];
const grouped={};oppStages.forEach(s=>grouped[s]=OPPS.filter(o=>o.stage===s));
document.getElementById('kanban').innerHTML=oppStages.map(stage=>{const opps=grouped[stage]||[];const total=opps.reduce((s,o)=>s+o.value,0);return`<div class="kanban-col" style="width:260px"><div class="kanban-col-header"><div class="kanban-col-title"><span style="width:7px;height:7px;border-radius:50%;background:${STAGE_COLORS[stage]||'var(--sf-blue)'}"></span>${stage}</div><span class="kanban-badge">${opps.length}</span></div><div style="font-size:10px;color:var(--text3);margin-bottom:10px">${fmt(total)}</div>${opps.map(o=>`<div class="kanban-card"><div class="kanban-card-name">${o.name}</div><div class="kanban-card-sub">${o.account}</div><div class="kanban-card-footer"><span style="font-size:13px;font-weight:600;color:var(--sf-blue)">${fmt(o.value)}</span><span style="font-size:10px;color:var(--text3)">${o.prob}%</span></div><div style="font-size:10px;color:var(--text3);margin-top:6px">Close: ${o.close} · ${o.days>0?o.days+'d':''}</div></div>`).join('')}</div>`}).join('');
document.getElementById('opp-table').innerHTML=OPPS.map(o=>`<tr><td><a href="#" class="table-link">${o.name}</a></td><td style="color:var(--text2)">${o.account}</td><td><span class="status-badge" style="background:${STAGE_COLORS[o.stage]||'var(--sf-blue)'}22;color:${STAGE_COLORS[o.stage]||'var(--sf-blue)'}">${o.stage}</span></td><td style="font-weight:600">${fmt(o.value)}</td><td><span class="ai-badge ${o.prob>=70?'ai-high':o.prob>=40?'ai-mid':'ai-low'}">${o.prob}%</span></td><td style="color:var(--text2);font-size:12px">${o.close}</td><td style="color:var(--text2)">${o.assigned}</td></tr>`).join('');
</script></body></html>

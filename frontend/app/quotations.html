<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Quotations</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.qt-summary{background:var(--surface);border-radius:12px;padding:18px 20px;border:1px solid var(--border);position:sticky;top:70px}
.qt-summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.qt-summary-row.total{border-top:2px solid var(--sf-blue);padding-top:12px;margin-top:8px;font-size:15px;font-weight:700}
.qt-line-table th,.qt-line-table td{padding:8px 6px;font-size:12px}
.qt-line-table input,.qt-line-table select{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);font-size:12px;font-family:inherit;color:var(--text);outline:none;width:100%}
.qt-line-table input:focus,.qt-line-table select:focus{border-color:var(--sf-blue)}
.qt-remove{width:24px;height:24px;border-radius:50%;border:none;background:rgba(194,57,52,.06);color:#C23934;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.qt-remove:hover{background:rgba(194,57,52,.12)}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="nav"></div>
<div class="page anim">
  <div class="page-header">
    <div><div class="page-title">Quotations</div><div class="page-subtitle">Create and manage quotations — VAT 7% / WHT auto-calculated</div></div>
    <button class="btn btn-primary" onclick="openCreate()" id="create-btn">+ New Quotation</button>
  </div>

  <!-- List -->
  <div id="list-view">
    <div class="filter-bar" style="margin-bottom:16px" id="qt-filter">
      <button class="filter-btn active" onclick="filterQt('all',this)">All</button>
      <button class="filter-btn" onclick="filterQt('draft',this)">Draft</button>
      <button class="filter-btn" onclick="filterQt('pending_approval',this)">Pending Approval</button>
      <button class="filter-btn" onclick="filterQt('sent',this)">Sent</button>
      <button class="filter-btn" onclick="filterQt('accepted',this)">Accepted</button>
    </div>
    <div class="card"><div class="table-wrap"><table><thead><tr><th>Number</th><th>Customer</th><th>Status</th><th>Subtotal</th><th>VAT</th><th>WHT</th><th>Total</th><th>Date</th><th style="width:100px">Actions</th></tr></thead><tbody id="tbody"></tbody></table></div></div>
  </div>

  <!-- Create Form -->
  <div id="form-view" style="display:none">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="btn btn-secondary" onclick="closeForm()" style="padding:6px 12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</button>
      <div class="page-title">New Quotation</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:16px">
      <div>
        <!-- Customer -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:700;color:var(--sf-blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Customer</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="sf7-form-group"><label class="sf7-form-label">Customer *</label><select class="sf7-form-input" id="qt-account" required></select></div>
            <div class="sf7-form-group"><label class="sf7-form-label">Valid Until</label><input class="sf7-form-input" id="qt-valid" type="date"/></div>
          </div>
        </div>
        <!-- Lines -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div style="font-size:13px;font-weight:700;color:var(--sf-blue)">Line Items</div>
            <button class="btn btn-secondary" onclick="addLine()" style="padding:5px 12px;font-size:12px">+ Add Item</button>
          </div>
          <div class="table-wrap"><table class="qt-line-table"><thead><tr><th>Product</th><th style="width:60px">Qty</th><th style="width:90px">Price</th><th style="width:70px">Disc.</th><th style="width:50px">WHT%</th><th style="width:80px">Total</th><th style="width:28px"></th></tr></thead><tbody id="qt-lines"></tbody></table></div>
        </div>
      </div>
      <!-- Summary -->
      <div>
        <div class="qt-summary">
          <div style="font-size:13px;font-weight:700;margin-bottom:14px">Summary</div>
          <div class="qt-summary-row"><span style="color:var(--text2)">Subtotal</span><span id="sum-subtotal">&#3647;0</span></div>
          <div class="qt-summary-row"><span style="color:var(--text2)">Discount</span><span id="sum-discount" style="color:var(--red)">-&#3647;0</span></div>
          <div class="qt-summary-row"><span style="color:var(--text2)">VAT 7%</span><span id="sum-vat">&#3647;0</span></div>
          <div class="qt-summary-row"><span style="color:var(--text2)">WHT</span><span id="sum-wht" style="color:var(--red)">-&#3647;0</span></div>
          <div class="qt-summary-row total"><span style="color:var(--sf-blue)">Grand Total</span><span style="color:var(--sf-blue)" id="sum-grand">&#3647;0</span></div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:20px">
            <button class="btn btn-primary" onclick="saveQuotation()" id="btn-save-qt" style="width:100%;justify-content:center">Save as Draft</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('quotations');
if(!requireAuth()) throw 'auth';

var qtFilter='all', lineCounter=0;

function filterQt(f,btn){qtFilter=f;document.querySelectorAll('#qt-filter .filter-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');renderTable()}

function renderTable(){
  var f=qtFilter==='all'?QUOTATIONS:QUOTATIONS.filter(function(q){return q.status===qtFilter});
  document.getElementById('tbody').innerHTML=f.map(function(q){
    var statusLabel = (STATUS_LABELS[q.status]||q.status);
    var statusColor = (STATUS_COLORS[q.status]||'var(--text2)');
    var dateStr = q.created_at ? new Date(q.created_at).toLocaleDateString('th-TH') : '-';
    var actions = '';
    if(q.status==='draft') actions='<button class="btn btn-primary" style="padding:3px 10px;font-size:11px" onclick="submitQt(\''+q.id+'\')">Submit for Approval</button>';
    else if(q.status==='pending_approval') actions='<button class="btn btn-primary" style="padding:3px 10px;font-size:11px" onclick="approveQt(\''+q.id+'\')">Approve</button> <button class="btn btn-secondary" style="padding:3px 10px;font-size:11px;color:var(--red)" onclick="rejectQt(\''+q.id+'\')">Reject</button>';
    else if(q.status==='sent') actions='<button class="btn btn-primary" style="padding:3px 10px;font-size:11px" onclick="acceptQt(\''+q.id+'\')">Mark Accepted</button>';
    else if(q.status==='accepted') actions='<span style="font-size:11px;color:#2E844A;font-weight:600">✓ Accepted</span>';

    return '<tr>'+
      '<td style="font-weight:500;color:var(--sf-blue)">'+esc(q.quotation_number||'')+'</td>'+
      '<td style="color:var(--text2);font-size:12px">'+esc(q.account_name||'')+'</td>'+
      '<td><span class="status-badge" style="background:'+statusColor+'18;color:'+statusColor+'">'+statusLabel+'</span></td>'+
      '<td>'+fmt(parseFloat(q.subtotal)||0)+'</td>'+
      '<td>'+fmt(parseFloat(q.vat_amount)||0)+'</td>'+
      '<td style="color:var(--red)">-'+fmt(parseFloat(q.wht_amount)||0)+'</td>'+
      '<td style="font-weight:600;color:var(--sf-blue)">'+fmt(parseFloat(q.grand_total)||0)+'</td>'+
      '<td style="color:var(--text2)">'+dateStr+'</td>'+
      '<td>'+actions+'</td>'+
    '</tr>';
  }).join('')||'<tr><td colspan="9" class="empty-state">No quotations</td></tr>';
}

async function openCreate(){
  // Load accounts and products
  if(ACCOUNTS.length===0) await loadAccounts();
  if(PRODUCTS.length===0) await loadProducts();

  document.getElementById('list-view').style.display='none';
  document.getElementById('qt-filter').style.display='none';
  document.getElementById('create-btn').style.display='none';
  document.getElementById('form-view').style.display='block';

  document.getElementById('qt-account').innerHTML='<option value="">-- Select Customer --</option>'+ACCOUNTS.map(function(a){
    return '<option value="'+a.id+'">'+esc(a.customer_code?a.customer_code+' — ':'')+esc(a.company_name)+'</option>';
  }).join('');

  var d=new Date();d.setDate(d.getDate()+30);
  document.getElementById('qt-valid').value=d.toISOString().slice(0,10);
  lineCounter=0;document.getElementById('qt-lines').innerHTML='';addLine();
  window.scrollTo(0,0);

  // Auto-select account if passed via URL param
  var urlAcc=new URLSearchParams(window.location.search).get('accountId');
  if(urlAcc){document.getElementById('qt-account').value=urlAcc}
}

function closeForm(){
  document.getElementById('form-view').style.display='none';
  document.getElementById('list-view').style.display='block';
  document.getElementById('qt-filter').style.display='inline-flex';
  document.getElementById('create-btn').style.display='inline-flex';
}

function addLine(){
  lineCounter++;var id=lineCounter;
  var opts='<option value="">-- Custom --</option>'+PRODUCTS.filter(function(p){return p.is_active!==false}).map(function(p){
    return '<option value="'+p.id+'" data-price="'+(p.unit_price||0)+'" data-wht="'+(p.wht_rate||0)+'" data-name="'+esc(p.name)+'" data-sku="'+(p.sku||'')+'">'+esc(p.name)+' ('+esc(p.sku)+')</option>';
  }).join('');
  var row=document.createElement('tr');row.id='line-'+id;
  row.innerHTML='<td><select onchange="selProd('+id+')" id="sel-'+id+'" style="margin-bottom:4px">'+opts+'</select><input type="text" id="name-'+id+'" placeholder="Product name"/></td><td><input type="number" value="1" min="1" onchange="calc()" id="qty-'+id+'"/></td><td><input type="number" id="price-'+id+'" onchange="calc()" placeholder="0"/></td><td><input type="number" value="0" min="0" id="disc-'+id+'" onchange="calc()"/></td><td><input type="number" value="0" min="0" max="5" id="wht-'+id+'" onchange="calc()" style="width:44px"/></td><td style="font-weight:600;color:var(--sf-blue)" id="total-'+id+'">&#3647;0</td><td><button class="qt-remove" onclick="document.getElementById(\'line-'+id+'\').remove();calc()">x</button></td>';
  document.getElementById('qt-lines').appendChild(row);calc();
}

function selProd(id){
  var s=document.getElementById('sel-'+id),o=s.options[s.selectedIndex];
  if(o&&o.value){
    document.getElementById('name-'+id).value=o.dataset.name||'';
    document.getElementById('price-'+id).value=o.dataset.price||0;
    document.getElementById('wht-'+id).value=o.dataset.wht||0;
  }
  calc();
}

function calc(){
  var rows=document.getElementById('qt-lines').querySelectorAll('tr'),sub=0,disc=0,wht=0;
  rows.forEach(function(r){
    var id=r.id.replace('line-','');
    var p=parseFloat(document.getElementById('price-'+id)?.value)||0;
    var q=parseInt(document.getElementById('qty-'+id)?.value)||1;
    var d=parseFloat(document.getElementById('disc-'+id)?.value)||0;
    var w=parseFloat(document.getElementById('wht-'+id)?.value)||0;
    var lt=p*q;sub+=lt;disc+=d;wht+=lt*(w/100);
    var el=document.getElementById('total-'+id);
    if(el) el.textContent=fmt(Math.max(0,lt-d));
  });
  var after=sub-disc,vat=Math.round(after*0.07),grand=Math.round(after+vat-wht);
  document.getElementById('sum-subtotal').textContent=fmt(sub);
  document.getElementById('sum-discount').textContent='-'+fmt(disc);
  document.getElementById('sum-vat').textContent=fmt(vat);
  document.getElementById('sum-wht').textContent='-'+fmt(Math.round(wht));
  document.getElementById('sum-grand').textContent=fmt(grand);
}

function getLineItems(){
  var items=[];
  document.getElementById('qt-lines').querySelectorAll('tr').forEach(function(r){
    var id=r.id.replace('line-','');
    var sel=document.getElementById('sel-'+id);
    var productId=sel?sel.value:'';
    var name=document.getElementById('name-'+id)?.value||'';
    var sku=sel&&sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].dataset.sku||'':'';
    var p=parseFloat(document.getElementById('price-'+id)?.value)||0;
    var q=parseInt(document.getElementById('qty-'+id)?.value)||1;
    var d=parseFloat(document.getElementById('disc-'+id)?.value)||0;
    var w=parseFloat(document.getElementById('wht-'+id)?.value)||0;
    items.push({productId:productId||undefined,productName:name,sku:sku,quantity:q,unitPrice:p,discount:d,whtRate:w});
  });
  return items;
}

async function saveQuotation(){
  var accountId=document.getElementById('qt-account').value;
  if(!accountId){alert('Please select a customer');return}
  var items=getLineItems();
  if(items.length===0){alert('Add at least one item');return}

  var btn=document.getElementById('btn-save-qt');
  btn.disabled=true; btn.textContent='Saving...';

  try {
    var body={
      accountId:accountId,
      lineItems:items,
      validUntil:document.getElementById('qt-valid').value||null,
      totalDiscount:0
    };
    // Sum up discounts
    items.forEach(function(i){body.totalDiscount+=(i.discount||0)});

    await apiFetch('/quotations', { method:'POST', body:JSON.stringify(body) });
    closeForm();
    await reloadQuotations();
  } catch(err) {
    alert('Error: '+err.message);
  } finally {
    btn.disabled=false; btn.textContent='Save as Draft';
  }
}

async function submitQt(id){
  if(!confirm('Submit this quotation for approval?')) return;
  try {
    await apiFetch('/quotations/'+id+'/submit', { method:'POST' });
    await reloadQuotations();
  } catch(err) { alert('Error: '+err.message); }
}

async function approveQt(id){
  if(!confirm('Approve this quotation and send to customer?')) return;
  try {
    await apiFetch('/quotations/'+id+'/approve', { method:'POST' });
    await reloadQuotations();
  } catch(err) { alert('Error: '+err.message); }
}

async function rejectQt(id){
  if(!confirm('Reject this quotation? It will be sent back to draft for the Sales Rep to revise.')) return;
  try {
    await apiFetch('/quotations/'+id+'/reject', { method:'POST' });
    await reloadQuotations();
  } catch(err) { alert('Error: '+err.message); }
}

async function acceptQt(id){
  if(!confirm('Mark this quotation as accepted by customer?')) return;
  try {
    await apiFetch('/quotations/'+id+'/accept', { method:'POST' });
    await reloadQuotations();
  } catch(err) { alert('Error: '+err.message); }
}

async function reloadQuotations(){
  await loadQuotations();
  renderTable();
}

// Initial load
reloadQuotations();

// Auto-open create form if URL param
(function(){
  var p=new URLSearchParams(window.location.search).get('accountId');
  if(p){openCreate()}
})();
</script>
</body>
</html>

<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — แจ้งเตือน</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title">การแจ้งเตือน</div><div class="page-subtitle">ดูการแจ้งเตือนทั้งหมด — LINE, อีเมล, และในแอป</div></div><button class="btn btn-secondary">อ่านทั้งหมด</button></div>
  <div id="notif-list"></div>
</div>
<script src="../js/helpers.js"></script><script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('notifications');
const ICON_COLORS={lead:'var(--sf-blue)',task:'var(--orange)',deal:'var(--green)',quotation:'var(--teal)',line:'#06C755'};
document.getElementById('notif-list').innerHTML=NOTIFICATIONS.map(n=>`
  <div class="card" style="margin-bottom:8px;padding:16px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;${n.read?'':'border-left:3px solid var(--sf-blue)'}">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <div style="width:10px;height:10px;border-radius:50%;background:${ICON_COLORS[n.icon]||'var(--text3)'}"></div>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:600">${n.title}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:2px">${n.body}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">${n.time}</div>
    </div>
    ${n.read?'':'<div style="width:8px;height:8px;border-radius:50%;background:var(--sf-blue);flex-shrink:0;margin-top:6px"></div>'}
  </div>
`).join('');
</script></body></html>

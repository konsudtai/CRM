<!DOCTYPE html><html lang="th" data-theme="light"><head><meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SalesFAST 7 — แจ้งเตือน</title><link rel="stylesheet" href="../css/app.css"/></head><body>
<div class="bg-pattern"></div><div id="nav"></div>
<div class="page anim">
  <div class="page-header"><div><div class="page-title reveal">การแจ้งเตือน</div><div class="page-subtitle reveal">ดูการแจ้งเตือนทั้งหมด</div></div></div>
  <div id="notif-list"><div style="text-align:center;padding:40px;color:var(--text3)">Loading...</div></div>
</div>
<script src="../js/motion.js"></script><script src="../js/helpers.js"></script><script src="../js/i18n.js"></script>
<script src="../js/nav.js"></script><script src="../js/data.js"></script>
<script>
document.getElementById('nav').innerHTML=renderNav('notifications');
if(!requireAuth()) throw 'auth';

var ICON_COLORS={lead:'var(--sf-blue)',task:'var(--orange)',deal:'var(--green)',quotation:'var(--teal)',line:'#06C755',general:'var(--sf-blue)'};

function renderNotifications(){
  if(!NOTIFICATIONS||NOTIFICATIONS.length===0){
    document.getElementById('notif-list').innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">ไม่มีการแจ้งเตือน</div>';
    return;
  }
  document.getElementById('notif-list').innerHTML=NOTIFICATIONS.map(function(n){
    var iconType=n.type||'general';
    var iconColor=ICON_COLORS[iconType]||'var(--text3)';
    var timeStr=n.created_at?new Date(n.created_at).toLocaleString('th-TH'):'';
    var isRead=n.status==='sent'||n.status==='delivered';
    return '<div class="card" style="margin-bottom:8px;padding:16px;display:flex;gap:14px;align-items:flex-start;'+(isRead?'':'border-left:3px solid var(--sf-blue)')+'">'+
      '<div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
        '<div style="width:10px;height:10px;border-radius:50%;background:'+iconColor+'"></div>'+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:14px;font-weight:600">'+esc(n.title)+'</div>'+
        '<div style="font-size:13px;color:var(--text2);margin-top:2px">'+esc(n.body||'')+'</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:6px">'+timeStr+'</div>'+
      '</div>'+
      (isRead?'':'<div style="width:8px;height:8px;border-radius:50%;background:var(--sf-blue);flex-shrink:0;margin-top:6px"></div>')+
    '</div>';
  }).join('');
}

// Initial load
loadNotifications().then(renderNotifications);
</script></body></html>

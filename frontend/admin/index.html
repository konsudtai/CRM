<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Landing Page CMS — SalesFAST 7 Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- ── Top bar ── -->
<header class="adm-top">
  <div class="adm-top-wrap">
    <a href="../landing.html" class="adm-brand">
      <div class="adm-logo">S7</div>
      <div>
        <div class="adm-brand-name">Landing Page CMS</div>
        <div class="adm-brand-tag">SalesFAST 7 Admin</div>
      </div>
    </a>
    <div class="adm-top-actions">
      <span class="adm-saved-badge" id="saved-badge">บันทึกแล้ว</span>
      <a href="../landing.html" class="adm-btn adm-btn-ghost" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ดู Landing Page
      </a>
      <button class="adm-btn adm-btn-ghost" onclick="exportContent()">Export</button>
      <button class="adm-btn adm-btn-ghost" onclick="importTrigger()">Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importContent(event)"/>
      <button class="adm-btn adm-btn-danger-outline" onclick="resetAll()">รีเซ็ตทั้งหมด</button>
      <button class="adm-btn adm-btn-primary" onclick="saveAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        บันทึกการเปลี่ยนแปลง
      </button>
    </div>
  </div>
</header>

<div class="adm-layout">
  <!-- ── Sidebar ── -->
  <aside class="adm-sidebar">
    <nav class="adm-nav">
      <button class="adm-nav-item active" data-tab="company">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/></svg>
        ข้อมูลบริษัท
      </button>
      <button class="adm-nav-item" data-tab="hero">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        Hero Section
      </button>
      <button class="adm-nav-item" data-tab="stats">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="8"/><rect x="12" y="6" width="3" height="12"/><rect x="17" y="13" width="3" height="5"/></svg>
        สถิติ
      </button>
      <button class="adm-nav-item" data-tab="categories">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        หมวดหมู่สินค้า
      </button>
      <button class="adm-nav-item" data-tab="products">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        สินค้า
      </button>
      <button class="adm-nav-item" data-tab="industries">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
        อุตสาหกรรม
      </button>
      <button class="adm-nav-item" data-tab="features">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        จุดเด่น
      </button>
      <button class="adm-nav-item" data-tab="testimonials">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Testimonials
      </button>
      <button class="adm-nav-item" data-tab="clients">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
        ลูกค้า
      </button>
      <button class="adm-nav-item" data-tab="leads">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Leads จากฟอร์ม
        <span class="adm-nav-count" id="leads-count">0</span>
      </button>
    </nav>
  </aside>

  <!-- ── Main content ── -->
  <main class="adm-main" id="adm-main">
    <!-- Rendered by admin.js -->
  </main>
</div>

<!-- Toast -->
<div class="adm-toast" id="adm-toast">
  <span class="adm-toast-icon">✓</span>
  <span class="adm-toast-msg"></span>
</div>

<script src="../js/icons.js"></script>
<script src="../js/landing-data.js"></script>
<script src="admin.js"></script>
</body>
</html>

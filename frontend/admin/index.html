<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SalesFAST 7 — Admin Portal</title>
<link rel="stylesheet" href="../css/app.css"/>
<style>
.admin-shell{display:flex;min-height:calc(100vh - 52px)}
.admin-sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0}
.admin-sidebar-title{font-size:10px;font-weight:700;color:var(--text3,#939393);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.admin-sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2,#5C5C5C);cursor:pointer;transition:all .15s;margin-bottom:2px}
.admin-sidebar-item:hover{background:var(--surface2,#F4F6F9);color:var(--text,#181818)}
.admin-sidebar-item.active{background:rgba(1,118,211,.08);color:#0176D3}
.admin-content{flex:1;padding:28px 32px}
.admin-card{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);box-shadow:var(--card-shadow);margin-bottom:20px}
.admin-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.admin-stat{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border)}
.admin-stat-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.admin-stat-value{font-size:28px;font-weight:800;letter-spacing:-.8px;margin-top:4px}
.admin-stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
@media(max-width:768px){.admin-shell{flex-direction:column}.admin-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}.admin-stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<nav class="glass-nav">
  <div class="nav-left">
    <a href="../app/dashboard.html" class="nav-brand">SalesFAST <span style="color:#4BCA81">7</span></a>
    <span style="font-size:11px;color:rgba(255,255,255,.4);padding:3px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;margin-left:8px">ADMIN</span>
  </div>
  <div class="nav-right">
    <a href="../app/dashboard.html" class="icon-btn" title="Back to CRM"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
    <button class="icon-btn" onclick="document.documentElement.setAttribute('data-theme',document.documentElement.getAttribute('data-theme')==='light'?'dark':'light')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
    <div class="nav-avatar" style="font-size:7px">SF<span style="color:#4BCA81">7</span></div>
  </div>
</nav>

<div class="admin-shell">
  <div class="admin-sidebar">
    <div class="admin-sidebar-title">Overview</div>
    <div class="admin-sidebar-item active" onclick="showSection('overview')">Dashboard</div>
    <div class="admin-sidebar-title">Management</div>
    <div class="admin-sidebar-item" onclick="showSection('tenants')">Tenants</div>
    <div class="admin-sidebar-item" onclick="showSection('users')">Users</div>
    <div class="admin-sidebar-item" onclick="showSection('roles')">Roles & Permissions</div>
    <div class="admin-sidebar-title">Security</div>
    <div class="admin-sidebar-item" onclick="showSection('security')">Security Settings</div>
    <div class="admin-sidebar-item" onclick="showSection('apikeys')">API Keys</div>
    <div class="admin-sidebar-item" onclick="showSection('audit')">Audit Logs</div>
    <div class="admin-sidebar-title">Integrations</div>
    <div class="admin-sidebar-item" onclick="showSection('integrations')">Connections</div>
    <div class="admin-sidebar-item" onclick="showSection('webhooks')">Webhooks</div>
    <div class="admin-sidebar-item" onclick="showSection('line')">LINE OA</div>
    <div class="admin-sidebar-title">Compliance</div>
    <div class="admin-sidebar-item" onclick="showSection('pdpa')">PDPA</div>
    <div class="admin-sidebar-title">System</div>
    <div class="admin-sidebar-item" onclick="showSection('system')">System Health</div>
  </div>
  <div class="admin-content" id="admin-content"></div>
</div>

<script>
let currentSection='overview';
function showSection(s){
  currentSection=s;
  document.querySelectorAll('.admin-sidebar-item').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function render(){
  const el=document.getElementById('admin-content');
  el.innerHTML=sections[currentSection]||sections.overview;
}

// ── Load admin data from API ──
const ADMIN_API_BASE = window.__SF7_API_BASE__ || '/api';
async function adminApiFetch(path) {
  const token = localStorage.getItem('sf7_token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(ADMIN_API_BASE + path, { headers });
  if (!res.ok) return null;
  return res.json();
}

async function loadAdminOverview() {
  try {
    const [stats, services, activity] = await Promise.all([
      adminApiFetch('/admin/stats').catch(()=>null),
      adminApiFetch('/admin/services/health').catch(()=>null),
      adminApiFetch('/admin/audit-logs?limit=5').catch(()=>null),
    ]);
    if (stats) {
      const s = (id, v, sub) => { const el = document.getElementById(id); if (el) el.textContent = v; const subEl = document.getElementById(id+'-sub'); if (subEl && sub) subEl.textContent = sub; };
      s('stat-tenants', stats.totalTenants || 0, stats.activeTenantsThisMonth ? stats.activeTenantsThisMonth + ' active this month' : '');
      s('stat-users', stats.totalUsers || 0, stats.activeUsersToday ? stats.activeUsersToday + ' active today' : '');
      s('stat-api', stats.apiRequests24h || 0, stats.avgRequestsPerHour ? 'Avg ' + stats.avgRequestsPerHour + '/hr' : '');
      s('stat-health', stats.systemHealth || 'OK', stats.healthDetail || 'All services running');
    }
    const svcEl = document.getElementById('admin-services');
    if (svcEl && services && Array.isArray(services)) {
      svcEl.innerHTML = services.map(s => '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">' + s.name + '</span><span style="font-size:11px;font-weight:600;color:' + (s.status==='Running'?'#2E844A':'#C23934') + ';background:' + (s.status==='Running'?'rgba(46,132,74,.1)':'rgba(194,57,52,.1)') + ';padding:2px 8px;border-radius:20px">' + s.status + '</span></div>').join('');
    }
    const actEl = document.getElementById('admin-activity');
    if (actEl && activity && Array.isArray(activity)) {
      actEl.innerHTML = activity.map(a => '<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-size:13px;font-weight:500">' + (a.action || '') + '</div><div style="font-size:11px;color:var(--text2)">' + (a.detail || '') + ' &middot; ' + (a.timeAgo || '') + '</div></div>').join('');
    }
  } catch(e) { console.error('Admin data load error:', e); }
}
loadAdminOverview();

version: 0.2

env:
  variables:
    REGION: ap-southeast-1
    FUNCTION_NAME: sf7-prod-crm

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g esbuild typescript
      - cd services/api && npm install
  build:
    commands:
      - cd services/api && esbuild src/lambda.ts --bundle --platform=node --target=node20 --outfile=dist/lambda.js --external:pg-native "--external:@aws-sdk/*" "--external:@smithy/*" "--external:@aws-crypto/*" --minify
  post_build:
    commands:
      - cd services/api/dist && zip -j /tmp/lambda.zip lambda.js
      - aws s3 cp /tmp/lambda.zip s3://sf7-prod-frontend-364478544994/deploy/api-lambda.zip --region $REGION
      - aws lambda update-function-code --function-name $FUNCTION_NAME --s3-bucket sf7-prod-frontend-364478544994 --s3-key deploy/api-lambda.zip --region $REGION

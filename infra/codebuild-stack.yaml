AWSTemplateFormatVersion: '2010-09-09'
Description: 'SalesFAST 7 — CodeBuild project for building Docker images (no local Docker needed)'

Parameters:
  Environment:
    Type: String
    Default: prod

Resources:

  # ════════════════════════════════════════════════════════════
  # Source Bucket (where we'll upload zipped source)
  # ════════════════════════════════════════════════════════════
  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sf7-${Environment}-codebuild-src-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldSources
            Status: Enabled
            ExpirationInDays: 7
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ════════════════════════════════════════════════════════════
  # IAM Role for CodeBuild
  # ════════════════════════════════════════════════════════════
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub sf7-${Environment}-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt SourceBucket.Arn
                  - !Sub ${SourceBucket.Arn}/*

  # ════════════════════════════════════════════════════════════
  # CodeBuild Project (single project, builds all 3 images)
  # ════════════════════════════════════════════════════════════
  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub sf7-${Environment}-fargate-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        PrivilegedMode: true   # Required for Docker
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ENV
            Value: !Ref Environment
          - Name: IMAGE_TAG
            Value: latest
      Source:
        Type: S3
        Location: !Sub ${SourceBucket}/source.zip
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - cd services/crm-fargate
                - REPO_BASE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - echo Build started on $(date)
                - echo Building crm-core...
                - docker build --platform linux/arm64 -f Dockerfile.core -t sf7-crm-core:$IMAGE_TAG .
                - docker tag sf7-crm-core:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-core:$IMAGE_TAG
                - docker tag sf7-crm-core:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-core:latest
                - echo Building crm-quotation...
                - docker build --platform linux/arm64 -f Dockerfile.quotation -t sf7-crm-quotation:$IMAGE_TAG .
                - docker tag sf7-crm-quotation:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-quotation:$IMAGE_TAG
                - docker tag sf7-crm-quotation:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-quotation:latest
                - echo Building crm-line...
                - docker build --platform linux/arm64 -f Dockerfile.line -t sf7-crm-line:$IMAGE_TAG .
                - docker tag sf7-crm-line:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-line:$IMAGE_TAG
                - docker tag sf7-crm-line:$IMAGE_TAG $REPO_BASE/sf7-$ENV-crm-line:latest
            post_build:
              commands:
                - echo Pushing images...
                - docker push $REPO_BASE/sf7-$ENV-crm-core:$IMAGE_TAG
                - docker push $REPO_BASE/sf7-$ENV-crm-core:latest
                - docker push $REPO_BASE/sf7-$ENV-crm-quotation:$IMAGE_TAG
                - docker push $REPO_BASE/sf7-$ENV-crm-quotation:latest
                - docker push $REPO_BASE/sf7-$ENV-crm-line:$IMAGE_TAG
                - docker push $REPO_BASE/sf7-$ENV-crm-line:latest
                - echo Done. Pushed tags - $IMAGE_TAG and latest
      TimeoutInMinutes: 30

Outputs:
  SourceBucketName:
    Value: !Ref SourceBucket
    Export:
      Name: !Sub sf7-${Environment}-codebuild-src-bucket
  BuildProjectName:
    Value: !Ref BuildProject
    Export:
      Name: !Sub sf7-${Environment}-fargate-build-project

AWSTemplateFormatVersion: '2010-09-09'
Description: 'SalesFAST 7 CRM Platform - Serverless Stack'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: 'PostgreSQL master password (min 8 chars)'
  JWTSecret:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: 'JWT signing secret (min 16 chars)'
  DomainName:
    Type: String
    Default: ''
    Description: 'Custom domain (optional, e.g. app.salesfast7.com)'

Resources:

  # ============================================================
  # VPC — Minimal (public + private subnets, NO NAT Gateway)
  # Lambda uses VPC endpoints instead of NAT to save $32/mo
  # ============================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-vpc'

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-public-a'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-public-b'

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-private-b'

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # VPC Endpoints (replace NAT Gateway — saves $32/mo)
  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/sf7/${Environment}/vpc-flow-logs'
      RetentionInDays: 30

  VPCFlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: flow-log-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogRole.Arn

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      RouteTableIds:
        - !Ref PrivateRouteTable

  SQSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sqs'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref LambdaSG
      PrivateDnsEnabled: true

  SecretsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref LambdaSG
      PrivateDnsEnabled: true

  # ============================================================
  # Security Groups
  # ============================================================
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda functions
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
          Description: VPC endpoints (SQS, Secrets Manager)
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
          Description: RDS PostgreSQL

  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSG

  # ============================================================
  # RDS PostgreSQL — db.t4g.micro (~$13/mo single-AZ)
  # ============================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: SF7 DB subnets
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: postgres16
      Description: SF7 PostgreSQL parameters - enforce SSL
      Parameters:
        rds.force_ssl: '1'
        log_connections: '1'
        log_disconnections: '1'

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub 'sf7-${Environment}'
      Engine: postgres
      EngineVersion: '16.6'
      DBInstanceClass: db.t4g.medium
      AllocatedStorage: 100
      StorageType: gp3
      MasterUsername: salesfast7
      MasterUserPassword: !Ref DBPassword
      DBName: salesfast7
      DBParameterGroupName: !Ref DBParameterGroup
      VPCSecurityGroups:
        - !Ref RDSSG
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-db'

  # ============================================================
  # Secrets Manager
  # ============================================================
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'sf7/${Environment}/db'
      SecretString: !Sub |
        {
          "host": "${Database.Endpoint.Address}",
          "port": 5432,
          "username": "salesfast7",
          "password": "${DBPassword}",
          "database": "salesfast7"
        }

  JWTSecretStore:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'sf7/${Environment}/jwt'
      SecretString: !Sub '{"secret": "${JWTSecret}"}'

  LineSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'sf7/${Environment}/line'
      SecretString: '{"channelAccessToken":"","channelSecret":"","configured":false}'

  # ============================================================
  # S3 Buckets
  # ============================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sf7-${Environment}-frontend-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ============================================================
  # ============================================================
  # CloudFront Flat-Rate PRO Plan ($15/mo)
  # ─────────────────────────────────────────────────────────────
  # Subscribe AFTER deploy via CloudFront Console:
  #   Console > CloudFront > Distributions > select distribution > Pricing plan > Pro
  #
  # Pro plan includes (no overage charges):
  #   - CloudFront CDN (750+ edge locations, HTTP/2+3)
  #   - AWS WAF (25 rules, SQL/XSS/PHP/WordPress protections)
  #   - Always-on DDoS protection
  #   - Amazon Route 53 DNS
  #   - Amazon CloudWatch Logs ingestion
  #   - TLS certificate (free)
  #   - Serverless edge compute
  #   - 50GB S3 storage credits/mo
  #   - 10M requests/mo
  #   - 50TB data transfer/mo
  #   - Logging included
  #   - Cache tag invalidation
  #
  # No separate WAF WebACL needed — WAF is managed by the plan.
  # Ref: https://aws.amazon.com/cloudfront/pricing/
  # ============================================================

  # CloudFront Distribution — OAC for S3 origin (private bucket)
  # ============================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'sf7-${Environment}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontSecurityHeaders:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub 'sf7-${Environment}-security-headers'
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'"
            Override: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'SalesFAST 7 ${Environment}'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_All
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId: !Ref CloudFrontSecurityHeaders
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
        CacheBehaviors:
          # ── Exact base paths (no trailing slash) ──
          - PathPattern: '/auth'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/users'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/accounts'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/leads'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/tasks'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/quotations'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/products'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/opportunities'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/dashboard'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/notifications'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/activities'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/roles'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # ── Wildcard paths ──
          - PathPattern: '/auth/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/users/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/accounts/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/leads/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/pipeline/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/tasks/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/quotations/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/products/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/opportunities/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/dashboard/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/notifications/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/activities/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/reports/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/roles/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/line/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: '/agents/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

  FilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sf7-${Environment}-files-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT]
            AllowedOrigins:
              - !Sub 'https://${CloudFrontDistribution.DomainName}'
            MaxAge: 3600

  # ============================================================
  # DynamoDB — AI chat history, session state, key-value store
  # Cost: ~$1-2/mo (on-demand, pay per request)
  # ============================================================

  # Chat conversations (AI ↔ ลูกค้า LINE)
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'sf7-${Environment}-chat-history'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-chat-history'
      # ── Access Patterns ──
      # PK=CONV#{conversationId}  SK=MSG#{timestamp}     → messages in a conversation
      # PK=CONV#{conversationId}  SK=META                → conversation metadata (status, collected_data)
      # PK=LINE#{lineUserId}      SK=CONV#{conversationId} → conversations by LINE user
      # GSI1PK=TENANT#{tenantId}  GSI1SK={timestamp}     → all conversations for a tenant

  # AI config + session state + key-value store
  AIStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'sf7-${Environment}-ai-state'
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: !Sub 'sf7-${Environment}-ai-state'
      # ── Access Patterns ──
      # PK=CONFIG#{tenantId}      SK=AI          → AI config (enabled, name, mode, escalation rules)
      # PK=CONFIG#{tenantId}      SK=LINE        → LINE config
      # PK=SESSION#{sessionId}    SK=STATE       → agent session state
      # PK=LEAD#{lineUserId}      SK=COLLECTED   → collected lead data (name, phone, company...)
      # PK=CACHE#{key}            SK=VALUE       → general key-value cache (with TTL)

  # VPC Endpoint for DynamoDB (Gateway type — free)
  DynamoDBEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      RouteTableIds:
        - !Ref PrivateRouteTable

  # ============================================================
  # SQS Queues
  # ============================================================
  EventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'sf7-${Environment}-events'
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventsDLQ.Arn
        maxReceiveCount: 3

  EventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'sf7-${Environment}-events-dlq'
      MessageRetentionPeriod: 1209600

  # Agent Events Queue — fan-out from SNS topic so both
  # Notification Lambda and Agent Service receive all events
  AgentEventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'sf7-${Environment}-agent-events'
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventsDLQ.Arn
        maxReceiveCount: 3

  # SNS Topic for fan-out — services publish here,
  # both EventsQueue and AgentEventsQueue subscribe
  EventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'sf7-${Environment}-events-topic'

  EventsQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventsTopic
      Protocol: sqs
      Endpoint: !GetAtt EventsQueue.Arn
      RawMessageDelivery: true

  AgentQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventsTopic
      Protocol: sqs
      Endpoint: !GetAtt AgentEventsQueue.Arn
      RawMessageDelivery: true

  EventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventsQueue
        - !Ref AgentEventsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource:
              - !GetAtt EventsQueue.Arn
              - !GetAtt AgentEventsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventsTopic

  # ============================================================
  # IAM Role for Lambda
  # ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sf7-${Environment}-lambda-role-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: sf7-lambda-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DBSecret
                  - !Ref JWTSecretStore
                  - !Ref LineSecret
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${FilesBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt EventsQueue.Arn
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:Publish
                  - sns:ListSubscriptionsByTopic
                  - sns:GetTopicAttributes
                  - sns:TagResource
                Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:sf7-*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt ChatHistoryTable.Arn
                  - !Sub '${ChatHistoryTable.Arn}/index/*'
                  - !GetAtt AIStateTable.Arn
                  - !Sub '${AIStateTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # ============================================================
  # Lambda Functions (placeholder — deploy code separately)
  # ============================================================
  AuthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-auth'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 1024
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: JSON.stringify({ service: 'auth', status: 'ok' }) });
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          JWT_SECRET_ARN: !Ref JWTSecretStore
          SQS_QUEUE_URL: !Ref EventsQueue
          S3_BUCKET: !Ref FilesBucket
          NODE_ENV: production
          CORS_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'
          DB_HOST: !GetAtt Database.Endpoint.Address
          CHAT_TABLE: !Ref ChatHistoryTable
          AI_STATE_TABLE: !Ref AIStateTable

  CRMFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-crm'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 1024
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: JSON.stringify({ service: 'crm', status: 'ok' }) });
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          JWT_SECRET_ARN: !Ref JWTSecretStore
          SQS_QUEUE_URL: !Ref EventsQueue
          S3_BUCKET: !Ref FilesBucket
          NODE_ENV: production
          CORS_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'
          DB_HOST: !GetAtt Database.Endpoint.Address
          CHAT_TABLE: !Ref ChatHistoryTable
          AI_STATE_TABLE: !Ref AIStateTable

  SalesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-sales'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 1024
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: JSON.stringify({ service: 'sales', status: 'ok' }) });
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          SQS_QUEUE_URL: !Ref EventsQueue
          NODE_ENV: production
          CORS_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'
          DB_HOST: !GetAtt Database.Endpoint.Address
          CHAT_TABLE: !Ref ChatHistoryTable
          AI_STATE_TABLE: !Ref AIStateTable

  QuotationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-quotation'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 1024
      Timeout: 30
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: JSON.stringify({ service: 'quotation', status: 'ok' }) });
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          S3_BUCKET: !Ref FilesBucket
          SQS_QUEUE_URL: !Ref EventsQueue
          NODE_ENV: production
          CORS_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'
          DB_HOST: !GetAtt Database.Endpoint.Address
          CHAT_TABLE: !Ref ChatHistoryTable
          AI_STATE_TABLE: !Ref AIStateTable

  NotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-notification'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 1024
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: JSON.stringify({ service: 'notification', status: 'ok' }) });
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          SQS_QUEUE_URL: !Ref EventsQueue
          NODE_ENV: production
          CORS_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'
          DB_HOST: !GetAtt Database.Endpoint.Address
          LINE_SECRET_ARN: !Ref LineSecret
          CHAT_TABLE: !Ref ChatHistoryTable
          AI_STATE_TABLE: !Ref AIStateTable

  # SQS -> Notification Lambda trigger
  NotificationEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt EventsQueue.Arn
      FunctionName: !Ref NotificationFunction
      BatchSize: 5
      Enabled: true

  # ============================================================
  # API Gateway HTTP API
  # ============================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'sf7-${Environment}-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
        AllowHeaders: ['*']
        MaxAge: 86400

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # Auth routes
  AuthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt AuthFunction.Arn
      PayloadFormatVersion: '2.0'

  AuthPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  AuthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /auth/{proxy+}'
      Target: !Sub 'integrations/${AuthIntegration}'

  UsersRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /users/{proxy+}'
      Target: !Sub 'integrations/${AuthIntegration}'

  RolesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /roles/{proxy+}'
      Target: !Sub 'integrations/${AuthIntegration}'

  # CRM routes
  CRMIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CRMFunction.Arn
      PayloadFormatVersion: '2.0'

  CRMPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CRMFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  AccountsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /accounts/{proxy+}'
      Target: !Sub 'integrations/${CRMIntegration}'

  TasksRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /tasks/{proxy+}'
      Target: !Sub 'integrations/${CRMIntegration}'

  # Sales routes
  SalesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SalesFunction.Arn
      PayloadFormatVersion: '2.0'

  SalesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SalesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  LeadsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /leads/{proxy+}'
      Target: !Sub 'integrations/${SalesIntegration}'

  PipelineRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /pipeline/{proxy+}'
      Target: !Sub 'integrations/${SalesIntegration}'

  ReportsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /reports/{proxy+}'
      Target: !Sub 'integrations/${SalesIntegration}'

  # Quotation routes
  QuotationIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt QuotationFunction.Arn
      PayloadFormatVersion: '2.0'

  QuotationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuotationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  QuotationsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /quotations/{proxy+}'
      Target: !Sub 'integrations/${QuotationIntegration}'

  ProductsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /products/{proxy+}'
      Target: !Sub 'integrations/${QuotationIntegration}'

  # LINE OA routes (Notification service)
  LineRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /line/{proxy+}'
      Target: !Sub 'integrations/${NotificationIntegration}'

  NotificationIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt NotificationFunction.Arn
      PayloadFormatVersion: '2.0'

  NotificationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NotificationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # ============================================================
  # CloudWatch Alarms — Security Monitoring
  # ============================================================
  AuthLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sf7-${Environment}-auth-errors'
      AlarmDescription: Auth Lambda error rate too high (possible brute force)
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AuthFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  Api4xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sf7-${Environment}-api-4xx'
      AlarmDescription: High 4xx error rate on API (possible attack)
      Namespace: AWS/ApiGateway
      MetricName: 4xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  RDSConnectionAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sf7-${Environment}-rds-connections'
      AlarmDescription: RDS connection count unusually high
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Sub 'sf7-${Environment}'
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ============================================================
  # RDS Proxy — deployed as separate stack (cloudformation-proxy.yaml)
  # after main stack is complete. This avoids CloudFormation timeout.
  # Lambda uses DB_HOST from main stack initially (direct RDS),
  # then update to Proxy endpoint after proxy stack deploys.
  # ============================================================

# ============================================================
# AWS Backup — 7-day retention for RDS + S3
# Runs daily at 02:00 UTC (09:00 Thailand time)
# Cost: ~$1-2/mo (snapshot storage based on data size)
# ============================================================

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub 'sf7-${Environment}-vault'

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sf7-${Environment}-backup-role-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores
        - arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Backup
        - arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Restore

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub 'sf7-${Environment}-daily-7day'
        BackupPlanRule:
          - RuleName: DailyBackup7DayRetention
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: 'cron(0 2 * * ? *)'   # 02:00 UTC = 09:00 Thailand
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 7

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub 'sf7-${Environment}-resources'
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:sf7-${Environment}'
          - !Sub 'arn:aws:s3:::sf7-${Environment}-files-${AWS::AccountId}'
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: aws:cloudformation:stack-name
            ConditionValue: !Ref AWS::StackName

  # ============================================================
  # DB Init Lambda — Executes SQL against RDS from within VPC
  # deploy.sh will update this with pg layer after stack creation
  # ============================================================
  DBInitFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sf7-${Environment}-db-init'
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 512
      Timeout: 120
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: 'Placeholder — deploy.sh will update with pg layer' };
          };
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSG
      Environment:
        Variables:
          DB_HOST: !GetAtt Database.Endpoint.Address
          DB_USER: salesfast7
          DB_PASS: !Ref DBPassword
          DB_NAME: salesfast7

# ============================================================
# Outputs
# ============================================================
Outputs:
  ApiUrl:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Description: API Gateway URL

  CloudFrontUrl:
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Description: CloudFront distribution URL (main entry point)

  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Description: CloudFront distribution ID (for cache invalidation)

  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
    Description: RDS PostgreSQL endpoint (direct)

  FilesBucket:
    Value: !Ref FilesBucket
    Description: S3 bucket for files

  FrontendBucket:
    Value: !Ref FrontendBucket
    Description: S3 bucket for frontend

  BackupVault:
    Value: !Ref BackupVault
    Description: AWS Backup vault name (7-day retention, daily at 09:00 TH)

  ChatHistoryTable:
    Value: !Ref ChatHistoryTable
    Description: DynamoDB table for AI chat history

  AIStateTable:
    Value: !Ref AIStateTable
    Description: DynamoDB table for AI config and session state

  DBInitFunction:
    Value: !Ref DBInitFunction
    Description: Lambda function for database initialization (used by deploy.sh)

  AgentEventsQueueUrl:
    Value: !Ref AgentEventsQueue
    Description: SQS queue URL for Agent Service events (fan-out from SNS)

  EventsTopicArn:
    Value: !Ref EventsTopic
    Description: SNS topic ARN - services publish events here

  # Exports for RDS Proxy stack (cloudformation-proxy.yaml)
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  LambdaSGId:
    Value: !Ref LambdaSG
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSGId'

  PrivateSubnetAId:
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetA'

  PrivateSubnetBId:
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetB'

  DBSecretArn:
    Value: !Ref DBSecret
    Export:
      Name: !Sub '${AWS::StackName}-DBSecretArn'

  DBInstanceId:
    Value: !Ref Database
    Export:
      Name: !Sub '${AWS::StackName}-DBInstanceId'

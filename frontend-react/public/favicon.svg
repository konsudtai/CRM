<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#032D60"/>
  <!-- Subtle gradient overlay -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0176D3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#032D60" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- "SF" white -->
  <text x="3.5" y="22" font-family="Inter,Arial Black,sans-serif" font-size="14" font-weight="900" letter-spacing="-0.8" fill="#ffffff">SF</text>
  <!-- "7" green -->
  <text x="22.5" y="22" font-family="Inter,Arial Black,sans-serif" font-size="14" font-weight="900" fill="#2E844A">7</text>
</svg>
